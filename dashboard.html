<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="dashboard">

<h1>Editor de Perfil</h1>

<div class="editor">

<div class="form">

<input id="display_name" placeholder="Nome">

<textarea id="bio_text" placeholder="Sua bio"></textarea>

<input id="avatar" type="file">

<input id="banner" type="file">

<input id="music" placeholder="Link da música">

<input id="instagram" placeholder="Instagram">

<input id="tiktok" placeholder="TikTok">

<input id="twitter" placeholder="Twitter">

<input id="youtube" placeholder="YouTube">

<button onclick="saveProfile()">Salvar</button>

</div>

<div class="preview">

<div class="banner" id="preview_banner"></div>

<img id="preview_avatar">

<h2 id="preview_name">Seu nome</h2>

<p id="preview_bio">Sua bio</p>

<div id="preview_links"></div>

</div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
