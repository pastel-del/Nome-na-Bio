<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ff8c00; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.4); display: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: -1; }

        .wrapper { width: 100%; max-width: 450px; padding: 20px; z-index: 10; }
        
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            border-radius: 30px; 
            padding: 45px 30px; 
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .pfp-view { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--border); margin-bottom: 15px; object-fit: cover; }
        .display-name { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; }
        .bio-text-view { font-size: 0.95rem; color: #ccc; margin-bottom: 25px; line-height: 1.4; }

        .discord-card { 
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 20px; 
            padding: 15px; 
            margin: 20px auto;
            display: flex; align-items: center; gap: 15px; text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
            max-width: 350px;
            text-decoration: none; color: inherit; transition: 0.3s;
        }
        .dc-img { position: relative; width: 48px; height: 48px; }
        .dc-img img { width: 100%; height: 100%; border-radius: 12px; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid #111; }

        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .social-icon { color: #fff; font-size: 1.6rem; opacity: 0.6; transition: 0.3s; text-decoration: none; }
        .social-icon:hover { opacity: 1; color: var(--accent); transform: translateY(-4px); }

        .views-badge { 
            position: absolute; bottom: 15px; left: 25px; 
            font-size: 0.65rem; color: rgba(255,255,255,0.3); 
            display: flex; align-items: center; gap: 6px; 
        }

        /* Admin UI */
        .admin-scroll { max-height: 85vh; overflow-y: auto; padding-right: 10px; text-align: left; }
        label { font-size: 0.7rem; color: #666; font-weight: 700; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid #222; color: #fff; border-radius: 10px; margin-bottom: 15px; outline: none; }
        
        .toggle-container { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .toggle-container span { font-size: 0.8rem; font-weight: 600; }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-save { background: #fff; color: #000; }

        .hidden { display: none !important; }
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="revealBio()">
        <h1 style="font-size: 0.7rem; letter-spacing: 0.6em; color: #444;">CLICK TO REVEAL</h1>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card hidden">
            <h1 style="margin-bottom: 20px;">OmniBio</h1>
            <button class="btn" style="background: #5865f2; color: white;" onclick="login()">ENTRAR COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden">
            <div class="admin-scroll">
                <h2 style="margin-bottom: 20px;">Configurar Perfil</h2>
                
                <label>Nick na URL</label>
                <input type="text" id="username" placeholder="ex: pastel">
                
                <label>Nome no Perfil</label>
                <input type="text" id="display_name" placeholder="Seu Nome">
                
                <label>Frase Personalizada</label>
                <textarea id="bio_text" placeholder="Ex: Eu e você contra todos"></textarea>
                
                <label>Links (icone,link | icone,link)</label>
                <textarea id="links_input" placeholder="instagram,link | tiktok,link"></textarea>

                <div class="toggle-container">
                    <span>Exibir Status do Discord?</span>
                    <input type="checkbox" id="show_discord" style="width: 20px; margin: 0;">
                </div>
                
                <label>Imagens e Música</label>
                <input type="file" id="pfp-f">
                <input type="file" id="bg-f">
                <input type="file" id="audio-f">

                <button class="btn btn-save" onclick="saveBio()" id="save-btn">SALVAR TUDO</button>
                <div id="success-link" style="margin-top: 15px; font-size: 0.7rem; text-align: center;"></div>
                <button onclick="logout()" style="background:none; border:none; color:red; margin-top:20px; cursor:pointer; font-size:0.7rem; width:100%;">Sair</button>
            </div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="view-pfp" class="pfp-view" src="">
            <h1 id="view-name" class="display-name"></h1>
            <p id="view-frase" class="bio-text-view"></p>

            <a id="dc-link" class="discord-card hidden" target="_blank">
                <div class="dc-img">
                    <img id="dc-pfp" src="">
                    <div id="dc-status" class="status-dot"></div>
                </div>
                <div>
                    <h3 id="dc-user" style="font-size:0.9rem;"></h3>
                    <p id="dc-activity" style="font-size:0.75rem; color:#888;"></p>
                </div>
            </a>

            <div id="social-icons" class="social-links"></div>
            
            <div class="views-badge">
                <i class="fa-regular fa-eye"></i> <span id="view-count">0</span>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let currentBio = null;

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                const { data } = await _supabase.from('bios').select('*').eq('username', u).maybeSingle();
                if (data) { 
                    currentBio = data; 
                    document.getElementById('enter-screen').classList.remove('hidden');
                    await _supabase.rpc('increment_views', { target_username: u });
                }
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) loadAdmin(session.user);
                else document.getElementById('login-ui').classList.remove('hidden');
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); window.location.reload(); }

        async function loadAdmin(user) {
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('bio_text').value = data.bio_text || "";
                document.getElementById('links_input').value = data.links || "";
                document.getElementById('show_discord').checked = data.show_discord !== false;
                const link = `${window.location.origin}${window.location.pathname}?u=${data.username}`;
                document.getElementById('success-link').innerHTML = `Link: <a href="${link}" target="_blank" style="color:var(--accent)">${link}</a>`;
            }
        }

        async function saveBio() {
            const { data: { user } } = await _supabase.auth.getUser();
            const btn = document.getElementById('save-btn');
            btn.innerText = "SALVANDO..."; btn.disabled = true;

            const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            let pfp = curr?.pfp_url, bg = curr?.bg_url, aud = curr?.audio_url;

            const uploadAsset = async (file, folder) => {
                if(!file) return null;
                const path = `${folder}/${user.id}`;
                await _supabase.storage.from('assets').upload(path, file, {upsert:true});
                return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl + "?t=" + Date.now();
            };

            const newPfp = await uploadAsset(document.getElementById('pfp-f').files[0], 'pfp');
            const newBg = await uploadAsset(document.getElementById('bg-f').files[0], 'bg');
            const newAud = await uploadAsset(document.getElementById('audio-f').files[0], 'audio');

            const payload = {
                user_id: user.id,
                username: document.getElementById('username').value.trim().toLowerCase(),
                display_name: document.getElementById('display_name').value,
                bio_text: document.getElementById('bio_text').value, // Fix aqui
                links: document.getElementById('links_input').value,
                show_discord: document.getElementById('show_discord').checked, // Fix aqui
                discord_id: user.identities[0].id,
                pfp_url: newPfp || pfp, bg_url: newBg || bg, audio_url: newAud || aud
            };

            await _supabase.from('bios').upsert(payload, { onConflict: 'user_id' });
            location.reload();
        }

        function revealBio() {
            document.getElementById('enter-screen').classList.add('hidden');
            document.getElementById('bio-view').classList.remove('hidden');
            const d = currentBio;

            document.getElementById('view-name').innerText = d.display_name;
            document.getElementById('view-frase').innerText = d.bio_text || "";
            document.getElementById('view-pfp').src = d.pfp_url || "";
            document.getElementById('view-count').innerText = d.views || 0;

            if(d.bg_url) {
                if(d.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) { const a = document.getElementById('bg-audio'); a.src = d.audio_url; a.play(); }

            if(d.links) {
                const socialDiv = document.getElementById('social-icons');
                d.links.split('|').forEach(item => {
                    const [icon, url] = item.split(',');
                    if(icon && url) {
                        const a = document.createElement('a');
                        a.href = url.trim(); a.target = "_blank"; a.className = "social-icon";
                        let iconClass = `fa-brands fa-${icon.trim().toLowerCase()}`;
                        if(icon.trim().toLowerCase() === 'link') iconClass = 'fa-solid fa-link';
                        a.innerHTML = `<i class="${iconClass}"></i>`;
                        socialDiv.appendChild(a);
                    }
                });
            }

            if(d.discord_id && d.show_discord !== false) {
                document.getElementById('dc-link').classList.remove('hidden');
                document.getElementById('dc-link').href = `https://discord.com/users/${d.discord_id}`;
                fetchLanyard(d.discord_id);
            }
        }

        async function fetchLanyard(id) {
            const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await res.json();
            if(data) {
                document.getElementById('dc-user').innerText = data.discord_user.global_name || data.discord_user.username;
                document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                const s = data.discord_status;
                document.getElementById('dc-status').style.background = s==='online'?'#23a559':s==='dnd'?'#f23f43':s==='idle'?'#f0b232':'#80848e';
                document.getElementById('dc-activity').innerText = data.activities[0]?.name || "Online";
            }
        }

        init();
    </script>
</body>
</html>
