<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Professional Identity System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --surface-light: #121212;
            --border: #1f1f1f;
            --accent: #0071e3;
            --text: #ffffff;
            --text-dim: #86868b;
            --success: #28cd41;
            --error: #ff3b30;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }
        .hidden { display: none !important; }
        
        #effects-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- DASHBOARD --- */
        .dash-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 40px 24px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        .main-content { padding: 60px; max-width: 1000px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px; margin-bottom: 30px; animation: fadeIn 0.6s ease; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .card-header i { color: var(--accent); font-size: 20px; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px 18px; border-radius: 12px; color: white; margin-bottom: 20px; outline: none; transition: var(--transition); }
        input:focus { border-color: var(--accent); }

        /* --- SOCIAL GRID --- */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .social-input-group { position: relative; }
        .social-input-group i { position: absolute; left: 15px; top: 38px; color: var(--text-dim); }
        .social-input-group input { padding-left: 45px; }

        /* --- UPLOAD SYSTEM --- */
        .drop-zone { height: 120px; border: 2px dashed var(--border); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); position: relative; background: rgba(255,255,255,0.01); overflow: hidden; margin-bottom: 20px; }
        .progress-bar-wrap { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: rgba(0,0,0,0.2); }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s; }

        /* --- PROFILE VIEW --- */
        #profile-render { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; z-index: 5; }
        .p-card { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 480px; border-radius: 40px; padding: 60px 40px; text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        .p-avatar { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent); margin-bottom: 25px; box-shadow: 0 0 30px rgba(0,113,227,0.3); }
        
        .social-links-row { display: flex; justify-content: center; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .social-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; text-decoration: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .social-icon:hover { transform: translateY(-5px); background: var(--accent); }

        /* --- SHARE CARD --- */
        .link-share-card { background: linear-gradient(135deg, #0071e3 0%, #003a75 100%); border: none; color: white; }
        .link-box { background: rgba(0,0,0,0.3); padding: 14px 18px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; }

        #toast { position: fixed; top: 30px; right: 30px; z-index: 10000; background: var(--surface-light); border: 1px solid var(--border); padding: 18px 28px; border-radius: 18px; }
    </style>
</head>
<body>

    <canvas id="effects-canvas"></canvas>

    <div id="toast" class="hidden animate__animated">
        <span id="toast-msg"></span>
    </div>

    <section id="view-home" class="hidden">
        <div class="container" style="padding-top: 120px; text-align: center;">
            <h1 style="font-size: clamp(48px, 10vw, 80px); font-weight: 800; letter-spacing: -4px;">OmniBio<span style="color:var(--accent)">.</span></h1>
            <button class="btn btn-primary" onclick="login()" style="margin-top: 30px; padding: 18px 45px;">Criar Perfil com Discord</button>
            <div id="home-ranking-list" style="max-width: 650px; margin: 80px auto;"></div>
        </div>
    </section>

    <section id="view-admin" class="hidden">
        <div class="dash-layout">
            <aside class="sidebar">
                <div style="font-size: 24px; font-weight: 900; margin-bottom: 50px;">OmniBio<span style="color:var(--accent)">.</span></div>
                <div style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
                        <img id="admin-pfp" style="width: 40px; height: 40px; border-radius: 50%;">
                        <p id="admin-name" style="font-weight: 700; font-size: 14px;"></p>
                    </div>
                </div>
                <button class="btn btn-ghost" onclick="logout()" style="width: 100%; color: var(--error);">Sair</button>
            </aside>

            <main class="main-content">
                <div class="card link-share-card">
                    <h2>🚀 Seu Link Ativo</h2>
                    <div class="link-box">
                        <span id="display-share-url">omnibio.com/?u=...</span>
                        <button onclick="copyLink()" class="btn" style="background:white; color:var(--accent)">Copiar</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-share-nodes"></i><h2>Redes Sociais</h2></div>
                    <div class="social-grid">
                        <div class="social-input-group"><label>Instagram</label><i class="fa-brands fa-instagram"></i><input type="text" id="social_instagram"></div>
                        <div class="social-input-group"><label>TikTok</label><i class="fa-brands fa-tiktok"></i><input type="text" id="social_tiktok"></div>
                        <div class="social-input-group"><label>Discord</label><i class="fa-brands fa-discord"></i><input type="text" id="social_discord"></div>
                        <div class="social-input-group"><label>Twitter</label><i class="fa-brands fa-x-twitter"></i><input type="text" id="social_twitter"></div>
                        <div class="social-input-group"><label>Facebook</label><i class="fa-brands fa-facebook"></i><input type="text" id="social_facebook"></div>
                        <div class="social-input-group"><label>YouTube</label><i class="fa-brands fa-youtube"></i><input type="text" id="social_youtube"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-wand-magic-sparkles"></i><h2>Efeitos e Identidade</h2></div>
                    <select id="db_effect">
                        <option value="none">Nenhum Efeito</option>
                        <option value="sakura">Pétalas de Sakura (Premium)</option>
                        <option value="cyber">Cyber Lines (Hacker)</option>
                        <option value="matrix">Matrix Code</option>
                        <option value="snow">Neve</option>
                        <option value="stars">Estrelas</option>
                    </select>
                    <label>Username</label><input type="text" id="db_username">
                    <label>Nome de Exibição</label><input type="text" id="db_display_name">
                    <label>Biografia</label><textarea id="db_bio" rows="3"></textarea>
                </div>

                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-upload"></i><h2>Mídia</h2></div>
                    <label>Foto de Perfil</label>
                    <div class="drop-zone" onclick="document.getElementById('f_pfp').click()">
                        <p>Upload PFP</p>
                        <input type="file" id="f_pfp" class="hidden" onchange="processUpload(this, 'pfp_url')">
                        <div class="progress-bar-wrap"><div class="progress-fill" id="fill_pfp_url"></div></div>
                    </div>
                    <input type="hidden" id="pfp_url">

                    <label>Banner/Vídeo MP4</label>
                    <div class="drop-zone" onclick="document.getElementById('f_bg').click()">
                        <p>Upload Background</p>
                        <input type="file" id="f_bg" class="hidden" onchange="processUpload(this, 'bg_url')">
                        <div class="progress-bar-wrap"><div class="progress-fill" id="fill_bg_url"></div></div>
                    </div>
                    <input type="hidden" id="bg_url">

                    <label>Música MP3</label>
                    <div class="drop-zone" onclick="document.getElementById('f_audio').click()">
                        <p>Upload Música</p>
                        <input type="file" id="f_audio" class="hidden" onchange="processUpload(this, 'audio_url')">
                        <div class="progress-bar-wrap"><div class="progress-fill" id="fill_audio_url"></div></div>
                    </div>
                    <input type="hidden" id="audio_url">

                    <button class="btn btn-primary" style="width: 100%; padding: 20px;" onclick="saveBioData()">SALVAR TUDO</button>
                </div>
            </main>
        </div>
    </section>

    <section id="view-profile" class="hidden">
        <div id="profile-render">
            <div class="p-card animate__animated animate__zoomIn">
                <img id="v-avatar" class="p-avatar">
                <h1 id="v-display-name"></h1>
                <p id="v-username" style="color:var(--accent); margin-bottom: 15px;"></p>
                <p id="v-bio-text" style="margin-bottom: 25px;"></p>
                
                <div id="v-discord-box" class="hidden" style="background: rgba(255,255,255,0.06); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.1);">
                    <div style="position: relative;">
                        <img id="v-dc-avatar" style="width: 45px; height: 45px; border-radius: 10px;">
                        <div id="v-dc-status" style="position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #111;"></div>
                    </div>
                    <div>
                        <div id="v-dc-user" style="font-weight: 800; font-size: 13px;"></div>
                        <div id="v-dc-activity" style="font-size: 11px; color: #aaa;"></div>
                    </div>
                </div>

                <div class="social-links-row" id="v-social-row"></div>
            </div>
        </div>
    </section>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let activeUser = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const u = params.get('u');
            if (u) { loadProfile(u); } 
            else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) { activeUser = session.user; loadAdmin(); } 
                else { document.getElementById('view-home').classList.remove('hidden'); loadRanking(); }
            }
        }

        // MOTOR DE EFEITOS CANVAS (SAKURA, CYBER, ETC)
        function startEffect(type) {
            if (!type || type === 'none') return;
            const canvas = document.getElementById('effects-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];

            if (type === 'sakura') {
                for(let i=0; i<40; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*8+4, v: Math.random()*1.5+0.5, r: Math.random()*360 });
                function animate() {
                    ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = '#ffb7c5';
                    particles.forEach(p => {
                        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI/180);
                        ctx.beginPath(); ctx.ellipse(0,0, p.s, p.s/2, 0, 0, 2*Math.PI); ctx.fill(); ctx.restore();
                        p.y += p.v; p.x += Math.sin(p.y/50); if(p.y > canvas.height) p.y = -10;
                    });
                    requestAnimationFrame(animate);
                } animate();
            } else if (type === 'cyber') {
                for(let i=0; i<50; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5 });
                function animate() {
                    ctx.clearRect(0,0,canvas.width, canvas.height); ctx.strokeStyle = 'rgba(0,113,227,0.2)';
                    particles.forEach((p, i) => {
                        p.x += p.vx; p.y += p.vy;
                        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        for(let j=i+1; j<particles.length; j++){
                            let d = Math.hypot(p.x-particles[j].x, p.y-particles[j].y);
                            if(d < 150) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                        }
                    });
                    requestAnimationFrame(animate);
                } animate();
            } else {
                // Efeitos básicos (Snow, Stars, Matrix) do seu código original
                const presets = { snow: '❄', stars: '★', matrix: '01' };
                for(let i=0; i<50; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*2+1 });
                function animate() {
                    ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = type === 'matrix' ? '#0f0' : '#fff';
                    particles.forEach(p => {
                        ctx.fillText(type === 'matrix' ? Math.round(Math.random()) : presets[type], p.x, p.y);
                        p.y += p.v; if(p.y > canvas.height) p.y = -20;
                    });
                    requestAnimationFrame(animate);
                } animate();
            }
        }

        async function processUpload(input, field) {
            const file = input.files[0]; if (!file) return;
            const fill = document.getElementById(`fill_${field}`);
            fill.style.width = '30%';
            const path = `${activeUser.id}/${field}_${Date.now()}.${file.name.split('.').pop()}`;
            const { error } = await _supabase.storage.from('assets').upload(path, file, { upsert: true });
            if (!error) {
                const { data: { publicUrl } } = _supabase.storage.from('assets').getPublicUrl(path);
                document.getElementById(field).value = publicUrl;
                fill.style.width = '100%';
                toast("Upload Concluído!");
            }
        }

        async function saveBioData() {
            const payload = {
                user_id: activeUser.id,
                username: document.getElementById('db_username').value.trim().toLowerCase(),
                display_name: document.getElementById('db_display_name').value,
                bio_text: document.getElementById('db_bio').value,
                pfp_url: document.getElementById('pfp_url').value,
                bg_url: document.getElementById('bg_url').value,
                audio_url: document.getElementById('audio_url').value,
                effect_type: document.getElementById('db_effect').value,
                instagram: document.getElementById('social_instagram').value,
                tiktok: document.getElementById('social_tiktok').value,
                discord: document.getElementById('social_discord').value,
                twitter: document.getElementById('social_twitter').value,
                facebook: document.getElementById('social_facebook').value,
                youtube: document.getElementById('social_youtube').value,
                discord_id: activeUser.user_metadata.provider_id
            };
            const { error } = await _supabase.from('bios').upsert(payload, { onConflict: 'user_id' });
            if(!error) toast("Perfil Salvo!");
        }

        async function loadProfile(u) {
            const { data } = await _supabase.from('bios').select('*').eq('username', u).maybeSingle();
            if(!data) return;
            document.getElementById('view-profile').classList.remove('hidden');
            document.getElementById('v-display-name').innerText = data.display_name || u;
            document.getElementById('v-username').innerText = `@${u}`;
            document.getElementById('v-bio-text').innerText = data.bio_text;
            document.getElementById('v-avatar').src = data.pfp_url || `https://ui-avatars.com/api/?name=${u}`;
            
            // Background / Video / Audio
            if(data.bg_url) {
                if(data.bg_url.endsWith('.mp4')) {
                    const v = document.createElement('video'); v.src = data.bg_url; v.autoplay = v.loop = v.muted = true;
                    v.style = "position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;";
                    document.body.appendChild(v);
                } else { document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`; }
            }
            if(data.audio_url) {
                const a = new Audio(data.audio_url); a.loop = true;
                document.body.addEventListener('click', () => a.play(), {once:true});
            }

            // Redes Sociais
            const socials = [
                {id: 'instagram', icon: 'fa-instagram'}, {id: 'tiktok', icon: 'fa-tiktok'},
                {id: 'discord', icon: 'fa-discord'}, {id: 'twitter', icon: 'fa-x-twitter'},
                {id: 'facebook', icon: 'fa-facebook'}, {id: 'youtube', icon: 'fa-youtube'}
            ];
            const row = document.getElementById('v-social-row');
            socials.forEach(s => {
                if(data[s.id]) row.innerHTML += `<a href="${data[s.id]}" target="_blank" class="social-icon"><i class="fa-brands ${s.icon}"></i></a>`;
            });

            startEffect(data.effect_type);
            if(data.discord_id) loadDiscord(data.discord_id);
            _supabase.rpc('increment_views', { target_username: u });
        }

        async function loadDiscord(id) {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
                const { data } = await res.json();
                if(data) {
                    document.getElementById('v-discord-box').classList.remove('hidden');
                    document.getElementById('v-dc-user').innerText = data.discord_user.username;
                    document.getElementById('v-dc-avatar').src = `https://cdn.discordapp.com/avatars/${id}/${data.discord_user.avatar}.png`;
                    const statusColors = { online: '#23a559', idle: '#f0b232', dnd: '#f23f43', offline: '#80848e' };
                    document.getElementById('v-dc-status').style.background = statusColors[data.discord_status];
                    document.getElementById('v-dc-activity').innerText = data.activities.length ? data.activities[0].name : 'Disponível';
                }
            } catch(e){}
        }

        async function loadAdmin() {
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('admin-pfp').src = activeUser.user_metadata.avatar_url;
            document.getElementById('admin-name').innerText = activeUser.user_metadata.full_name;
            const { data } = await _supabase.from('bios').select('*').eq('user_id', activeUser.id).maybeSingle();
            if(data) {
                document.getElementById('db_username').value = data.username || '';
                document.getElementById('db_display_name').value = data.display_name || '';
                document.getElementById('db_bio').value = data.bio_text || '';
                document.getElementById('pfp_url').value = data.pfp_url || '';
                document.getElementById('bg_url').value = data.bg_url || '';
                document.getElementById('audio_url').value = data.audio_url || '';
                document.getElementById('db_effect').value = data.effect_type || 'none';
                // Preencher Redes Sociais
                ['instagram','tiktok','discord','twitter','facebook','youtube'].forEach(s => {
                    document.getElementById(`social_${s}`).value = data[s] || '';
                });
                document.getElementById('display-share-url').innerText = `omnibio.com/?u=${data.username}`;
            }
        }

        async function loadRanking() {
            const { data } = await _supabase.from('bios').select('username, display_name, views').order('views', {ascending:false}).limit(5);
            if(data) {
                document.getElementById('home-ranking-list').innerHTML = data.map((p, i) => `
                    <div style="background:var(--surface); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between;">
                        <span>#${i+1} ${p.display_name || p.username}</span>
                        <span style="color:var(--accent)">${p.views} views</span>
                    </div>
                `).join('');
            }
        }

        function toast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = m;
            t.classList.remove('hidden'); t.classList.add('animate__fadeInDown');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); location.reload(); }
        function copyLink() { navigator.clipboard.writeText(document.getElementById('display-share-url').innerText); toast("Link Copiado!"); }

        init();
    </script>
</body>
</html>
