<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Elite System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --accent: #b026ff; --bg: #030303; --card-bg: rgba(10, 10, 10, 0.6); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* BACKGROUND */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; backdrop-filter: blur(10px); }

        /* WRAPPER & BEAT SYSTEM */
        .wrapper { width: 100%; max-width: 420px; padding: 20px; z-index: 10; transition: transform 0.1s ease-out; }
        .card { 
            background: var(--card-bg); backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 40px; padding: 40px 30px; text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* ADMIN ELEMENTS */
        #admin-ui { max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .field { margin-bottom: 18px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        input, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 15px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .up-box { padding: 15px; border: 1px solid #222; border-radius: 18px; cursor: pointer; text-align: center; transition: 0.3s; background: rgba(255,255,255,0.01); }
        .up-box:hover { border-color: var(--accent); background: rgba(176,38,255,0.05); }
        .up-box i { display: block; font-size: 1rem; margin-bottom: 5px; color: #444; }
        .up-box span { font-size: 0.55rem; font-weight: 800; color: #888; text-transform: uppercase; }

        /* SWITCH STATUS */
        .switch-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 12px 18px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
        .switch-row span { font-size: 0.75rem; font-weight: 600; color: #aaa; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* LINK PREVIEW */
        .profile-link-box { margin-top: 20px; padding: 15px; background: rgba(176,38,255,0.1); border-radius: 15px; border: 1px dashed var(--accent); font-size: 0.75rem; color: #eee; word-break: break-all; }

        /* PROFILE VIEW */
        .pfp-view { width: 120px; height: 120px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 20px; object-fit: cover; transition: transform 0.1s ease-out; }
        .bio-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; letter-spacing: -1.5px; }
        .link-item { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; color: #fff; text-decoration: none; font-weight: 600; margin-bottom: 12px; transition: 0.3s; }
        .link-item:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); border-color: var(--accent); }

        .btn-save { background: #fff; color: #000; padding: 18px; border-radius: 18px; border: none; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop crossorigin="anonymous"></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="startElite()">
        <h1 style="font-size: 0.8rem; letter-spacing: 10px; font-weight: 300; animation: pulse 2s infinite;">CLICK TO ENTER</h1>
    </div>

    <div class="wrapper" id="main-wrapper">
        
        <div id="login-ui" class="card">
            <h1 style="font-size: 2.2rem; margin-bottom: 30px;">Omni<span style="color:var(--accent)">Bio</span></h1>
            <button class="btn-save" style="background:#5865f2; color:#fff;" onclick="login()">
                <i class="fab fa-discord"></i> LOGIN COM DISCORD
            </button>
        </div>

        <div id="admin-ui" class="card hidden">
            <label style="text-align:center; margin-bottom:20px; color:var(--accent)">DASHBOARD PROFISSIONAL</label>
            
            <div class="field"><label>Seu Nick (URL)</label><input type="text" id="username"></div>
            <div class="field"><label>Nome de Exibição</label><input type="text" id="display_name"></div>

            <div class="switch-row">
                <span>Mostrar Status Discord</span>
                <label class="switch">
                    <input type="checkbox" id="show_discord_toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="upload-grid">
                <div class="up-box" onclick="document.getElementById('pfp-input').click()">
                    <i class="fas fa-user"></i><span id="txt-pfp">ESCOLHER</span>
                </div>
                <div class="up-box" onclick="document.getElementById('bg-input').click()">
                    <i class="fas fa-image"></i><span id="txt-bg">ESCOLHER</span>
                </div>
            </div>
            <input type="file" id="pfp-input" class="hidden">
            <input type="file" id="bg-input" class="hidden">

            <div class="field">
                <div class="up-box" style="width:100%" onclick="document.getElementById('audio-input').click()">
                    <i class="fas fa-bolt"></i><span id="txt-audio">ESCOLHER MÚSICA (BEAT SYNC)</span>
                </div>
                <input type="file" id="audio-input" class="hidden">
            </div>

            <div class="field"><label>Links (Nome,URL|Nome,URL)</label><textarea id="links" rows="2"></textarea></div>
            
            <button class="btn-save" onclick="saveBio()" id="save-btn">ATUALIZAR PERFIL</button>

            <div id="profile-link-display" class="profile-link-box hidden"></div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name" class="bio-title"></h1>
            
            <div id="discord-presence" class="hidden" style="background:rgba(0,0,0,0.5); border-radius:22px; padding:15px; margin-bottom:25px; display:flex; align-items:center; gap:15px; text-align:left; border:1px solid rgba(255,255,255,0.03);">
                <div style="position:relative; width:45px; height:45px;">
                    <img id="dc-pfp" style="width:100%; height:100%; border-radius:12px;">
                    <div id="dc-status" style="position:absolute; bottom:-2px; right:-2px; width:12px; height:12px; border-radius:50%; border:2px solid #111;"></div>
                </div>
                <div>
                    <h4 id="dc-user" style="font-size:0.8rem; font-weight:800;"></h4>
                    <p id="dc-activity" style="font-size:0.65rem; color:#888;"></p>
                </div>
            </div>

            <div id="bio-links-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let bioData = null, analyser, dataArray;

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const nick = new URLSearchParams(window.location.search).get('u');
            if (nick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
                bioData = data;
            } else if (session) {
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                document.getElementById('show_discord_toggle').checked = data.show_discord !== false;
                
                if(data.pfp_url) document.getElementById('txt-pfp').innerText = "MUDAR";
                if(data.bg_url) document.getElementById('txt-bg').innerText = "MUDAR";
                if(data.audio_url) document.getElementById('txt-audio').innerText = "MUDAR";

                if(data.username) {
                    const link = `${window.location.origin}${window.location.pathname}?u=${data.username}`;
                    const box = document.getElementById('profile-link-display');
                    box.classList.remove('hidden');
                    box.innerHTML = `<strong>Seu Link:</strong><br><a href="${link}" style="color:var(--accent)">${link}</a>`;
                }
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "ATUALIZANDO...";

            const { data: cur } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            let pfp = cur?.pfp_url, bg = cur?.bg_url, audio = cur?.audio_url;

            const up = async (id, folder) => {
                const f = document.getElementById(id).files[0];
                if(!f) return null;
                const path = `${folder}/${user.id}`;
                await _supabase.storage.from('assets').upload(path, f, {upsert: true});
                return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl + "?v=" + Date.now();
            };

            const nPfp = await up('pfp-input', 'pfp'); if(nPfp) pfp = nPfp;
            const nBg = await up('bg-input', 'bg'); if(nBg) bg = nBg;
            const nAud = await up('audio-input', 'audio'); if(nAud) audio = nAud;

            await _supabase.from('bios').upsert({
                user_id: user.id, username: document.getElementById('username').value.trim().toLowerCase(),
                display_name: document.getElementById('display_name').value,
                show_discord: document.getElementById('show_discord_toggle').checked,
                links: document.getElementById('links').value,
                pfp_url: pfp, bg_url: bg, audio_url: audio,
                discord_id: user.identities.find(i => i.provider === 'discord').id
            });
            location.reload();
        }

        function startElite() {
            document.getElementById('enter-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-screen').classList.add('hidden'), 1000);
            
            const data = bioData;
            document.getElementById('bio-view').classList.remove('hidden');

            const audio = document.getElementById('bg-audio');
            if(data.audio_url) {
                audio.src = data.audio_url; audio.play();
                setupVisualizer(audio);
            }

            if(data.bg_url) {
                if(data.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = data.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
            }

            document.getElementById('bio-pfp').src = data.pfp_url;
            document.getElementById('bio-name').innerText = data.display_name;

            const cont = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [n, u] = l.split(',');
                if(n && u) {
                    const a = document.createElement('a'); a.className = 'link-item'; a.href = u; a.target = "_blank";
                    let icon = '<i class="fas fa-link"></i>';
                    if(u.includes('discord')) icon = '<i class="fab fa-discord"></i>';
                    else if(u.includes('instagram')) icon = '<i class="fab fa-instagram"></i>';
                    a.innerHTML = `${icon} ${n}`;
                    cont.appendChild(a);
                }
            });

            if(data.show_discord && data.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                updateDC(data.discord_id);
            }
        }

        function setupVisualizer(audio) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaElementSource(audio);
            analyser = ctx.createAnalyser();
            src.connect(analyser); analyser.connect(ctx.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            animateBeat();
        }

        function animateBeat() {
            analyser.getByteFrequencyData(dataArray);
            const lowFreq = dataArray.slice(0, 4).reduce((a, b) => a + b) / 4;
            const boost = lowFreq / 255;
            const wrap = document.getElementById('main-wrapper');
            const pfp = document.getElementById('bio-pfp');

            if (lowFreq > 140) {
                const s = 1 + (boost * 0.1);
                wrap.style.transform = `scale(${s}) translateY(-${boost * 15}px)`;
                pfp.style.borderWeight = `${2 + boost * 5}px`;
                pfp.style.borderColor = `rgba(176, 38, 255, ${boost})`;
            } else {
                wrap.style.transform = `scale(1) translateY(0)`;
            }
            requestAnimationFrame(animateBeat);
        }

        async function updateDC(id) {
            const r = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await r.json();
            if(!data) return;
            document.getElementById('dc-user').innerText = data.discord_user.display_name || data.discord_user.username;
            document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
            document.getElementById('dc-status').style.background = data.discord_status === 'online' ? '#23a559' : '#f23f43';
            document.getElementById('dc-activity').innerText = data.activities[0]?.name || "Online";
        }
    </script>
</body>
</html>
