<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio - Superior Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        
        :root { --primary: #b026ff; --accent: #00ffcc; }
        * { box-sizing: border-box; cursor: crosshair; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* --- ESTILO DA BIO --- */
        #bg-dynamic { position: fixed; inset: 0; background-size: cover; background-position: center; filter: brightness(0.3) blur(2px); z-index: -2; transition: 1s; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent, #000); z-index: -1; }
        
        .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; perspective: 1000px; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 40px; width: 100%; max-width: 400px; text-align: center; transform-style: preserve-3d; transition: 0.1s; display: none; }
        
        .pfp { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); padding: 5px; margin-bottom: 15px; }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-block; background: #747f8d; margin-right: 5px; }
        .online { background: #43b581; box-shadow: 0 0 10px #43b581; }

        /* --- ESTILO DO PAINEL ADMIN --- */
        #admin-panel { max-width: 600px; margin: 50px auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        .result-link { background: #002211; border: 1px dashed var(--accent); padding: 15px; margin-top: 20px; word-break: break-all; display: none; }

        /* Animações */
        .listening { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="bg-dynamic"></div>
    <div class="overlay"></div>
    <div class="container" id="bio-ui">
        <div class="card" id="main-card">
            <img id="user-pfp" src="" class="pfp">
            <h1 id="user-name" style="margin:0; font-weight: 800;">NICKNAME</h1>
            <p id="user-bio" style="color: #aaa;"></p>
            <div id="status-area"><span id="dot" class="status-dot"></span><span id="status-text">OFFLINE</span></div>
            <div id="links-area" style="margin-top: 20px;"></div>
            <div class="listening">🎵 <span id="track-name">Carregando rádio...</span></div>
        </div>
    </div>

    <div id="admin-panel">
        <h2 style="color: var(--primary)">OmniBio Generator</h2>
        <p style="color: #666">Crie sua bio superior ao guns.lol em segundos.</p>
        
        <input type="text" id="in-id" placeholder="Seu ID do Discord (Lanyard)">
        <input type="text" id="in-nome" placeholder="Seu Nome/Nick">
        <input type="text" id="in-tema" placeholder="Tema do Fundo (ex: cyberpunk, space, forest)">
        <textarea id="in-links" placeholder="Links (Formato: Nome,url|Nome2,url2)"></textarea>
        
        <button onclick="generateLink()">GERAR MEU LINK DE BIO</button>
        
        <div id="result" class="result-link">
            <p>Seu link pronto:</p>
            <code id="final-url"></code>
            <button style="margin-top:10px; background:#333" onclick="copyLink()">COPIAR LINK</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const audio = new Audio();

        // Lógica de Inicialização
        if (params.has('id')) {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';
            startBio();
        }

        function startBio() {
            const theme = params.get('tema') || 'dark';
            document.getElementById('bg-dynamic').style.backgroundImage = `url('https://source.unsplash.com/featured/1920x1080?${theme}')`;
            
            updateDiscord();
            fetchMusic(theme);
            renderLinks();
            
            // Tilt 3D
            document.addEventListener('mousemove', e => {
                let x = (window.innerWidth / 2 - e.clientX) / 20;
                let y = (window.innerHeight / 2 - e.clientY) / 20;
                document.getElementById('main-card').style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
        }

        async function updateDiscord() {
            const id = params.get('id');
            const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await res.json();
            
            document.getElementById('user-name').innerText = (params.get('nome') || data.discord_user.username).toUpperCase();
            document.getElementById('user-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
            document.getElementById('dot').className = `status-dot ${data.discord_status}`;
            document.getElementById('status-text').innerText = data.discord_status.toUpperCase();
        }

        async function fetchMusic(tag) {
            const res = await fetch(`https://api.jamendo.com/v3.0/tracks/?client_id=56d30c95&format=json&limit=1&order=random&tag=${tag}`);
            const data = await res.json();
            const track = data.results[0];
            audio.src = track.audio;
            document.getElementById('track-name').innerText = track.name;
            audio.play().catch(() => { document.getElementById('track-name').innerText = "Clique para ouvir música"; });
        }

        function renderLinks() {
            const raw = params.get('links');
            if(!raw) return;
            const area = document.getElementById('links-area');
            raw.split('|').forEach(link => {
                const [n, u] = link.split(',');
                const a = document.createElement('a');
                a.href = u; a.innerText = n;
                a.target = "_blank";
                a.style = "display:block; padding:12px; margin:8px 0; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; text-decoration:none; font-weight:bold;";
                area.appendChild(a);
            });
        }

        // Funções do Painel Admin
        function generateLink() {
            const id = document.getElementById('in-id').value;
            const nome = document.getElementById('in-nome').value;
            const tema = document.getElementById('in-tema').value;
            const links = document.getElementById('in-links').value;
            
            const base = window.location.origin + window.location.pathname;
            const final = `${base}?id=${id}&nome=${nome}&tema=${tema}&links=${links}`;
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('final-url').innerText = final;
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('final-url').innerText);
            alert("Link copiado!");
        }
    </script>
</body>
</html>
