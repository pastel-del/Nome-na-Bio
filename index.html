<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { --primary: #b026ff; --accent: #00ffcc; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #000; 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        /* VÍDEO DE FUNDO - OCUPA TUDO */
        #bg-video { 
            position: fixed; 
            top: 50%; left: 50%; 
            min-width: 100%; min-height: 100%; 
            width: auto; height: auto; 
            z-index: -2; 
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            display: none;
        }

        /* CAMADA ESCURA PARA DAR LEITURA */
        .overlay { 
            position: fixed; inset: 0; 
            background: rgba(0,0,0,0.6); 
            z-index: -1; 
        }

        .wrapper { width: 100%; max-width: 420px; padding: 20px; z-index: 10; }

        /* CARD ESTILO VIDRO */
        .card { 
            background: rgba(10, 10, 10, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px; 
            padding: 40px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* ELEMENTOS DA BIO */
        .pfp-view { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 3px solid var(--primary); 
            margin: 0 auto 20px; 
            object-fit: cover;
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.5);
        }

        .link-btn { 
            display: block; padding: 16px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 18px; color: #fff; 
            text-decoration: none; font-weight: 600; 
            margin-bottom: 12px; transition: 0.3s;
        }
        .link-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.03); border-color: var(--accent); }

        /* DASHBOARD ADMIN */
        .field { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.7rem; font-weight: 800; color: var(--primary); display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #fff; margin-top: 10px; }
        .btn-discord { background: #5865f2; color: #fff; }

        .hidden { display: none !important; }
        #status-box { margin-top: 15px; font-size: 0.8rem; color: var(--accent); }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline></video>
    <div class="overlay"></div>

    <div class="wrapper">
        
        <div id="login-ui" class="card">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Omni<span style="color:var(--primary)">Bio</span></h1>
            <p style="color:#888; margin-bottom: 25px;">Sua bio profissional estilo Guns.lol</p>
            <button class="btn btn-discord" onclick="login()">ENTRAR COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden">
            <h2 style="margin-bottom: 20px;">Configurar Bio</h2>
            <div class="field"><label>NICK DA URL</label><input type="text" id="username" placeholder="luan7"></div>
            <div class="field"><label>NOME NO PERFIL</label><input type="text" id="display_name" placeholder="Ex: Luan | Dev"></div>
            <div class="field"><label>FOTO PERFIL (URL)</label><input type="text" id="pfp-url" placeholder="Link da imagem"></div>
            <div class="field"><label>FUNDO MP4/IMG (URL)</label><input type="text" id="bg-url" placeholder="Link do vídeo ou imagem"></div>
            <div class="field"><label>LINKS (Nome,URL|Nome,URL)</label><textarea id="links" rows="2"></textarea></div>
            <button class="btn btn-primary" onclick="saveBio()">SALVAR PERFIL</button>
            <div id="status-box"></div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name" style="font-weight: 800; font-size: 2rem; margin-bottom: 30px;"></h1>
            <div id="bio-links-container"></div>
        </div>

    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlParams = new URLSearchParams(window.location.search);
            const userParam = urlParams.get('u');

            if (userParam) {
                // SE TIVER ?u= NO LINK, SÓ MOSTRA O PERFIL
                loadBio(userParam);
            } else if (session) {
                // SE NÃO TIVER PARÂMETRO E TIVER LOGADO, MOSTRA ADMIN
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');

            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('pfp-url').value = data.pfp_url || "";
                document.getElementById('bg-url').value = data.bg_url || "";
                document.getElementById('links').value = data.links || "";
                
                const finalLink = `${window.location.origin}${window.location.pathname}?u=${data.username}`;
                document.getElementById('status-box').innerHTML = `Seu link: <a href="${finalLink}" target="_blank" style="color:#fff">${finalLink}</a>`;
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const payload = {
                user_id: user.id,
                username: document.getElementById('username').value.trim().toLowerCase(),
                display_name: document.getElementById('display_name').value,
                pfp_url: document.getElementById('pfp-url').value,
                bg_url: document.getElementById('bg-url').value,
                links: document.getElementById('links').value
            };

            const { error } = await _supabase.from('bios').upsert(payload, { onConflict: 'user_id' });
            if (error) alert("Erro ao salvar!");
            else { alert("Perfil Atualizado!"); location.reload(); }
        }

        async function loadBio(nick) {
            const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
            if(!data) { alert("Perfil não encontrado!"); return; }

            // ESCONDE TUDO E MOSTRA SÓ A BIO
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.add('hidden');
            document.getElementById('bio-view').classList.remove('hidden');

            // VÍDEO MP4 NO FUNDO
            if(data.bg_url) {
                if(data.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video');
                    v.src = data.bg_url;
                    v.style.display = 'block';
                    v.play().catch(() => {
                        // Se o navegador bloquear o som, clica na tela para tocar
                        document.body.onclick = () => v.play();
                    });
                } else {
                    document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
                }
            }

            document.getElementById('bio-pfp').src = data.pfp_url || '';
            document.getElementById('bio-name').innerText = data.display_name || nick;

            const container = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [name, url] = l.split(',');
                if(name && url) {
                    const a = document.createElement('a');
                    a.className = 'link-btn'; a.href = url; a.target = "_blank"; a.innerText = name;
                    container.appendChild(a);
                }
            });
        }
    </script>
</body>
</html>
