<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio v3 | Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { --primary: #b026ff; --accent: #00ffcc; --bg: #0a0a0a; --glass: rgba(18, 18, 18, 0.8); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        /* Background & Video */
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; display: none; filter: brightness(0.5); }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 150%); z-index: -1; }

        /* Container Principal */
        .wrapper { width: 100%; max-width: 450px; padding: 20px; z-index: 10; }
        .card { 
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); width: 100%;
        }

        /* Inputs e Layout Proporcional */
        .field { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 8px; margin-left: 5px; }
        
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

        /* Preview Area */
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .preview-item { 
            width: 100%; aspect-ratio: 1 / 1; background: #000; border-radius: 15px; border: 1px solid #222;
            overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .preview-item span { font-size: 0.6rem; color: #444; position: absolute; }

        /* Botões */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #fff; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(176, 38, 255, 0.4); }
        .btn-discord { background: #5865f2; color: #fff; }

        /* Bio View Elements */
        .pfp-view { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary); margin: 0 auto 20px; object-fit: cover; }
        .link-btn { 
            display: block; width: 100%; padding: 16px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; 
            text-decoration: none; font-weight: 600; margin-bottom: 12px; transition: 0.2s;
        }
        .link-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: scale(1.02); }

        /* Utils */
        .hidden { display: none !important; }
        #status-link-box { 
            margin-top: 20px; padding: 15px; border-radius: 15px; background: rgba(0,255,204,0.1); 
            border: 1px solid var(--accent); font-size: 0.8rem; word-break: break-all;
        }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline></video>
    <div class="overlay"></div>

    <div class="wrapper">
        
        <div id="login-ui" class="card" style="text-align:center;">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Omni<span style="color:var(--primary)">Bio</span></h1>
            <p style="color:#666; margin-bottom: 25px; font-size: 0.9rem;">Sua página profissional em minutos.</p>
            <button class="btn btn-discord" onclick="login()">ENTRAR COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden">
            <h2 style="margin-bottom: 25px; font-size: 1.4rem;">Configurações</h2>
            
            <div class="field">
                <label>Nick da URL</label>
                <input type="text" id="username" placeholder="ex: luan7">
            </div>

            <div class="field">
                <label>Nome no Perfil</label>
                <input type="text" id="display_name" placeholder="Como as pessoas te verão">
            </div>

            <div class="preview-grid">
                <div class="field">
                    <label>Avatar</label>
                    <div class="preview-item" id="pfp-preview"><span>Preview</span></div>
                    <input type="file" id="pfp-input" accept="image/*" style="display:none" onchange="preview(this, 'pfp-preview')">
                    <button class="btn" style="background:#222; font-size:0.7rem; padding:10px;" onclick="document.getElementById('pfp-input').click()">UPLOAD</button>
                </div>
                <div class="field">
                    <label>Fundo</label>
                    <div class="preview-item" id="bg-preview"><span>Preview</span></div>
                    <input type="file" id="bg-input" accept="image/*,video/mp4" style="display:none" onchange="preview(this, 'bg-preview')">
                    <button class="btn" style="background:#222; font-size:0.7rem; padding:10px;" onclick="document.getElementById('bg-input').click()">UPLOAD</button>
                </div>
            </div>

            <div class="field">
                <label>Links (Nome,URL|Nome,URL)</label>
                <textarea id="links" rows="3" placeholder="Discord,https://..."></textarea>
            </div>

            <button class="btn btn-primary" onclick="saveBio()">SALVAR PERFIL</button>
            <div id="status-link-box" class="hidden"></div>
        </div>

        <div id="bio-view" class="card hidden" style="text-align:center;">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name" style="font-weight: 800; font-size: 1.8rem; margin-bottom: 25px;"></h1>
            <div id="bio-links-container"></div>
        </div>

    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        function preview(input, id) {
            const file = input.files[0];
            const box = document.getElementById(id);
            if(file) {
                const url = URL.createObjectURL(file);
                box.innerHTML = file.type.includes('video') ? `<video src="${url}" autoplay muted loop></video>` : `<img src="${url}">`;
            }
        }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('u')) loadBio(urlParams.get('u'));
            else if (session) showAdmin(session.user);
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');

            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                
                if(data.pfp_url) document.getElementById('pfp-preview').innerHTML = `<img src="${data.pfp_url}">`;
                if(data.bg_url) {
                    const tag = data.bg_url.endsWith('.mp4') ? `<video src="${data.bg_url}" autoplay muted loop></video>` : `<img src="${data.bg_url}">`;
                    document.getElementById('bg-preview').innerHTML = tag;
                }

                showFinalLink(data.username);
            }
        }

        function showFinalLink(nick) {
            const box = document.getElementById('status-link-box');
            const cleanUrl = window.location.href.split('?')[0];
            const final = `${cleanUrl}?u=${nick}`;
            box.classList.remove('hidden');
            box.innerHTML = `<span style="color:#888; font-size:0.7rem">SEU LINK:</span><br><a href="${final}" target="_blank" style="color:var(--accent); font-weight:800; text-decoration:none;">${final}</a>`;
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const nick = document.getElementById('username').value.trim().toLowerCase();
            if(!nick) return alert("Defina um Nick!");

            document.querySelector('.btn-primary').innerText = "SALVANDO...";

            try {
                let pfpUrl = null, bgUrl = null;
                const pfpF = document.getElementById('pfp-input').files[0];
                const bgF = document.getElementById('bg-input').files[0];

                if(pfpF) {
                    const path = `pfp/${user.id}`;
                    await _supabase.storage.from('assets').upload(path, pfpF, { upsert: true });
                    pfpUrl = _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl;
                }
                if(bgF) {
                    const path = `bg/${user.id}`;
                    await _supabase.storage.from('assets').upload(path, bgF, { upsert: true });
                    bgUrl = _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl;
                }

                const payload = {
                    user_id: user.id,
                    username: nick,
                    display_name: document.getElementById('display_name').value,
                    links: document.getElementById('links').value
                };
                if(pfpUrl) payload.pfp_url = pfpUrl;
                if(bgUrl) payload.bg_url = bgUrl;

                await _supabase.from('bios').upsert(payload, { onConflict: 'user_id' });
                alert("Perfil Atualizado!");
                location.reload();
            } catch (e) { alert(e.message); }
        }

        async function loadBio(nick) {
            const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
            if(!data) return;

            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.add('hidden');
            document.getElementById('bio-view').classList.remove('hidden');

            if(data.bg_url) {
                if(data.bg_url.endsWith('.mp4')) {
                    const v = document.getElementById('bg-video');
                    v.src = data.bg_url; v.style.display = 'block'; v.play();
                } else {
                    document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
                }
            }

            document.getElementById('bio-pfp').src = data.pfp_url || '';
            document.getElementById('bio-name').innerText = data.display_name || nick;

            const container = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [name, url] = l.split(',');
                if(name && url) {
                    const a = document.createElement('a');
                    a.className = 'link-btn'; a.href = url; a.target = "_blank"; a.innerText = name;
                    container.appendChild(a);
                }
            });
        }
    </script>
</body>
</html>
