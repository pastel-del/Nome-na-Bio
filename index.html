<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Elite Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { --primary: #fff; --accent: #b026ff; --bg: #030303; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* VÍDEO E MÍDIA */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: -1; backdrop-filter: blur(4px); }

        /* TELA DE ENTRADA */
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.6s ease; }
        #enter-screen h1 { font-size: 1rem; letter-spacing: 5px; animation: pulse 2s infinite; font-weight: 800; }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 10px #fff; } 50% { opacity: 0.3; text-shadow: none; } }

        /* CARDS */
        .wrapper { width: 100%; max-width: 440px; padding: 20px; z-index: 10; }
        .card { background: rgba(15, 15, 15, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; padding: 35px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        /* ELEMENTOS DO PERFIL */
        .pfp-view { width: 110px; height: 110px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); margin: 0 auto 20px; object-fit: cover; transition: 0.3s; }
        .pfp-view:hover { border-color: var(--accent); transform: scale(1.05); }

        .link-btn { 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 18px; color: #fff; text-decoration: none; font-weight: 600; margin-bottom: 12px; transition: 0.3s; 
        }
        .link-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); border-color: var(--accent); }
        .link-btn i { font-size: 1.2rem; width: 25px; text-align: center; }

        /* DISCORD CARD */
        .discord-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; text-align: left; gap: 15px; }
        .dc-avatar { width: 48px; height: 48px; position: relative; }
        .dc-avatar img { width: 100%; height: 100%; border-radius: 12px; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #111; }
        .online { background: #23a559; box-shadow: 0 0 10px #23a559; }

        /* PAINEL ADMIN */
        .field { margin-bottom: 18px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: #666; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid #222; color: #fff; border-radius: 14px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--accent); }
        
        /* BOTÕES DE UPLOAD ESTILIZADOS */
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .file-box { 
            position: relative; background: rgba(255,255,255,0.02); border: 1px solid #222; 
            padding: 12px; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s;
        }
        .file-box:hover { border-color: var(--accent); background: rgba(176, 38, 255, 0.05); }
        .file-box span { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .file-box p { font-size: 0.6rem; color: #555; margin-top: 4px; }
        .file-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn-discord { background: #5865f2; color: #fff; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="enterSite()">
        <h1>CLICK TO CONNECT</h1>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card">
            <h1 style="font-size: 2.2rem; margin-bottom: 30px;">Omni<span style="color:var(--accent)">Bio</span></h1>
            <button class="btn btn-discord" onclick="login()">
                <i class="fab fa-discord"></i> LOGIN COM DISCORD
            </button>
        </div>

        <div id="admin-ui" class="card hidden" style="max-height: 85vh; overflow-y: auto;">
            <div class="field"><label>Nick na URL</label><input type="text" id="username"></div>
            <div id="url-preview" style="font-size: 0.65rem; color: var(--accent); margin-top:-10px; margin-bottom: 15px; font-weight: 600;"></div>
            
            <div class="field"><label>Nome no Perfil</label><input type="text" id="display_name"></div>
            
            <div class="upload-grid">
                <div class="file-box">
                    <span id="label-pfp">Escolher</span>
                    <p>Avatar</p>
                    <input type="file" id="pfp-input" accept="image/*" onchange="updateLabel(this, 'label-pfp')">
                </div>
                <div class="file-box">
                    <span id="label-bg">Escolher</span>
                    <p>Fundo</p>
                    <input type="file" id="bg-input" accept="image/*,video/mp4" onchange="updateLabel(this, 'label-bg')">
                </div>
            </div>

            <div class="field">
                <div class="file-box">
                    <span id="label-audio">Escolher MP3</span>
                    <p>Música de Fundo</p>
                    <input type="file" id="audio-input" accept="audio/*" onchange="updateLabel(this, 'label-audio')">
                </div>
            </div>

            <div class="field">
                <label>Links (Nome,URL|Nome,URL)</label>
                <textarea id="links" rows="2" placeholder="Discord,https://...|Steam,https://..."></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="saveBio()" id="save-btn">Atualizar Perfil</button>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name" style="font-weight: 800; font-size: 1.8rem; margin-bottom: 25px;"></h1>
            
            <div id="discord-presence" class="discord-card hidden">
                <div class="dc-avatar">
                    <img id="dc-pfp" src="">
                    <div id="dc-status" class="status-dot offline"></div>
                </div>
                <div class="dc-info">
                    <h3 id="dc-user">User</h3>
                    <p id="dc-activity">Online</p>
                </div>
            </div>

            <div id="bio-links-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let userDiscordId = null;

        function updateLabel(input, labelId) {
            if (input.files.length > 0) {
                document.getElementById(labelId).innerText = "Mudar";
                document.getElementById(labelId).style.color = "#23a559";
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlNick = new URLSearchParams(window.location.search).get('u');
            if (urlNick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                const { data } = await _supabase.from('bios').select('*').eq('username', urlNick).maybeSingle();
                window.loadedBio = data;
            } else if (session) {
                const identity = session.user.identities.find(i => i.provider === 'discord');
                if(identity) userDiscordId = identity.id;
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                if(data.pfp_url) document.getElementById('label-pfp').innerText = "Mudar";
                if(data.bg_url) document.getElementById('label-bg').innerText = "Mudar";
                if(data.audio_url) document.getElementById('label-audio').innerText = "Mudar";
                
                if(data.username) {
                    const link = `${window.location.origin}${window.location.pathname}?u=${data.username}`;
                    document.getElementById('url-preview').innerText = link;
                }
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "Salvando...";
            
            const { data: cur } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            let pfp = cur?.pfp_url, bg = cur?.bg_url, audio = cur?.audio_url;

            const up = async (id, folder) => {
                const f = document.getElementById(id).files[0];
                if(!f) return null;
                const path = `${folder}/${user.id}`;
                await _supabase.storage.from('assets').upload(path, f, {upsert: true});
                return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl + "?v=" + Date.now();
            };

            const nPfp = await up('pfp-input', 'pfp'); if(nPfp) pfp = nPfp;
            const nBg = await up('bg-input', 'bg'); if(nBg) bg = nBg;
            const nAud = await up('audio-input', 'audio'); if(nAud) audio = nAud;

            await _supabase.from('bios').upsert({
                user_id: user.id, username: document.getElementById('username').value.trim().toLowerCase(),
                display_name: document.getElementById('display_name').value,
                links: document.getElementById('links').value,
                pfp_url: pfp, bg_url: bg, audio_url: audio, discord_id: userDiscordId
            });
            location.reload();
        }

        function enterSite() {
            document.getElementById('enter-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-screen').classList.add('hidden'), 600);
            const data = window.loadedBio;
            document.getElementById('bio-view').classList.remove('hidden');

            if(data.bg_url) {
                if(data.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = data.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
            }
            if(data.audio_url) { const a = document.getElementById('bg-audio'); a.src = data.audio_url; a.volume = 0.5; a.play(); }

            document.getElementById('bio-pfp').src = data.pfp_url;
            document.getElementById('bio-name').innerText = data.display_name;

            const container = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [name, url] = l.split(',');
                if(name && url) {
                    const a = document.createElement('a');
                    a.className = 'link-btn'; a.href = url; a.target = "_blank";
                    
                    // Lógica de Ícones Automáticos
                    let icon = '<i class="fas fa-link"></i>';
                    const u = url.toLowerCase();
                    if(u.includes('discord')) icon = '<i class="fab fa-discord"></i>';
                    else if(u.includes('instagram')) icon = '<i class="fab fa-instagram"></i>';
                    else if(u.includes('github')) icon = '<i class="fab fa-github"></i>';
                    else if(u.includes('youtube')) icon = '<i class="fab fa-youtube"></i>';
                    else if(u.includes('steam')) icon = '<i class="fab fa-steam"></i>';
                    else if(u.includes('twitter') || u.includes('x.com')) icon = '<i class="fab fa-twitter"></i>';
                    
                    a.innerHTML = `${icon} ${name}`;
                    container.appendChild(a);
                }
            });

            if(data.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                fetchDiscord(data.discord_id);
            }
        }

        async function fetchDiscord(id) {
            const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await res.json();
            if(data) {
                document.getElementById('dc-user').innerText = data.discord_user.display_name || data.discord_user.username;
                document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                document.getElementById('dc-status').className = `status-dot ${data.discord_status}`;
                document.getElementById('dc-activity').innerText = data.activities[0]?.name || "Online";
            }
        }
    </script>
</body>
</html>
