<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #050505; --surface: #111111; --border: #222222;
            --text-main: #ffffff; --text-dim: #888888; --accent: #0071e3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .hidden { display: none !important; }

        /* Estilo do Dashboard */
        .grid { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        h2 { font-size: 14px; margin-bottom: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* Inputs e Labels */
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }

        /* Zonas de Upload (Drag & Drop) */
        .upload-zone {
            border: 2px dashed var(--border); border-radius: 12px; padding: 20px;
            text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 10px;
            position: relative; overflow: hidden;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(0, 113, 227, 0.05); }
        .upload-zone i { font-size: 24px; color: var(--text-dim); margin-bottom: 10px; }
        .upload-zone span { display: block; font-size: 12px; color: var(--text-dim); }
        .upload-progress { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--accent); width: 0%; transition: 0.3s; }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; display: block; text-align: center; }
        .btn-primary { background: var(--accent); color: white; }
        
        /* Profile Preview no Admin */
        .preview-img-small { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; margin-top: 5px; border: 1px solid var(--border); }
        
        /* Ranking */
        .rank-item { display: flex; align-items: center; gap: 12px; padding: 12px; text-decoration: none; color: inherit; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section" class="hidden">
            <h1 style="text-align:center; margin-bottom:40px;">OmniBio</h1>
            <button class="btn btn-primary" onclick="login()">Entrar com Discord</button>
        </div>

        <div id="admin-section" class="hidden">
            <header style="display:flex; justify-content:space-between; margin-bottom:30px;">
                <div id="user-display" style="display:flex; align-items:center; gap:10px;"></div>
                <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">Sair</button>
            </header>

            <div class="grid">
                <div class="editor">
                    <div class="card">
                        <h2>Informações Básicas</h2>
                        <label>Username (URL)</label>
                        <input type="text" id="in_username">
                        <label>Nome de Exibição</label>
                        <input type="text" id="in_display_name">
                        <label>Bio</label>
                        <textarea id="in_bio" rows="3"></textarea>
                    </div>

                    <div class="card">
                        <h2>Mídias & Arquivos</h2>
                        
                        <label>Foto de Perfil (Arraste ou Clique)</label>
                        <div class="upload-zone" id="drop-pfp">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span id="txt-pfp">Upload PFP</span>
                            <div class="upload-progress" id="prog-pfp"></div>
                            <input type="file" id="file-pfp" hidden accept="image/*">
                        </div>
                        <input type="text" id="in_pfp_url" placeholder="Ou cole uma URL aqui">

                        <label>Fundo (Imagem ou Vídeo)</label>
                        <div class="upload-zone" id="drop-bg">
                            <i class="fa-solid fa-image"></i>
                            <span id="txt-bg">Upload Background</span>
                            <div class="upload-progress" id="prog-bg"></div>
                            <input type="file" id="file-bg" hidden accept="image/*,video/*">
                        </div>
                        <input type="text" id="in_bg_url" placeholder="URL do Background">

                        <label>Música (.mp3)</label>
                        <div class="upload-zone" id="drop-audio">
                            <i class="fa-solid fa-music"></i>
                            <span id="txt-audio">Upload Áudio</span>
                            <div class="upload-progress" id="prog-audio"></div>
                            <input type="file" id="file-audio" hidden accept="audio/*">
                        </div>
                        <input type="text" id="in_audio_url" placeholder="URL da Música">

                        <button class="btn btn-primary" style="margin-top:20px;" onclick="saveData()">Publicar Perfil</button>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="card">
                        <h2>Ranking</h2>
                        <div id="ranking-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) { /* Lógica de carregar perfil público aqui */ } 
            else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) showAdmin(session.user);
                else document.getElementById('login-section').classList.remove('hidden');
            }
        }

        // --- Gerenciamento de Upload ---
        function setupUpload(zoneId, fileId, inputUrlId, progressId, folder) {
            const zone = document.getElementById(zoneId);
            const fileInput = document.getElementById(fileId);
            const urlInput = document.getElementById(inputUrlId);
            const progress = document.getElementById(progressId);

            zone.onclick = () => fileInput.click();

            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
            zone.ondragleave = () => zone.classList.remove('dragover');
            
            zone.ondrop = async (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                handleFile(e.dataTransfer.files[0]);
            };

            fileInput.onchange = () => handleFile(fileInput.files[0]);

            async function handleFile(file) {
                if (!file) return;
                const { data: { user } } = await _supabase.auth.getUser();
                const fileName = `${user.id}/${Date.now()}_${file.name}`;
                
                progress.style.width = '30%';
                const { data, error } = await _supabase.storage.from('assets').upload(fileName, file);

                if (error) {
                    alert("Erro no upload: " + error.message);
                    progress.style.width = '0%';
                } else {
                    progress.style.width = '100%';
                    const { data: { publicUrl } } = _supabase.storage.from('assets').getPublicUrl(fileName);
                    urlInput.value = publicUrl;
                    zone.querySelector('span').innerText = "Arquivo carregado!";
                }
            }
        }

        // Iniciar zonas de upload
        setupUpload('drop-pfp', 'file-pfp', 'in_pfp_url', 'prog-pfp', 'pfp');
        setupUpload('drop-bg', 'file-bg', 'in_bg_url', 'prog-bg', 'bg');
        setupUpload('drop-audio', 'file-audio', 'in_audio_url', 'prog-audio', 'audio');

        async function showAdmin(user) {
            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('user-display').innerHTML = `<img src="${user.user_metadata.avatar_url}" style="width:30px; border-radius:50%"> <span>${user.user_metadata.full_name}</span>`;
            
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('in_username').value = data.username || "";
                document.getElementById('in_display_name').value = data.display_name || "";
                document.getElementById('in_bio').value = data.bio_text || "";
                document.getElementById('in_pfp_url').value = data.pfp_url || "";
                document.getElementById('in_bg_url').value = data.bg_url || "";
                document.getElementById('in_audio_url').value = data.audio_url || "";
            }
        }

        async function saveData() {
            const { data: { user } } = await _supabase.auth.getUser();
            const payload = {
                user_id: user.id,
                username: document.getElementById('in_username').value.toLowerCase(),
                display_name: document.getElementById('in_display_name').value,
                bio_text: document.getElementById('in_bio').value,
                pfp_url: document.getElementById('in_pfp_url').value,
                bg_url: document.getElementById('in_bg_url').value,
                audio_url: document.getElementById('in_audio_url').value,
                discord_id: user.user_metadata.provider_id
            };
            const { error } = await _supabase.from('bios').upsert(payload);
            if (!error) alert("Perfil Publicado!");
            else alert("Erro ao salvar: " + error.message);
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
