<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Elite Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #fff; 
            --accent: #ffffff; /* Guns.lol costuma usar branco ou cores sólidas */
            --bg: #050505; 
            --card-bg: rgba(10, 10, 10, 0.55);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow-x: hidden;
        }

        /* VÍDEO E MÍDIA */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: -1; backdrop-filter: blur(8px); }

        /* TELA DE ENTRADA */
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.8s ease; }
        #enter-screen h1 { font-size: 0.9rem; letter-spacing: 0.3em; animation: pulse 2s infinite; font-weight: 500; color: rgba(255,255,255,0.7); }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }

        /* CARDS ESTILO GUNS.LOL */
        .wrapper { width: 100%; max-width: 480px; padding: 20px; z-index: 10; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 40px 30px; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* ELEMENTOS DO PERFIL */
        .pfp-view { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            border: 1px solid var(--border);
            margin: 0 auto 20px; 
            object-fit: cover; 
            display: block;
        }

        #bio-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.02em; }
        .bio-subtitle { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 25px; }

        .link-btn { 
            display: block; 
            padding: 14px; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            margin-bottom: 10px; 
            transition: all 0.25s ease;
            font-size: 0.95rem;
        }
        .link-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); }

        /* DISCORD CARD (LANYARD) */
        .discord-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            padding: 12px 15px; 
            margin: 20px 0; 
            display: flex; 
            align-items: center; 
            text-align: left; 
            gap: 12px; 
        }
        .dc-avatar { width: 45px; height: 45px; position: relative; }
        .dc-avatar img { width: 100%; height: 100%; border-radius: 50%; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #111; }
        
        .online { background: #23a559; } 
        .idle { background: #f0b232; } 
        .dnd { background: #f23f43; } 
        .offline { background: #80848e; }

        .dc-info h3 { font-size: 0.85rem; font-weight: 600; }
        .dc-info p { font-size: 0.75rem; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }

        /* PAINEL ADMIN */
        .field { margin-bottom: 18px; text-align: left; }
        label { font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.4); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        input[type="text"], textarea { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: rgba(255,255,255,0.3); }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-discord { background: #5865f2; color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .hidden { display: none !important; }

        /* Scrollbar custom */
        #admin-ui::-webkit-scrollbar { width: 4px; }
        #admin-ui::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="enterSite()">
        <h1>CLICK TO ENTER</h1>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card">
            <h1 style="margin-bottom: 10px; font-weight: 800; letter-spacing: -1px;">Omni<span style="opacity: 0.5;">Bio</span></h1>
            <p style="color:rgba(255,255,255,0.4); margin-bottom: 30px; font-size: 0.85rem;">Crie sua identidade visual de elite.</p>
            <button class="btn btn-discord" onclick="login()">
                ENTRAR COM DISCORD
            </button>
        </div>

        <div id="admin-ui" class="card hidden" style="max-height: 90vh; overflow-y: auto;">
            <h2 style="margin-bottom: 25px; font-size: 1.1rem; font-weight: 700;">Configurações do Perfil</h2>
            
            <div class="field"><label>URL personalizada</label><input type="text" id="username" placeholder="seu-nome"></div>
            <div class="field"><label>Nome de Exibição</label><input type="text" id="display_name" placeholder="Ex: Luckzz"></div>
            
            <div style="display:flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border);">
                <span style="font-size: 0.8rem; color: #ccc;">Status do Discord (Lanyard)</span>
                <input type="checkbox" id="toggle-discord" checked>
            </div>

            <div class="field">
                <label>Foto de Perfil</label>
                <input type="file" id="pfp-input" accept="image/*" style="font-size: 0.7rem;">
            </div>

            <div class="field">
                <label>Fundo (Vídeo ou Imagem)</label>
                <input type="file" id="bg-input" accept="image/*,video/mp4" style="font-size: 0.7rem;">
            </div>

            <div class="field">
                <label>Música de Fundo (MP3)</label>
                <input type="file" id="audio-input" accept="audio/*" style="font-size: 0.7rem;">
            </div>

            <div class="field"><label>Links (Formato: Nome,Link|Nome,Link)</label><textarea id="links" rows="2" placeholder="Instagram,https://...|Twitter,https://..."></textarea></div>
            
            <button class="btn btn-primary" onclick="saveBio()" id="save-btn">SALVAR PERFIL</button>
            <div id="status-box" style="margin-top: 15px; font-size: 0.75rem;"></div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name"></h1>
            <p class="bio-subtitle">@profile</p>
            
            <div id="discord-presence" class="discord-card hidden">
                <div class="dc-avatar">
                    <img id="dc-pfp" src="https://via.placeholder.com/50">
                    <div id="dc-status" class="status-dot offline"></div>
                </div>
                <div class="dc-info">
                    <h3 id="dc-user">Carregando...</h3>
                    <p id="dc-activity">Offline</p>
                </div>
            </div>

            <div id="bio-links-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userDiscordId = null;

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlNick = new URLSearchParams(window.location.search).get('u');
            if (urlNick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                prepareBio(urlNick);
            } else if (session) {
                const identity = session.user.identities.find(i => i.provider === 'discord');
                if(identity) userDiscordId = identity.id;
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                document.getElementById('toggle-discord').checked = data.show_discord !== false;
                
                const finalLink = `${window.location.origin}${window.location.pathname}?u=${data.username}`;
                document.getElementById('status-box').innerHTML = `<a href="${finalLink}" target="_blank" style="color:#fff; text-decoration:underline;">Ver meu perfil: ${data.username}</a>`;
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "SALVANDO...";

            try {
                const { data: currentData } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
                let pfpUrl = currentData?.pfp_url || null;
                let bgUrl = currentData?.bg_url || null;
                let audioUrl = currentData?.audio_url || null;

                const pfpF = document.getElementById('pfp-input').files[0];
                const bgF = document.getElementById('bg-input').files[0];
                const audF = document.getElementById('audio-input').files[0];

                if(pfpF) {
                    const p = `pfp/${user.id}`; await _supabase.storage.from('assets').upload(p, pfpF, {upsert: true});
                    pfpUrl = _supabase.storage.from('assets').getPublicUrl(p).data.publicUrl + "?t=" + Date.now();
                }
                if(bgF) {
                    const p = `bg/${user.id}`; await _supabase.storage.from('assets').upload(p, bgF, {upsert: true});
                    bgUrl = _supabase.storage.from('assets').getPublicUrl(p).data.publicUrl + "?t=" + Date.now();
                }
                if(audF) {
                    const p = `audio/${user.id}`; await _supabase.storage.from('assets').upload(p, audF, {upsert: true});
                    audioUrl = _supabase.storage.from('assets').getPublicUrl(p).data.publicUrl + "?t=" + Date.now();
                }

                const payload = {
                    user_id: user.id,
                    username: document.getElementById('username').value.trim().toLowerCase(),
                    display_name: document.getElementById('display_name').value,
                    discord_id: userDiscordId,
                    show_discord: document.getElementById('toggle-discord').checked,
                    links: document.getElementById('links').value,
                    pfp_url: pfpUrl,
                    bg_url: bgUrl,
                    audio_url: audioUrl
                };

                await _supabase.from('bios').upsert(payload, { onConflict: 'user_id' });
                btn.innerText = "SALVO COM SUCESSO!";
                setTimeout(() => location.reload(), 1000);
            } catch (e) { alert(e.message); btn.innerText = "ERRO AO SALVAR"; }
        }

        let loadedBioData = null;
        async function prepareBio(nick) {
            const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
            if(!data) return alert("Perfil não encontrado!");
            loadedBioData = data;
        }

        function enterSite() {
            const scr = document.getElementById('enter-screen');
            scr.style.opacity = '0';
            setTimeout(() => scr.classList.add('hidden'), 800);
            
            const data = loadedBioData;
            document.getElementById('bio-view').classList.remove('hidden');
            document.querySelector('.bio-subtitle').innerText = `@${data.username}`;

            if(data.bg_url) {
                if(data.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video');
                    v.src = data.bg_url; v.style.display = 'block'; v.play();
                } else {
                    document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
                }
            }

            if(data.audio_url) {
                const aud = document.getElementById('bg-audio');
                aud.src = data.audio_url; aud.volume = 0.4; aud.play();
            }

            document.getElementById('bio-pfp').src = data.pfp_url || 'https://via.placeholder.com/150';
            document.getElementById('bio-name').innerText = data.display_name;

            const container = document.getElementById('bio-links-container');
            if(data.links) {
                data.links.split('|').forEach(l => {
                    const [name, url] = l.split(',');
                    if(name && url) {
                        const a = document.createElement('a');
                        a.className = 'link-btn'; a.href = url; a.target = "_blank"; a.innerText = name;
                        container.appendChild(a);
                    }
                });
            }

            if(data.show_discord && data.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                fetchDiscord(data.discord_id);
                setInterval(() => fetchDiscord(data.discord_id), 15000);
            }
        }

        async function fetchDiscord(id) {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
                const json = await res.json();
                
                if(!json.success) {
                    document.getElementById('dc-user').innerText = "Usuário fora do Servidor Lanyard";
                    return;
                }

                const d = json.data;
                document.getElementById('dc-user').innerText = d.discord_user.global_name || d.discord_user.username;
                document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png?size=128`;
                
                const dot = document.getElementById('dc-status');
                dot.className = `status-dot ${d.discord_status}`;

                let activityText = "Apenas relaxando...";
                if (d.listening_to_spotify) {
                    activityText = `Ouvindo ${d.spotify.track}`;
                } else if (d.activities && d.activities.length > 0) {
                    const act = d.activities.find(a => a.type === 0) || d.activities[0];
                    activityText = act.name;
                } else if (d.discord_status === 'offline') {
                    activityText = "Offline";
                }

                document.getElementById('dc-activity').innerText = activityText;
            } catch (e) { 
                document.getElementById('dc-user').innerText = "Status Indisponível";
            }
        }
    </script>
</body>
</html>
