<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Elite Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #fff; 
            --accent: #ffffff;
            --bg: #050505; 
            --card-bg: rgba(10, 10, 10, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            perspective: 1000px; /* Necessário para o efeito 3D */
        }

        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: -1; backdrop-filter: blur(10px); }

        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.8s ease; }
        #enter-screen h1 { font-size: 0.8rem; letter-spacing: 0.4em; animation: pulse 2s infinite; font-weight: 500; color: rgba(255,255,255,0.6); }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }

        .wrapper { 
            width: 100%; 
            max-width: 440px; 
            padding: 20px; 
            z-index: 10; 
            transition: transform 0.1s ease-out; /* Suaviza o movimento do perfil */
            will-change: transform;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 40px 30px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        /* ESTILO DOS BOTÕES DE UPLOAD (A CAIXA BONITA) */
        .upload-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-box:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
        .upload-box span { font-size: 0.8rem; color: #888; font-weight: 500; }
        .upload-box .status-tag { 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            padding: 4px 10px; 
            border-radius: 6px;
            background: #fff;
            color: #000;
        }
        .upload-box input { display: none; } /* Esconde o input feio do navegador */

        .pfp-view { width: 110px; height: 110px; border-radius: 50%; border: 1px solid var(--border); margin: 0 auto 20px; object-fit: cover; display: block; pointer-events: none; }
        #bio-name { font-size: 1.6rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .bio-subtitle { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 25px; }

        .link-btn { 
            display: block; padding: 14px; background: rgba(255, 255, 255, 0.04); 
            border: 1px solid var(--border); border-radius: 14px; color: #fff; 
            text-decoration: none; font-weight: 600; margin-bottom: 12px; transition: 0.3s;
        }
        .link-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

        /* DISCORD */
        .discord-card { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 18px; padding: 14px; margin: 20px 0; display: flex; align-items: center; text-align: left; gap: 15px; }
        .dc-avatar { width: 48px; height: 48px; position: relative; }
        .dc-avatar img { width: 100%; height: 100%; border-radius: 50%; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 13px; height: 13px; border-radius: 50%; border: 2px solid #0a0a0a; }
        .online { background: #23a559; } .idle { background: #f0b232; } .dnd { background: #f23f43; } .offline { background: #80848e; }
        .dc-info h3 { font-size: 0.9rem; font-weight: 700; }
        .dc-info p { font-size: 0.75rem; color: rgba(255,255,255,0.5); }

        .field { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.3); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #fff; color: #000; }
        .btn-discord { background: #5865f2; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body onmousemove="handleMove(event)" ontouchmove="handleMove(event)">

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="enterSite()">
        <h1>CLICK TO ENTER</h1>
    </div>

    <div class="wrapper" id="main-wrapper">
        <div id="login-ui" class="card">
            <h1 style="margin-bottom: 30px; font-weight: 800;">Omni<span style="opacity: 0.5;">Bio</span></h1>
            <button class="btn btn-discord" onclick="login()">LOGIN COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden" style="max-height: 85vh; overflow-y: auto; text-align: left;">
            <h2 style="margin-bottom: 25px; font-size: 1.2rem; text-align: center;">Editar Perfil</h2>
            
            <div class="field"><label>URL</label><input type="text" id="username" placeholder="seu-nome"></div>
            <div class="field"><label>Nome</label><input type="text" id="display_name" placeholder="Nome de Exibição"></div>

            <label>Mídias</label>
            <label class="upload-box">
                <span>Foto de Perfil</span>
                <div class="status-tag" id="st-pfp">Adicionar</div>
                <input type="file" id="pfp-input" accept="image/*" onchange="updateTag('pfp')">
            </label>

            <label class="upload-box">
                <span>Fundo (Vídeo/Foto)</span>
                <div class="status-tag" id="st-bg">Adicionar</div>
                <input type="file" id="bg-input" accept="image/*,video/mp4" onchange="updateTag('bg')">
            </label>

            <label class="upload-box">
                <span>Música (MP3)</span>
                <div class="status-tag" id="st-audio">Adicionar</div>
                <input type="file" id="audio-input" accept="audio/*" onchange="updateTag('audio')">
            </label>

            <div class="field"><label>Links (Nome,Link|Nome,Link)</label><textarea id="links" rows="2"></textarea></div>
            
            <button class="btn btn-primary" onclick="saveBio()" id="save-btn">SALVAR</button>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name"></h1>
            <p class="bio-subtitle">@profile</p>
            
            <div id="discord-presence" class="discord-card hidden">
                <div class="dc-avatar"><img id="dc-pfp" src=""><div id="dc-status" class="status-dot"></div></div>
                <div class="dc-info"><h3 id="dc-user">...</h3><p id="dc-activity">...</p></div>
            </div>

            <div id="bio-links-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let userDiscordId = null;

        // EFEITO DE MEXER O PERFIL (TILT)
        function handleMove(e) {
            const wrapper = document.getElementById('main-wrapper');
            const { clientX, clientY } = e.touches ? e.touches[0] : e;
            const x = (window.innerWidth / 2 - clientX) / 25;
            const y = (window.innerHeight / 2 - clientY) / 25;
            wrapper.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        }

        // ATUALIZA A CAIXA BONITA (MUDAR/ADICIONAR)
        function updateTag(type) {
            document.getElementById(`st-${type}`).innerText = "Mudar";
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlNick = new URLSearchParams(window.location.search).get('u');
            if (urlNick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                prepareBio(urlNick);
            } else if (session) {
                const identity = session.user.identities.find(i => i.provider === 'discord');
                if(identity) userDiscordId = identity.id;
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                if(data.pfp_url) updateTag('pfp');
                if(data.bg_url) updateTag('bg');
                if(data.audio_url) updateTag('audio');
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "SALVANDO...";

            try {
                const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
                let pfp = curr?.pfp_url, bg = curr?.bg_url, aud = curr?.audio_url;

                const fPfp = document.getElementById('pfp-input').files[0];
                const fBg = document.getElementById('bg-input').files[0];
                const fAud = document.getElementById('audio-input').files[0];

                if(fPfp) {
                    await _supabase.storage.from('assets').upload(`pfp/${user.id}`, fPfp, {upsert: true});
                    pfp = _supabase.storage.from('assets').getPublicUrl(`pfp/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }
                if(fBg) {
                    await _supabase.storage.from('assets').upload(`bg/${user.id}`, fBg, {upsert: true});
                    bg = _supabase.storage.from('assets').getPublicUrl(`bg/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }
                if(fAud) {
                    await _supabase.storage.from('assets').upload(`audio/${user.id}`, fAud, {upsert: true});
                    aud = _supabase.storage.from('assets').getPublicUrl(`audio/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }

                await _supabase.from('bios').upsert({
                    user_id: user.id,
                    username: document.getElementById('username').value.trim().toLowerCase(),
                    display_name: document.getElementById('display_name').value,
                    discord_id: userDiscordId,
                    links: document.getElementById('links').value,
                    pfp_url: pfp, bg_url: bg, audio_url: aud,
                    show_discord: true
                });
                location.reload();
            } catch (e) { alert("Erro ao salvar"); btn.innerText = "SALVAR"; }
        }

        let loadedBioData = null;
        async function prepareBio(nick) {
            const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
            if(!data) return alert("Perfil inexistente");
            loadedBioData = data;
        }

        function enterSite() {
            document.getElementById('enter-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-screen').classList.add('hidden'), 600);
            
            const d = loadedBioData;
            document.getElementById('bio-view').classList.remove('hidden');
            document.getElementById('bio-pfp').src = d.pfp_url || '';
            document.getElementById('bio-name').innerText = d.display_name;
            document.querySelector('.bio-subtitle').innerText = `@${d.username}`;

            if(d.bg_url) {
                if(d.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video');
                    v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) {
                const a = document.getElementById('bg-audio');
                a.src = d.audio_url; a.volume = 0.4; a.play();
            }

            const cont = document.getElementById('bio-links-container');
            d.links.split('|').forEach(l => {
                const [n, u] = l.split(',');
                if(n && u) {
                    const el = document.createElement('a');
                    el.className = 'link-btn'; el.href = u; el.target = "_blank"; el.innerText = n;
                    cont.appendChild(el);
                }
            });

            if(d.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                fetchDiscord(d.discord_id);
            }
        }

        async function fetchDiscord(id) {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
                const { data: d } = await res.json();
                if(d) {
                    document.getElementById('dc-user').innerText = d.discord_user.global_name || d.discord_user.username;
                    document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png`;
                    document.getElementById('dc-status').className = `status-dot ${d.discord_status}`;
                    let act = "Online";
                    if(d.listening_to_spotify) act = `Ouvindo ${d.spotify.track}`;
                    else if(d.activities.length > 0) act = d.activities[0].name;
                    document.getElementById('dc-activity').innerText = act;
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
