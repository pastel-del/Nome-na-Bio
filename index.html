<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Elite Beat System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --accent: #b026ff; --bg: #030303; --card-bg: rgba(10, 10, 10, 0.6); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* BACKGROUND SYSTEM */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; backdrop-filter: blur(10px); }

        /* ENTER SCREEN */
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 1s ease; }
        #enter-screen h1 { font-size: 0.8rem; letter-spacing: 12px; font-weight: 300; color: #fff; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 0.2; transform: scale(0.95); } }

        /* MAIN CARD (O que vai balançar) */
        .wrapper { width: 100%; max-width: 420px; padding: 20px; z-index: 10; will-change: transform; transition: transform 0.1s ease-out; }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 40px; padding: 45px 35px; text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }

        /* PERFIL ELEMENTS */
        .pfp-container { position: relative; width: 130px; height: 130px; margin: 0 auto 25px; }
        .pfp-view { 
            width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); 
            object-fit: cover; position: relative; z-index: 2; transition: transform 0.1s ease-out;
        }
        .pfp-glow { 
            position: absolute; inset: 0; border-radius: 50%; background: var(--accent); 
            filter: blur(20px); opacity: 0; z-index: 1; transition: opacity 0.1s; 
        }

        .bio-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 30px; letter-spacing: -1.5px; }

        /* LINKS */
        .link-item { 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 22px; color: #fff; text-decoration: none; font-weight: 600; 
            margin-bottom: 12px; transition: 0.3s; font-size: 0.9rem;
        }
        .link-item:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: scale(1.02); }

        /* ADMIN PANEL */
        #admin-ui { max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .field { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        input, textarea { width: 100%; padding: 16px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 18px; color: #fff; outline: none; }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .up-box { 
            padding: 20px; border: 1px solid #222; border-radius: 20px; cursor: pointer; 
            text-align: center; transition: 0.3s; background: rgba(255,255,255,0.01);
        }
        .up-box:hover { border-color: var(--accent); background: rgba(176,38,255,0.05); }
        .up-box i { display: block; font-size: 1.2rem; margin-bottom: 8px; color: #444; }
        .up-box span { font-size: 0.6rem; font-weight: 800; color: #888; }

        .btn-save { background: #fff; color: #000; padding: 20px; border-radius: 22px; border: none; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; }
        
        /* DISCORD STATUS PRESET */
        .dc-card { background: rgba(0,0,0,0.5); border-radius: 25px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; text-align: left; border: 1px solid rgba(255,255,255,0.03); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop crossorigin="anonymous"></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="startElite()">
        <h1>Connect to Profile</h1>
    </div>

    <div class="wrapper" id="main-wrapper">
        
        <div id="login-ui" class="card">
            <h1 style="font-size: 2.5rem; margin-bottom: 30px; letter-spacing: -2px;">Omni<span style="color:var(--accent)">Bio</span></h1>
            <button class="btn-save" style="background:#5865f2; color:#fff;" onclick="login()">
                <i class="fab fa-discord"></i> AUTH VIA DISCORD
            </button>
        </div>

        <div id="admin-ui" class="card hidden">
            <label style="text-align:center; margin-bottom:20px; color:var(--accent)">Elite Dashboard</label>
            <div class="field"><label>URL Nickname</label><input type="text" id="username"></div>
            <div class="field"><label>Display Name</label><input type="text" id="display_name"></div>

            <div class="upload-grid">
                <div class="up-box" onclick="document.getElementById('pfp-input').click()">
                    <i class="fas fa-user-circle"></i><span id="txt-pfp">ESCOLHER AVATAR</span>
                </div>
                <div class="up-box" onclick="document.getElementById('bg-input').click()">
                    <i class="fas fa-play-circle"></i><span id="txt-bg">ESCOLHER FUNDO</span>
                </div>
            </div>
            <input type="file" id="pfp-input" class="hidden">
            <input type="file" id="bg-input" class="hidden">

            <div class="field">
                <div class="up-box" style="width:100%" onclick="document.getElementById('audio-input').click()">
                    <i class="fas fa-bolt"></i><span id="txt-audio">ESCOLHER MÚSICA (BATIDA SYNC)</span>
                </div>
                <input type="file" id="audio-input" class="hidden">
            </div>

            <div class="field"><label>Links (Nome,URL|Nome,URL)</label><textarea id="links" rows="2"></textarea></div>
            <button class="btn-save" onclick="saveBio()" id="save-btn">SALVAR ALTERAÇÕES</button>
        </div>

        <div id="bio-view" class="card hidden">
            <div class="pfp-container">
                <div class="pfp-glow" id="glow"></div>
                <img id="bio-pfp" class="pfp-view" src="">
            </div>
            <h1 id="bio-name" class="bio-title"></h1>
            
            <div id="discord-presence" class="dc-card hidden">
                <div style="position: relative; width: 45px; height: 45px;">
                    <img id="dc-pfp" style="width: 100%; height: 100%; border-radius: 12px;">
                    <div id="dc-status" style="position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #111;"></div>
                </div>
                <div>
                    <h4 id="dc-user" style="font-size:0.8rem; font-weight: 800;"></h4>
                    <p id="dc-activity" style="font-size:0.65rem; color:#888; font-weight: 600;"></p>
                </div>
            </div>

            <div id="bio-links-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        let audioContext, analyser, dataArray;
        let bioData = null;

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlNick = new URLSearchParams(window.location.search).get('u');
            if (urlNick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                const { data } = await _supabase.from('bios').select('*').eq('username', urlNick).maybeSingle();
                bioData = data;
            } else if (session) {
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                if(data.pfp_url) document.getElementById('txt-pfp').innerText = "MUDAR";
                if(data.bg_url) document.getElementById('txt-bg').innerText = "MUDAR";
                if(data.audio_url) document.getElementById('txt-audio').innerText = "MUDAR";
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPDATING...";

            const { data: cur } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            let pfp = cur?.pfp_url, bg = cur?.bg_url, audio = cur?.audio_url;

            const up = async (id, folder) => {
                const f = document.getElementById(id).files[0];
                if(!f) return null;
                const path = `${folder}/${user.id}`;
                await _supabase.storage.from('assets').upload(path, f, {upsert: true});
                return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl + "?v=" + Date.now();
            };

            const nPfp = await up('pfp-input', 'pfp'); if(nPfp) pfp = nPfp;
            const nBg = await up('bg-input', 'bg'); if(nBg) bg = nBg;
            const nAud = await up('audio-input', 'audio'); if(nAud) audio = nAud;

            await _supabase.from('bios').upsert({
                user_id: user.id, username: document.getElementById('username').value.trim().toLowerCase(),
                display_name: document.getElementById('display_name').value,
                links: document.getElementById('links').value,
                pfp_url: pfp, bg_url: bg, audio_url: audio,
                discord_id: user.identities.find(i => i.provider === 'discord').id, show_discord: true
            });
            location.reload();
        }

        function startElite() {
            document.getElementById('enter-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-screen').classList.add('hidden'), 1000);
            
            const data = bioData;
            document.getElementById('bio-view').classList.remove('hidden');

            // BG & Audio
            const audio = document.getElementById('bg-audio');
            if(data.audio_url) {
                audio.src = data.audio_url;
                audio.play();
                setupVisualizer(audio);
            }

            if(data.bg_url) {
                if(data.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = data.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
            }

            document.getElementById('bio-pfp').src = data.pfp_url;
            document.getElementById('bio-name').innerText = data.display_name;

            const container = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [n, u] = l.split(',');
                if(n && u) {
                    const a = document.createElement('a'); a.className = 'link-item'; a.href = u; a.target = "_blank";
                    let icon = '<i class="fas fa-link"></i>';
                    if(u.includes('discord')) icon = '<i class="fab fa-discord"></i>';
                    else if(u.includes('instagram')) icon = '<i class="fab fa-instagram"></i>';
                    a.innerHTML = `${icon} ${n}`;
                    container.appendChild(a);
                }
            });

            if(data.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                updateDC(data.discord_id);
            }
        }

        function setupVisualizer(audio) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(audio);
            analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            animateBeat();
        }

        function animateBeat() {
            analyser.getByteFrequencyData(dataArray);
            
            // Pega a média das frequências baixas (Graves/Bumbo)
            const lowFreq = dataArray.slice(0, 5).reduce((a, b) => a + b) / 5;
            const boost = lowFreq / 200; // Sensibilidade

            const wrapper = document.getElementById('main-wrapper');
            const pfp = document.getElementById('bio-pfp');
            const glow = document.getElementById('glow');

            // Aplica o balanço e pulso
            if (lowFreq > 150) {
                const scale = 1 + (boost * 0.08);
                wrapper.style.transform = `scale(${scale}) translateY(-${boost * 10}px)`;
                pfp.style.transform = `scale(${1 + (boost * 0.15)})`;
                glow.style.opacity = boost;
            } else {
                wrapper.style.transform = `scale(1) translateY(0)`;
                pfp.style.transform = `scale(1)`;
                glow.style.opacity = 0;
            }

            requestAnimationFrame(animateBeat);
        }

        async function updateDC(id) {
            const r = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await r.json();
            if(!data) return;
            document.getElementById('dc-user').innerText = data.discord_user.display_name || data.discord_user.username;
            document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
            document.getElementById('dc-status').style.background = data.discord_status === 'online' ? '#23a559' : '#f23f43';
            document.getElementById('dc-activity').innerText = data.activities[0]?.name || "Online";
        }
    </script>
</body>
</html>
