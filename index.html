<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #ffffff;
            --text-secondary: #a1a1a6;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            background: var(--bg); color: #fff; 
            min-height: 100vh; display: flex; 
            align-items: center; justify-content: center; 
            overflow-x: hidden;
        }

        #bg-video { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            z-index: -2; object-fit: cover; filter: brightness(0.4); 
            display: none; 
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: -1; }

        .wrapper { width: 100%; max-width: 440px; padding: 20px; z-index: 10; }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 40px 24px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Estilo Admin - Inputs Visíveis */
        .admin-scroll { max-height: 75vh; overflow-y: auto; padding-right: 8px; text-align: left; }
        .admin-scroll::-webkit-scrollbar { width: 4px; }
        .admin-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        label { 
            font-size: 11px; font-weight: 600; color: var(--text-secondary); 
            margin: 15px 0 6px 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px;
        }

        input, textarea { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.06); 
            border: 1px solid var(--border); color: #fff; border-radius: 14px; 
            outline: none; transition: 0.3s; font-size: 14px;
        }

        input:focus { border-color: #fff; background: rgba(255,255,255,0.1); }

        input[type="file"] { font-size: 12px; padding: 10px; cursor: pointer; }

        .btn { 
            width: 100%; padding: 16px; border-radius: 16px; border: none; 
            font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px;
        }

        .btn-save { background: #fff; color: #000; }
        .btn-save:hover { transform: scale(1.02); opacity: 0.9; }

        /* Link Gerado Box */
        .link-box {
            margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05);
            border-radius: 14px; border: 1px dashed var(--border);
            display: none; text-align: center;
        }
        .link-box span { font-size: 13px; color: var(--text-secondary); word-break: break-all; }
        .copy-btn { color: #0071e3; cursor: pointer; font-weight: 600; margin-left: 10px; text-decoration: none; }

        /* Bio View */
        .pfp-view { width: 110px; height: 110px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; border: 2px solid var(--border); }
        .display-name { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .bio-text-view { color: var(--text-secondary); margin-bottom: 25px; line-height: 1.5; }

        .discord-card { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 18px; padding: 15px; display: flex; align-items: center; 
            gap: 15px; text-align: left; text-decoration: none; color: inherit; margin: 20px 0;
        }

        .social-links { display: flex; justify-content: center; gap: 20px; }
        .social-icon { color: #fff; font-size: 1.5rem; opacity: 0.6; transition: 0.3s; }
        .social-icon:hover { opacity: 1; transform: translateY(-2px); }

        .hidden { display: none !important; }
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="revealBio()">
        <h1 style="font-size: 12px; letter-spacing: 5px; color: #666;">CLICK TO ENTER</h1>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card hidden">
            <h1 style="margin-bottom: 25px;">OmniBio</h1>
            <button class="btn" style="background: #5865f2; color: white;" onclick="login()">ENTRAR COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden">
            <div class="admin-scroll">
                <h2 style="margin-bottom: 20px; text-align: center;">Configurações</h2>
                
                <label>User na URL (ex: joao)</label>
                <input type="text" id="username" placeholder="Seu nome de usuário">
                
                <label>Nome no Perfil</label>
                <input type="text" id="display_name" placeholder="Como quer ser chamado">
                
                <label>Biografia</label>
                <textarea id="bio_text" rows="2" placeholder="Sua frase..."></textarea>
                
                <label>Social Links (icon,link | icon,link)</label>
                <input type="text" id="links_input" placeholder="instagram,http://... | github,http://...">

                <label>Avatar (PFP)</label>
                <input type="file" id="pfp-f">
                
                <label>Fundo (Imagem ou MP4)</label>
                <input type="file" id="bg-f">

                <label>Música de Fundo</label>
                <input type="file" id="audio-f">

                <button class="btn btn-save" onclick="saveBio()" id="save-btn">SALVAR ALTERAÇÕES</button>
                
                <div id="link-container" class="link-box">
                    <span>Seu link: <b id="generated-url"></b></span>
                    <a href="javascript:void(0)" class="copy-btn" onclick="copyLink()">COPIAR</a>
                </div>
                
                <div id="status-msg" style="text-align:center; font-size:12px; margin-top:15px;"></div>
            </div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="view-pfp" class="pfp-view">
            <h1 id="view-name" class="display-name"></h1>
            <p id="view-frase" class="bio-text-view"></p>
            
            <a id="dc-link" class="discord-card hidden" target="_blank">
                <div style="position:relative; width:48px; height:48px;">
                    <img id="dc-pfp" style="width:100%; border-radius:12px;">
                    <div id="dc-status" style="position:absolute; bottom:-2px; right:-2px; width:14px; height:14px; border-radius:50%; border:3px solid #111;"></div>
                </div>
                <div>
                    <h3 id="dc-user" style="font-size:14px;"></h3>
                    <p id="dc-activity" style="font-size:12px; color:#888;">Online</p>
                </div>
            </a>

            <div id="social-icons" class="social-links"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let bioData = null;

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                const { data } = await _supabase.from('bios').select('*').eq('username', u).maybeSingle();
                if (data) { bioData = data; document.getElementById('enter-screen').classList.remove('hidden'); }
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) loadAdmin(session.user);
                else document.getElementById('login-ui').classList.remove('hidden');
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        async function loadAdmin(user) {
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('bio_text').value = data.bio_text || "";
                document.getElementById('links_input').value = data.links || "";
                showLink(data.username);
            }
        }

        function showLink(user) {
            if(!user) return;
            const url = window.location.origin + window.location.pathname + "?u=" + user;
            document.getElementById('link-container').style.display = 'block';
            document.getElementById('generated-url').innerText = url;
        }

        function copyLink() {
            const url = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(url);
            alert("Link copiado!");
        }

        async function saveBio() {
            const btn = document.getElementById('save-btn');
            const msg = document.getElementById('status-msg');
            btn.innerText = "SALVANDO..."; btn.disabled = true;

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();

                const uploadAsset = async (elId, folder) => {
                    const file = document.getElementById(elId).files[0];
                    if(!file) return null;
                    const path = `${folder}/${user.id}_${Date.now()}`;
                    await _supabase.storage.from('assets').upload(path, file, {upsert:true});
                    return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl;
                };

                const pfp = await uploadAsset('pfp-f', 'pfp');
                const bg = await uploadAsset('bg-f', 'bg');
                const aud = await uploadAsset('audio-f', 'audio');

                const username = document.getElementById('username').value.trim().toLowerCase();
                const payload = {
                    user_id: user.id,
                    username: username,
                    display_name: document.getElementById('display_name').value,
                    bio_text: document.getElementById('bio_text').value,
                    links: document.getElementById('links_input').value,
                    pfp_url: pfp || curr?.pfp_url,
                    bg_url: bg || curr?.bg_url,
                    audio_url: aud || curr?.audio_url,
                    discord_id: user.identities[0].id
                };

                const { error } = await _supabase.from('bios').upsert(payload);
                if(error) throw error;
                
                msg.style.color = "#4cd964"; msg.innerText = "Perfil atualizado!";
                showLink(username);
                setTimeout(() => { btn.innerText = "SALVAR ALTERAÇÕES"; btn.disabled = false; }, 2000);
            } catch (err) {
                msg.style.color = "#ff3b30"; msg.innerText = "Erro ao salvar.";
                btn.disabled = false;
            }
        }

        function revealBio() {
            document.getElementById('enter-screen').classList.add('hidden');
            document.getElementById('bio-view').classList.remove('hidden');
            const d = bioData;
            document.getElementById('view-name').innerText = d.display_name;
            document.getElementById('view-frase').innerText = d.bio_text || "";
            document.getElementById('view-pfp').src = d.pfp_url || "https://ui-avatars.com/api/?name=" + d.display_name;
            
            if(d.bg_url) {
                if(d.bg_url.toLowerCase().endsWith('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) { const a = document.getElementById('bg-audio'); a.src = d.audio_url; a.play(); }
            
            if(d.links) {
                const s = document.getElementById('social-icons');
                d.links.split('|').forEach(l => {
                    const [icon, url] = l.split(',');
                    if(icon && url) {
                        const a = document.createElement('a'); a.href = url.trim(); a.target = "_blank"; a.className = "social-icon";
                        a.innerHTML = `<i class="fa-brands fa-${icon.trim().toLowerCase()}"></i>`; s.appendChild(a);
                    }
                });
            }
        }
        init();
    </script>
</body>
</html>
