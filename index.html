<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --text-secondary: #a1a1a6;
            --apple-blue: #0071e3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.4); display: none; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.4)); z-index: -1; }

        .wrapper { width: 100%; max-width: 420px; padding: 20px; z-index: 10; }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border); 
            border-radius: 32px; 
            padding: 40px 28px; 
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Editor Style */
        .admin-scroll { max-height: 70vh; overflow-y: auto; text-align: left; padding-right: 10px; }
        label { font-size: 10px; font-weight: 700; color: var(--text-secondary); margin: 15px 0 5px 5px; display: block; text-transform: uppercase; }
        input, textarea { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 10px; outline: none;
        }

        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-save { background: #fff; color: #000; margin-top: 15px; }
        .btn-save:hover { opacity: 0.9; transform: scale(0.98); }

        /* Generated Link Box */
        .link-box { 
            margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.03); 
            border-radius: 15px; border: 1px solid var(--border); display: none;
        }
        .copy-btn { color: var(--apple-blue); text-decoration: none; font-size: 13px; font-weight: 600; margin-top: 5px; display: inline-block; }

        /* Bio Elements */
        .pfp-view { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; border: 1px solid var(--border); }
        .display-name { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
        .bio-text-view { color: var(--text-secondary); margin: 10px 0 25px; font-size: 0.95rem; }

        .discord-card { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; 
            padding: 14px; display: flex; align-items: center; gap: 15px; text-align: left; 
            text-decoration: none; color: inherit; margin-bottom: 25px; transition: 0.3s;
        }
        .discord-card:hover { background: rgba(255,255,255,0.1); }

        .social-links { display: flex; justify-content: center; gap: 25px; margin-top: 10px; }
        .social-icon { color: #fff; font-size: 1.6rem; opacity: 0.5; transition: 0.3s; text-decoration: none; }
        .social-icon:hover { opacity: 1; transform: translateY(-3px); }

        .hidden { display: none !important; }
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="revealBio()">
        <h2 style="font-size: 10px; letter-spacing: 6px; color: #444; font-weight: 400;">ENTRAR</h2>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card hidden">
            <h1 style="margin-bottom: 25px;">OmniBio</h1>
            <button class="btn" style="background: #5865f2; color: white;" onclick="login()">ENTRAR COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden">
            <div class="admin-scroll">
                <h2 style="margin-bottom: 20px; text-align: center;">Personalizar</h2>
                
                <label>User na URL</label>
                <input type="text" id="username" placeholder="ex: seu-nome">
                
                <label>Nome Visível</label>
                <input type="text" id="display_name">
                
                <label>Bio / Frase</label>
                <textarea id="bio_text" rows="2"></textarea>
                
                <label>Ícones (ex: discord,https://link | github,link)</label>
                <input type="text" id="links_input" placeholder="discord,url | instagram,url">

                <label>Foto de Perfil</label><input type="file" id="pfp-f">
                <label>Fundo (Img/Vídeo)</label><input type="file" id="bg-f">
                <label>Música</label><input type="file" id="audio-f">

                <button class="btn btn-save" onclick="saveBio()" id="save-btn">SALVAR</button>
                
                <div id="link-container" class="link-box">
                    <span style="font-size: 12px; color: var(--text-secondary); display: block;">Seu link público:</span>
                    <span id="generated-url" style="font-size: 11px; word-break: break-all; opacity: 0.8;"></span><br>
                    <a href="javascript:void(0)" class="copy-btn" onclick="copyLink()">Copiar Link</a>
                </div>
                <div id="status-msg" style="text-align:center; font-size:11px; margin-top:10px;"></div>
            </div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="view-pfp" class="pfp-view">
            <h1 id="view-name" class="display-name"></h1>
            <p id="view-frase" class="bio-text-view"></p>
            
            <a id="dc-link" class="discord-card hidden" target="_blank">
                <div style="position:relative; width:44px; height:44px;">
                    <img id="dc-pfp" style="width:100%; border-radius:10px;">
                    <div id="dc-status" style="position:absolute; bottom:-2px; right:-2px; width:12px; height:12px; border-radius:50%; border:2px solid #000;"></div>
                </div>
                <div>
                    <h3 id="dc-user" style="font-size:14px; font-weight: 600;"></h3>
                    <p id="dc-activity" style="font-size:11px; color: var(--text-secondary);">Online</p>
                </div>
            </a>

            <div id="social-icons" class="social-links"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let bioData = null;

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                const { data } = await _supabase.from('bios').select('*').eq('username', u).maybeSingle();
                if (data) { bioData = data; document.getElementById('enter-screen').classList.remove('hidden'); }
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) loadAdmin(session.user);
                else document.getElementById('login-ui').classList.remove('hidden');
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        async function loadAdmin(user) {
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('bio_text').value = data.bio_text || "";
                document.getElementById('links_input').value = data.links || "";
                if(data.username) showLink(data.username);
            }
        }

        function showLink(user) {
            const url = window.location.origin + window.location.pathname + "?u=" + user;
            document.getElementById('link-container').style.display = 'block';
            document.getElementById('generated-url').innerText = url;
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('generated-url').innerText);
            alert("Copiado!");
        }

        async function saveBio() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "SALVANDO..."; btn.disabled = true;
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();

                const uploadAsset = async (elId, folder) => {
                    const file = document.getElementById(elId).files[0];
                    if(!file) return null;
                    const path = `${folder}/${user.id}_${Date.now()}`;
                    await _supabase.storage.from('assets').upload(path, file);
                    return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl;
                };

                const pfp = await uploadAsset('pfp-f', 'pfp');
                const bg = await uploadAsset('bg-f', 'bg');
                const aud = await uploadAsset('audio-f', 'audio');

                const username = document.getElementById('username').value.trim().toLowerCase();
                const payload = {
                    user_id: user.id, username,
                    display_name: document.getElementById('display_name').value,
                    bio_text: document.getElementById('bio_text').value,
                    links: document.getElementById('links_input').value,
                    pfp_url: pfp || curr?.pfp_url,
                    bg_url: bg || curr?.bg_url,
                    audio_url: aud || curr?.audio_url,
                    discord_id: user.user_metadata.provider_id || user.identities[0].id
                };

                await _supabase.from('bios').upsert(payload);
                showLink(username);
                alert("Salvo!");
            } catch (e) { alert("Erro ao salvar"); }
            btn.innerText = "SALVAR"; btn.disabled = false;
        }

        function revealBio() {
            document.getElementById('enter-screen').classList.add('hidden');
            document.getElementById('bio-view').classList.remove('hidden');
            const d = bioData;
            document.getElementById('view-name').innerText = d.display_name;
            document.getElementById('view-frase').innerText = d.bio_text || "";
            document.getElementById('view-pfp').src = d.pfp_url || `https://ui-avatars.com/api/?name=${d.display_name}`;
            
            if(d.bg_url) {
                if(d.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) { const a = document.getElementById('bg-audio'); a.src = d.audio_url; a.play(); }
            
            if(d.links) {
                const s = document.getElementById('social-icons');
                s.innerHTML = '';
                d.links.split('|').forEach(l => {
                    const [icon, url] = l.split(',');
                    if(icon && url) {
                        const a = document.createElement('a'); a.href = url.trim(); a.target = "_blank"; a.className = "social-icon";
                        // CORREÇÃO DOS ÍCONES:
                        const iconName = icon.trim().toLowerCase();
                        let type = 'fa-brands';
                        if(iconName === 'link' || iconName === 'envelope' || iconName === 'globe') type = 'fa-solid';
                        
                        a.innerHTML = `<i class="${type} fa-${iconName}"></i>`;
                        s.appendChild(a);
                    }
                });
            }

            // LANYARD DISCORD STATUS
            if(d.discord_id) {
                const dcLink = document.getElementById('dc-link');
                fetch(`https://api.lanyard.rest/v1/users/${d.discord_id}`).then(r => r.json()).then(({data}) => {
                    if(data) {
                        dcLink.classList.remove('hidden');
                        dcLink.href = `https://discord.com/users/${d.discord_id}`;
                        document.getElementById('dc-user').innerText = data.discord_user.global_name || data.discord_user.username;
                        document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                        const s = data.discord_status;
                        document.getElementById('dc-status').style.background = s==='online'?'#23a559':s==='dnd'?'#f23f43':s==='idle'?'#f0b232':'#80848e';
                        document.getElementById('dc-activity').innerText = data.activities[0]?.name || "Online";
                    }
                });
            }
        }
        init();
    </script>
</body>
</html>
