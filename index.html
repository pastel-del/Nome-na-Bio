<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --accent: #b026ff; --bg: #050505; --card-bg: rgba(15, 15, 15, 0.7); --success: #00ffcc; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        /* FUNDO DINÂMICO */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%); z-index: -1; backdrop-filter: blur(8px); }

        /* TELA DE ENTRADA */
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.8s ease; }
        #enter-screen h1 { font-size: 0.9rem; letter-spacing: 10px; font-weight: 300; color: #fff; animation: blink 2.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }

        /* CONTAINER */
        .wrapper { width: 100%; max-width: 440px; padding: 25px; z-index: 10; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card-bg); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px; padding: 40px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        /* STATUS DE MÍDIA NO PAINEL */
        .media-indicator {
            display: flex; align-items: center; gap: 8px; font-size: 0.6rem; font-weight: 800;
            padding: 5px 10px; border-radius: 20px; background: rgba(0,0,0,0.3); width: fit-content; margin-bottom: 8px;
        }
        .status-tag { width: 6px; height: 6px; border-radius: 50%; }
        .status-on { background: var(--success); box-shadow: 0 0 8px var(--success); color: var(--success); }
        .status-off { background: #ff4b4b; color: #ff4b4b; }

        /* ADMIN PANEL */
        .admin-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; color: var(--accent); font-size: 1.1rem; }
        .field { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; font-weight: 700; color: #777; text-transform: uppercase; margin-left: 5px; display: block; margin-bottom: 8px; }
        
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid #222; 
            border-radius: 18px; color: #fff; outline: none; transition: 0.3s; font-size: 0.9rem;
        }
        input:focus { border-color: var(--accent); }

        .upload-area { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; border: 1px dashed #333; border-radius: 20px; background: rgba(255,255,255,0.02);
            cursor: pointer; transition: 0.3s; margin-top: 5px;
        }
        .upload-area:hover { border-color: var(--accent); background: rgba(176, 38, 255, 0.05); }
        .upload-area i { font-size: 1.2rem; margin-bottom: 8px; color: #555; }
        .upload-area span { font-size: 0.7rem; font-weight: 600; color: #888; }

        .btn-save { background: #fff; color: #000; padding: 20px; border-radius: 20px; border: none; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }

        /* PERFIL PÚBLICO */
        .pfp-view { width: 120px; height: 120px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); margin-bottom: 20px; object-fit: cover; }
        .bio-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }

        .link-item { 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; color: #fff; text-decoration: none; font-weight: 600; 
            margin-bottom: 12px; transition: 0.3s; font-size: 0.95rem;
        }
        .link-item:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: translateY(-3px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="enterSite()">
        <h1>CLICK TO ENTER</h1>
    </div>

    <div class="wrapper">
        
        <div id="login-ui" class="card">
            <h1 style="margin-bottom: 30px;">Omni<span style="color:var(--accent)">Bio</span></h1>
            <button class="btn-save" style="background:#5865f2; color:#fff;" onclick="login()">
                <i class="fab fa-discord"></i> ENTRAR COM DISCORD
            </button>
        </div>

        <div id="admin-ui" class="card hidden" style="max-height: 90vh; overflow-y: auto;">
            <div class="admin-header"><i class="fas fa-magic"></i> PAINEL DE EDIÇÃO</div>
            
            <div class="field"><label>Apelido na URL</label><input type="text" id="username" placeholder="ex: luan7"></div>
            <div class="field"><label>Nome no Perfil</label><input type="text" id="display_name" placeholder="Seu nome"></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div class="field">
                    <label>Avatar</label>
                    <div id="stat-pfp" class="media-indicator"><div class="status-tag status-off"></div> NENHUM</div>
                    <div class="upload-area" onclick="document.getElementById('pfp-input').click()">
                        <i class="fas fa-user-circle"></i><span>MUDAR</span>
                    </div>
                    <input type="file" id="pfp-input" class="hidden">
                </div>
                <div class="field">
                    <label>Fundo</label>
                    <div id="stat-bg" class="media-indicator"><div class="status-tag status-off"></div> NENHUM</div>
                    <div class="upload-area" onclick="document.getElementById('bg-input').click()">
                        <i class="fas fa-image"></i><span>MUDAR</span>
                    </div>
                    <input type="file" id="bg-input" class="hidden">
                </div>
            </div>

            <div class="field">
                <label>Música de Fundo</label>
                <div id="stat-audio" class="media-indicator"><div class="status-tag status-off"></div> NENHUM</div>
                <div class="upload-area" onclick="document.getElementById('audio-input').click()">
                    <i class="fas fa-music"></i><span>ESCOLHER MP3</span>
                </div>
                <input type="file" id="audio-input" class="hidden">
            </div>

            <div class="field"><label>Links (Nome,URL|Nome,URL)</label><textarea id="links" rows="2"></textarea></div>
            
            <button class="btn-save" onclick="saveBio()" id="save-btn">SALVAR TUDO</button>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name" class="bio-title"></h1>
            
            <div id="discord-presence" class="hidden" style="background: rgba(0,0,0,0.4); border-radius: 25px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; text-align: left; border: 1px solid rgba(255,255,255,0.05);">
                <div style="position: relative; width: 50px; height: 50px;">
                    <img id="dc-pfp" style="width: 100%; height: 100%; border-radius: 15px;">
                    <div id="dc-status" style="position: absolute; bottom: -3px; right: -3px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #111;"></div>
                </div>
                <div>
                    <h4 id="dc-user" style="font-size:0.85rem; font-weight: 800;"></h4>
                    <p id="dc-activity" style="font-size:0.7rem; color:#aaa; font-weight: 600;"></p>
                </div>
            </div>

            <div id="bio-links-container"></div>
        </div>

    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let userDiscordId = null;

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlNick = new URLSearchParams(window.location.search).get('u');
            if (urlNick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                loadBioData(urlNick);
            } else if (session) {
                const identity = session.user.identities.find(i => i.provider === 'discord');
                if(identity) userDiscordId = identity.id;
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');

            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                
                // ATUALIZA STATUS DAS MÍDIAS
                updateMediaStatus('stat-pfp', data.pfp_url);
                updateMediaStatus('stat-bg', data.bg_url);
                updateMediaStatus('stat-audio', data.audio_url);
            }
        }

        function updateMediaStatus(id, url) {
            const el = document.getElementById(id);
            if(url) {
                el.innerHTML = `<div class="status-tag status-on"></div> CONECTADO`;
                el.classList.add('status-on');
            } else {
                el.innerHTML = `<div class="status-tag status-off"></div> NENHUM`;
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPANDO ARQUIVOS...";

            const { data: current } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            let pfp = current?.pfp_url, bg = current?.bg_url, audio = current?.audio_url;

            const up = async (id, path) => {
                const f = document.getElementById(id).files[0];
                if(!f) return null;
                const fullPath = `${path}/${user.id}`;
                await _supabase.storage.from('assets').upload(fullPath, f, {upsert: true});
                return _supabase.storage.from('assets').getPublicUrl(fullPath).data.publicUrl + "?v=" + Date.now();
            };

            const nPfp = await up('pfp-input', 'pfp'); if(nPfp) pfp = nPfp;
            const nBg = await up('bg-input', 'bg'); if(nPfp) bg = nBg;
            const nAud = await up('audio-input', 'audio'); if(nAud) audio = nAud;

            await _supabase.from('bios').upsert({
                user_id: user.id, username: document.getElementById('username').value,
                display_name: document.getElementById('display_name').value,
                discord_id: userDiscordId, links: document.getElementById('links').value,
                pfp_url: pfp, bg_url: bg, audio_url: audio, show_discord: true
            });

            btn.innerText = "SUCESSO!";
            setTimeout(() => location.reload(), 1000);
        }

        let bioData = null;
        async function loadBioData(nick) {
            const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
            bioData = data;
        }

        function enterSite() {
            document.getElementById('enter-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-screen').classList.add('hidden'), 800);
            
            const data = bioData;
            document.getElementById('bio-view').classList.remove('hidden');

            if(data.bg_url) {
                if(data.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = data.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
            }
            if(data.audio_url) {
                const a = document.getElementById('bg-audio'); a.src = data.audio_url; a.volume = 0.3; a.play();
            }

            document.getElementById('bio-pfp').src = data.pfp_url;
            document.getElementById('bio-name').innerText = data.display_name;

            const cont = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [n, u] = l.split(',');
                if(n && u) {
                    const a = document.createElement('a'); a.className = 'link-item'; a.href = u; a.target = "_blank";
                    let icon = '<i class="fas fa-link"></i>';
                    if(u.includes('discord')) icon = '<i class="fab fa-discord"></i>';
                    else if(u.includes('instagram')) icon = '<i class="fab fa-instagram"></i>';
                    else if(u.includes('steam')) icon = '<i class="fab fa-steam"></i>';
                    a.innerHTML = `${icon} ${n}`;
                    cont.appendChild(a);
                }
            });

            if(data.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                updateDC(data.discord_id);
                setInterval(() => updateDC(data.discord_id), 10000);
            }
        }

        async function updateDC(id) {
            const r = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await r.json();
            if(!data) return;
            document.getElementById('dc-user').innerText = data.discord_user.display_name || data.discord_user.username;
            document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
            const dot = document.getElementById('dc-status');
            dot.style.background = data.discord_status === 'online' ? '#23a559' : (data.discord_status === 'dnd' ? '#f23f43' : '#80848e');
            
            let act = "Online";
            if(data.activities && data.activities.length > 0) {
                const game = data.activities.find(x => x.type === 0);
                act = game ? `Jogando ${game.name}` : (data.listening_to_spotify ? "Ouvindo Spotify" : "Online");
            }
            document.getElementById('dc-activity').innerText = act;
        }
    </script>
</body>
</html>
