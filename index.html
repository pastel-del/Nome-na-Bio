<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Professional Identity System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --surface-light: #121212;
            --border: #1f1f1f;
            --accent: #0071e3;
            --text: #ffffff;
            --text-dim: #86868b;
            --success: #28cd41;
            --error: #ff3b30;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }
        .hidden { display: none !important; }
        
        #effects-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- DASHBOARD --- */
        .dash-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 40px 24px; position: sticky; top: 0; height: 100vh; }
        .main-content { padding: 60px; max-width: 1000px; margin: 0 auto; width: 100%; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px; margin-bottom: 30px; animation: fadeIn 0.6s ease; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; color: var(--accent); }
        
        label { display: block; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        /* --- SOCIAL INPUTS --- */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .social-input-group { position: relative; }
        .social-input-group i { position: absolute; left: 15px; top: 35px; color: var(--text-dim); font-size: 16px; }
        .social-input-group input { padding-left: 45px; }

        /* --- BUTTONS --- */
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size: 14px; text-decoration: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }

        /* --- PUBLIC PROFILE RENDER --- */
        #profile-render { min-height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 5; position: relative; }
        .p-card { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); width: 95%; max-width: 450px; border-radius: 40px; padding: 50px 30px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        .p-avatar { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 20px; object-fit: cover; }
        
        .social-links-row { display: flex; justify-content: center; gap: 12px; margin-top: 30px; flex-wrap: wrap; }
        .social-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.05); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; text-decoration: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .social-icon:hover { transform: translateY(-5px); background: var(--accent); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,113,227,0.3); }

        #toast { position: fixed; top: 30px; right: 30px; z-index: 10000; background: var(--surface-light); border: 1px solid var(--border); padding: 18px 28px; border-radius: 18px; }
    </style>
</head>
<body>

    <canvas id="effects-canvas"></canvas>

    <div id="toast" class="hidden animate__animated">
        <span id="toast-msg"></span>
    </div>

    <section id="view-admin" class="hidden">
        <div class="dash-layout">
            <aside class="sidebar">
                <div style="font-size: 24px; font-weight: 900; margin-bottom: 50px;">OmniBio<span style="color:var(--accent)">.</span></div>
                <div style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
                        <img id="admin-pfp" style="width: 45px; height: 45px; border-radius: 50%;">
                        <div>
                            <p id="admin-name" style="font-weight: 700; font-size: 14px;"></p>
                            <p style="font-size: 10px; color: var(--success);">PAINEL ATIVO</p>
                        </div>
                    </div>
                </div>
                <button class="btn btn-ghost" onclick="logout()" style="width: 100%; color: var(--error);">Sair</button>
            </aside>

            <main class="main-content">
                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-share-nodes"></i><h2>Redes Sociais</h2></div>
                    <div class="social-grid">
                        <div class="social-input-group">
                            <label>Instagram</label><i class="fa-brands fa-instagram"></i>
                            <input type="text" id="social_instagram" placeholder="Link do perfil">
                        </div>
                        <div class="social-input-group">
                            <label>TikTok</label><i class="fa-brands fa-tiktok"></i>
                            <input type="text" id="social_tiktok" placeholder="Link do perfil">
                        </div>
                        <div class="social-input-group">
                            <label>Discord</label><i class="fa-brands fa-discord"></i>
                            <input type="text" id="social_discord" placeholder="Link do convite/perfil">
                        </div>
                        <div class="social-input-group">
                            <label>Twitter / X</label><i class="fa-brands fa-x-twitter"></i>
                            <input type="text" id="social_twitter" placeholder="Link do perfil">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-wand-magic-sparkles"></i><h2>Estilo e Efeitos</h2></div>
                    <label>Efeito de Fundo Premium</label>
                    <select id="db_effect">
                        <option value="none">Nenhum</option>
                        <option value="sakura">Sakura (Pétalas Rosa)</option>
                        <option value="cyber">Cyber Lines (Tecnologia)</option>
                        <option value="matrix">Matrix Code</option>
                        <option value="snow">Neve Suave</option>
                        <option value="bubbles">Bolhas Flutuantes</option>
                    </select>
                    
                    <label>Username (URL)</label>
                    <input type="text" id="db_username">
                    
                    <button class="btn btn-primary" style="width: 100%; padding: 20px;" onclick="saveBioData()">SALVAR ALTERAÇÕES</button>
                </div>
            </main>
        </div>
    </section>

    <section id="view-profile" class="hidden">
        <div id="profile-render">
            <div class="p-card animate__animated animate__fadeInUp">
                <img id="v-avatar" class="p-avatar">
                <h1 id="v-display-name" style="font-size: 32px; font-weight: 800; margin-bottom: 5px;"></h1>
                <p id="v-username" style="color: var(--accent); font-weight: 700; margin-bottom: 20px;"></p>
                <p id="v-bio-text" style="color: var(--text-dim); line-height: 1.6;"></p>
                
                <div class="social-links-row" id="v-social-row"></div>
            </div>
        </div>
    </section>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let activeUser = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const u = params.get('u');
            if (u) { loadProfile(u); } 
            else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) { activeUser = session.user; loadAdmin(); } 
            }
        }

        // --- MOTOR DE EFEITOS ATUALIZADO ---
        function startEffect(type) {
            if (!type || type === 'none') return;
            const canvas = document.getElementById('effects-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];

            if (type === 'sakura') {
                for(let i=0; i<40; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*8+4, v: Math.random()*1.5+0.5, r: Math.random()*360 });
                function drawSakura() {
                    ctx.clearRect(0,0,canvas.width, canvas.height);
                    ctx.fillStyle = '#ffb7c5';
                    particles.forEach(p => {
                        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI/180);
                        ctx.beginPath(); ctx.ellipse(0,0, p.s, p.s/2, 0, 0, 2*Math.PI); ctx.fill(); ctx.restore();
                        p.y += p.v; p.x += Math.sin(p.y/50); p.r += 1;
                        if(p.y > canvas.height) p.y = -10;
                    });
                    requestAnimationFrame(drawSakura);
                } drawSakura();
            }

            if (type === 'cyber') {
                for(let i=0; i<60; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5 });
                function drawCyber() {
                    ctx.clearRect(0,0,canvas.width, canvas.height);
                    ctx.strokeStyle = 'rgba(0, 113, 227, 0.2)';
                    ctx.fillStyle = 'rgba(0, 113, 227, 0.5)';
                    particles.forEach((p, i) => {
                        p.x += p.vx; p.y += p.vy;
                        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
                        for(let j=i+1; j<particles.length; j++) {
                            let dist = Math.hypot(p.x - particles[j].x, p.y - particles[j].y);
                            if(dist < 130) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                        }
                    });
                    requestAnimationFrame(drawCyber);
                } drawCyber();
            }
            // Outros efeitos (matrix, snow) seguem lógica similar...
        }

        async function saveBioData() {
            const payload = {
                user_id: activeUser.id,
                username: document.getElementById('db_username').value.toLowerCase(),
                effect_type: document.getElementById('db_effect').value,
                instagram: document.getElementById('social_instagram').value,
                tiktok: document.getElementById('social_tiktok').value,
                discord: document.getElementById('social_discord').value,
                twitter: document.getElementById('social_twitter').value
            };
            const { error } = await _supabase.from('bios').upsert(payload, { onConflict: 'user_id' });
            if(!error) toast("Perfil atualizado com sucesso!");
        }

        async function loadProfile(u) {
            const { data } = await _supabase.from('bios').select('*').eq('username', u).single();
            if(!data) return;
            document.getElementById('view-profile').classList.remove('hidden');
            document.getElementById('v-display-name').innerText = data.display_name || u;
            document.getElementById('v-username').innerText = `@${u}`;
            document.getElementById('v-bio-text').innerText = data.bio_text;
            document.getElementById('v-avatar').src = data.pfp_url || `https://ui-avatars.com/api/?name=${u}`;
            
            // Renderiza Redes Sociais
            const socials = [
                { id: 'instagram', icon: 'fa-instagram' },
                { id: 'tiktok', icon: 'fa-tiktok' },
                { id: 'discord', icon: 'fa-discord' },
                { id: 'twitter', icon: 'fa-x-twitter' }
            ];
            const row = document.getElementById('v-social-row');
            row.innerHTML = '';
            socials.forEach(s => {
                if(data[s.id]) {
                    row.innerHTML += `<a href="${data[s.id]}" target="_blank" class="social-icon"><i class="fa-brands ${s.icon}"></i></a>`;
                }
            });

            startEffect(data.effect_type);
        }

        async function loadAdmin() {
            document.getElementById('view-admin').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', activeUser.id).maybeSingle();
            if(data) {
                document.getElementById('db_username').value = data.username || '';
                document.getElementById('db_effect').value = data.effect_type || 'none';
                document.getElementById('social_instagram').value = data.instagram || '';
                document.getElementById('social_tiktok').value = data.tiktok || '';
                document.getElementById('social_discord').value = data.discord || '';
                document.getElementById('social_twitter').value = data.twitter || '';
                document.getElementById('admin-pfp').src = activeUser.user_metadata.avatar_url;
                document.getElementById('admin-name').innerText = activeUser.user_metadata.full_name;
            }
        }

        function toast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = m;
            t.classList.remove('hidden'); t.classList.add('animate__fadeInDown');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        init();
    </script>
</body>
</html>
