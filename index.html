<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio Pro | Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --main: #b026ff; --bg: #050505; --accent: #00ffcc; }
        * { box-sizing: border-box; transition: 0.3s ease-out; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; }

        /* PAINEL E LOGIN */
        .container { max-width: 480px; margin: 50px auto; padding: 20px; }
        .panel { background: #111; padding: 35px; border-radius: 28px; border: 1px solid #222; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .hidden { display: none !important; }
        
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(176, 38, 255, 0.3); }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-main { background: var(--main); color: white; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-discord:hover { background: #4752c4; }

        /* BIO VIEW */
        #bio-view { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background-size: cover; background-position: center; z-index: 1000; }
        .glass { background: rgba(0,0,0,0.4); backdrop-filter: blur(25px); padding: 50px; border-radius: 40px; text-align: center; width: 380px; border: 1px solid rgba(255,255,255,0.1); transform-style: preserve-3d; }
        .pfp { width: 125px; height: 125px; border-radius: 50%; border: 3px solid var(--main); margin-bottom: 20px; object-fit: cover; }
        .link-btn { display: block; padding: 14px; background: rgba(255,255,255,0.05); margin: 12px 0; border-radius: 15px; color: white; text-decoration: none; border: 1px solid transparent; font-weight: 600; }
        .link-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--main); transform: scale(1.03); }
        
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: none; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline></video>

    <div id="login-ui" class="container">
        <div class="panel" style="text-align: center;">
            <h1 style="color: var(--main); font-weight: 800; margin-bottom: 5px;">OmniBio</h1>
            <p style="color: #666; margin-bottom: 30px;">Crie sua bio profissional em segundos.</p>
            <button class="btn btn-discord" onclick="login()">ENTRAR COM DISCORD</button>
        </div>
    </div>

    <div id="admin-ui" class="container hidden">
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0">Meu Painel</h2>
                <button onclick="logout()" style="background:none; border:none; color:var(--main); cursor:pointer; font-weight:bold;">Sair</button>
            </div>
            
            <label style="font-size: 0.7rem; color: #555;">NICK DA URL (ex: luan)</label>
            <input type="text" id="username" placeholder="luan7">
            
            <label style="font-size: 0.7rem; color: #555;">NOME NO PERFIL</label>
            <input type="text" id="display_name" placeholder="Luan | Developer">

            <label style="font-size: 0.7rem; color: #555;">FOTO E FUNDO (DO SEU PC)</label>
            <input type="file" id="pfp-input" accept="image/*">
            <input type="file" id="bg-input" accept="image/*,video/mp4">

            <label style="font-size: 0.7rem; color: #555;">MEUS LINKS (Nome,URL|Nome,URL)</label>
            <textarea id="links" rows="3" placeholder="Discord,https://...|Steam,https://..."></textarea>

            <button class="btn btn-main" onclick="saveBio()">SALVAR ALTERAÇÕES</button>
            <div id="status-msg" style="margin-top:15px; text-align:center; font-size:0.8rem;"></div>
        </div>
    </div>

    <div id="bio-view">
        <div class="glass" id="tilt-card">
            <img id="bio-pfp" class="pfp" src="">
            <h1 id="bio-name" style="margin: 0; font-weight: 800;"></h1>
            <p id="bio-status" style="color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; margin-top: 5px;">ONLINE</p>
            <div id="bio-links-container" style="margin-top: 25px;"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function login() {
            await _supabase.auth.signInWithOAuth({ provider: 'discord' });
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        // --- SISTEMA DE DETECÇÃO ---
        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlUser = new URLSearchParams(window.location.search).get('u');
            if (urlUser) {
                loadBio(urlUser);
            } else if (session) {
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');

            // Carrega o que já existe no banco
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).single();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                document.getElementById('status-msg').innerHTML = `Sua bio: <a href="?u=${data.username}" target="_blank" style="color:var(--accent)">clique aqui para ver</a>`;
            }
        }

        async function saveBio() {
            const { data: { user } } = await _supabase.auth.getUser();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const msg = document.getElementById('status-msg');
            msg.innerText = "⚡ Sincronizando com a nuvem...";

            try {
                let pfpUrl = null;
                let bgUrl = null;

                const pfpFile = document.getElementById('pfp-input').files[0];
                const bgFile = document.getElementById('bg-input').files[0];

                if(pfpFile) {
                    const path = `pfp/${user.id}_${Date.now()}`;
                    await _supabase.storage.from('assets').upload(path, pfpFile);
                    pfpUrl = _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl;
                }

                if(bgFile) {
                    const path = `bg/${user.id}_${Date.now()}`;
                    await _supabase.storage.from('assets').upload(path, bgFile);
                    bgUrl = _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl;
                }

                const updateData = {
                    user_id: user.id,
                    username: username,
                    display_name: document.getElementById('display_name').value,
                    links: document.getElementById('links').value,
                };

                if(pfpUrl) updateData.pfp_url = pfpUrl;
                if(bgUrl) updateData.bg_url = bgUrl;

                const { error } = await _supabase.from('bios').upsert(updateData, { onConflict: 'user_id' });
                if(error) throw error;

                msg.innerHTML = "✅ Bio atualizada com sucesso!";
            } catch (e) {
                msg.innerText = "❌ Erro: " + e.message;
            }
        }

        async function loadBio(nick) {
            const { data } = await _supabase.from('bios').select('*').eq('username', nick).single();
            if(!data) return alert("Bio não encontrada!");

            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.add('hidden');
            const view = document.getElementById('bio-view');
            view.style.display = 'flex';

            if(data.bg_url) {
                if(data.bg_url.endsWith('.mp4')) {
                    const v = document.getElementById('bg-video');
                    v.src = data.bg_url; v.style.display = 'block';
                } else {
                    view.style.backgroundImage = `url(${data.bg_url})`;
                }
            }

            document.getElementById('bio-pfp').src = data.pfp_url || 'https://via.placeholder.com/150';
            document.getElementById('bio-name').innerText = data.display_name.toUpperCase();
            
            const container = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [n, u] = l.split(',');
                if(n && u) {
                    const a = document.createElement('a');
                    a.href = u; a.target = "_blank"; a.innerText = n;
                    a.className = 'link-btn';
                    container.appendChild(a);
                }
            });

            // Efeito Tilt 3D
            document.addEventListener('mousemove', e => {
                let xAxis = (window.innerWidth / 2 - e.clientX) / 20;
                let yAxis = (window.innerHeight / 2 - e.clientY) / 20;
                document.getElementById('tilt-card').style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        }
    </script>
</body>
</html>
