<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Elite Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { --bg: #050505; --card-bg: rgba(10, 10, 10, 0.7); --border: rgba(255, 255, 255, 0.08); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        /* Backgrounds */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: -1; backdrop-filter: blur(10px); }

        .wrapper { width: 100%; max-width: 450px; padding: 20px; z-index: 10; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 40px 30px; text-align: center; backdrop-filter: blur(20px); }

        /* Botões */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 0.9rem; }
        .btn-discord { background: #5865f2; color: #fff; }
        .btn-primary { background: #fff; color: #000; }

        /* Admin Fields */
        .field { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.4); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; border-radius: 10px; outline: none; }

        /* Bio View Elements */
        .pfp-view { width: 100px; height: 100px; border-radius: 50%; border: 1px solid var(--border); margin-bottom: 15px; object-fit: cover; }
        .link-btn { display: block; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; text-decoration: none; font-weight: 600; margin-bottom: 10px; }
        
        /* Discord Card */
        .discord-card { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-radius: 16px; padding: 12px; margin: 20px 0; display: flex; align-items: center; gap: 12px; text-align: left; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #000; }

        .hidden { display: none !important; }
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="renderBioFinal()">
        <h1 style="letter-spacing: 0.5em; font-size: 0.7rem; color: #666;">CLICK TO ENTER</h1>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card hidden">
            <h1 style="font-size: 2rem; margin-bottom: 10px;">OmniBio</h1>
            <p style="font-size: 0.85rem; color: #888; margin-bottom: 25px; line-height: 1.5;">
                Inspirado na lenda do <span style="color: #5865f2; font-weight: bold;">Pastel Randola</span>, o rei do RP. Crie sua identidade de elite agora.
            </p>
            <button class="btn btn-discord" onclick="login()">ENTRAR COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden" style="max-height: 80vh; overflow-y: auto;">
            <h2 style="margin-bottom: 20px;">Configurar Bio</h2>
            <div class="field"><label>Nick da URL</label><input type="text" id="username"></div>
            <div class="field"><label>Nome de Exibição</label><input type="text" id="display_name"></div>
            
            <div style="display:flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; margin-bottom: 15px;">
                <span style="font-size: 0.8rem;">Status do Discord</span>
                <input type="checkbox" id="show_discord_toggle" checked style="width: 20px;">
            </div>

            <div class="field"><label>Foto (Link ou Upload)</label><input type="file" id="pfp-input"></div>
            <div class="field"><label>Fundo (Link ou Upload)</label><input type="file" id="bg-input"></div>
            <div class="field"><label>Música (Link ou Upload)</label><input type="file" id="audio-input"></div>
            <div class="field"><label>Links (Nome,Link | Nome,Link)</label><textarea id="links" rows="2"></textarea></div>

            <button class="btn btn-primary" onclick="saveBio()" id="save-btn">SALVAR</button>
            <div id="success-link" style="margin-top: 10px; font-size: 0.7rem;"></div>
            <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; margin-top: 15px; font-size: 0.7rem;">Sair</button>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view">
            <h1 id="bio-name"></h1>
            <p id="bio-at" style="color: #555; font-size: 0.8rem; margin-bottom: 20px;"></p>
            
            <div id="discord-presence" class="discord-card hidden">
                <div style="position:relative; width:48px; height:48px;">
                    <img id="dc-pfp" style="width:100%; height:100%; border-radius:50%;">
                    <div id="dc-status" class="status-dot"></div>
                </div>
                <div><h3 id="dc-user" style="font-size:0.85rem;"></h3><p id="dc-activity" style="font-size:0.7rem; color:#888;"></p></div>
            </div>
            <div id="links-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let userDiscordId = null;
        let bioToRender = null;

        // Gerenciador de Telas - O segredo para não bugar
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const nick = params.get('u');

            if (nick) {
                // MODO VISUALIZAÇÃO
                const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
                if (data) {
                    bioToRender = data;
                    document.getElementById('enter-screen').classList.remove('hidden');
                } else {
                    alert("Bio não encontrada.");
                    window.location.href = window.location.origin + window.location.pathname;
                }
            } else {
                // MODO ADMIN / LOGIN
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    const identity = session.user.identities.find(i => i.provider === 'discord');
                    userDiscordId = identity?.id;
                    loadAdmin(session.user.id);
                } else {
                    document.getElementById('login-ui').classList.remove('hidden');
                }
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); window.location.reload(); }

        async function loadAdmin(userId) {
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', userId).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                document.getElementById('show_discord_toggle').checked = data.show_discord !== false;
                showSuccessLink(data.username);
            }
        }

        function showSuccessLink(nick) {
            const link = `${window.location.origin}${window.location.pathname}?u=${nick}`;
            document.getElementById('success-link').innerHTML = `Link: <a href="${link}" style="color:#5865f2">${link}</a>`;
        }

        async function saveBio() {
            const { data: { user } } = await _supabase.auth.getUser();
            const btn = document.getElementById('save-btn');
            btn.innerText = "SALVANDO...";
            
            let pfp = "", bg = "", aud = "";
            const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            pfp = curr?.pfp_url; bg = curr?.bg_url; aud = curr?.audio_url;

            // Uploads simplificados
            const fPfp = document.getElementById('pfp-input').files[0];
            const fBg = document.getElementById('bg-input').files[0];
            const fAud = document.getElementById('audio-input').files[0];

            if(fPfp) { await _supabase.storage.from('assets').upload(`pfp/${user.id}`, fPfp, {upsert:true}); pfp = _supabase.storage.from('assets').getPublicUrl(`pfp/${user.id}`).data.publicUrl + "?t="+Date.now(); }
            if(fBg) { await _supabase.storage.from('assets').upload(`bg/${user.id}`, fBg, {upsert:true}); bg = _supabase.storage.from('assets').getPublicUrl(`bg/${user.id}`).data.publicUrl + "?t="+Date.now(); }
            if(fAud) { await _supabase.storage.from('assets').upload(`audio/${user.id}`, fAud, {upsert:true}); aud = _supabase.storage.from('assets').getPublicUrl(`audio/${user.id}`).data.publicUrl + "?t="+Date.now(); }

            await _supabase.from('bios').upsert({
                user_id: user.id,
                username: document.getElementById('username').value.trim().toLowerCase(),
                display_name: document.getElementById('display_name').value,
                discord_id: userDiscordId,
                links: document.getElementById('links').value,
                show_discord: document.getElementById('show_discord_toggle').checked,
                pfp_url: pfp, bg_url: bg, audio_url: aud
            }, { onConflict: 'user_id' });

            btn.innerText = "SALVO!";
            setTimeout(() => btn.innerText = "SALVAR", 2000);
            showSuccessLink(document.getElementById('username').value);
        }

        function renderBioFinal() {
            document.getElementById('enter-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-screen').classList.add('hidden'), 500);
            
            const d = bioToRender;
            document.getElementById('bio-view').classList.remove('hidden');
            document.getElementById('bio-name').innerText = d.display_name;
            document.getElementById('bio-at').innerText = `@${d.username}`;
            document.getElementById('bio-pfp').src = d.pfp_url || '';

            if(d.bg_url) {
                if(d.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) { const a = document.getElementById('bg-audio'); a.src = d.audio_url; a.play(); a.volume = 0.4; }

            if(d.links) {
                const cont = document.getElementById('links-container');
                d.links.split('|').forEach(item => {
                    const [name, url] = item.split(',');
                    if(name && url) {
                        const a = document.createElement('a'); a.className = 'link-btn'; a.href = url.trim(); a.target = "_blank"; a.innerText = name.trim();
                        cont.appendChild(a);
                    }
                });
            }

            if(d.discord_id && d.show_discord !== false) {
                document.getElementById('discord-presence').classList.remove('hidden');
                updateDiscord(d.discord_id);
            }
        }

        async function updateDiscord(id) {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
                const { data } = await res.json();
                if(data) {
                    document.getElementById('dc-user').innerText = data.discord_user.global_name || data.discord_user.username;
                    document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                    const s = data.discord_status;
                    document.getElementById('dc-status').style.background = s==='online'?'#23a559':s==='dnd'?'#f23f43':s==='idle'?'#f0b232':'#80848e';
                    document.getElementById('dc-activity').innerText = data.listening_to_spotify ? `Ouvindo ${data.spotify.track}` : (data.activities[0]?.name || 'Online');
                }
            } catch(e) {}
        }

        init(); // Roda ao carregar
    </script>
</body>
</html>
