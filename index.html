<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #050505;
            --surface: #111111;
            --border: #222222;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #0071e3;
            --success: #34c759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .hidden { display: none !important; }

        /* --- Dashboard Admin --- */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        h2 { font-size: 14px; margin-bottom: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* --- Inputs e Upload Zones --- */
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { 
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); 
            color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; 
        }

        /* Estilo da área de Drag & Drop */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(0, 113, 227, 0.05);
        }
        .upload-zone i { font-size: 24px; color: var(--text-dim); margin-bottom: 10px; }
        .upload-zone p { font-size: 12px; color: var(--text-dim); }
        .upload-zone.done { border-color: var(--success); }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; width: 100%; text-align: center; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #222; color: #fff; }

        /* --- Ranking --- */
        .rank-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; text-decoration: none; color: inherit; border-bottom: 1px solid var(--border); }
        .rank-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section" class="hidden">
            <button class="btn btn-primary" onclick="login()">Entrar com Discord</button>
        </div>

        <div id="admin-section" class="hidden">
            <header>
                <div id="user-info" style="display: flex; align-items: center; gap: 10px;">
                    <img id="my-avatar" style="width: 35px; border-radius: 50%;">
                    <span id="my-name"></span>
                </div>
                <button class="btn btn-secondary" onclick="logout()" style="width: auto;">Sair</button>
            </header>

            <div class="grid">
                <div class="editor">
                    <div class="card">
                        <h2>Personalização</h2>
                        <label>Username (URL)</label>
                        <input type="text" id="in_username">
                        <label>Nome de Exibição</label>
                        <input type="text" id="in_display_name">
                        <label>Bio</label>
                        <textarea id="in_bio" rows="2"></textarea>
                    </div>

                    <div class="card">
                        <h2>Mídias & Arquivos</h2>
                        
                        <label>Foto de Perfil (PFP)</label>
                        <div class="upload-zone" id="zone-pfp" onclick="triggerFile('file-pfp')">
                            <i class="fa-solid fa-image"></i>
                            <p id="label-pfp">Arraste ou clique para enviar imagem</p>
                            <input type="file" id="file-pfp" class="hidden" accept="image/*">
                        </div>
                        <input type="text" id="in_pfp_url" placeholder="Ou cole a URL aqui">

                        <label>Fundo (Imagem ou Vídeo)</label>
                        <div class="upload-zone" id="zone-bg" onclick="triggerFile('file-bg')">
                            <i class="fa-solid fa-film"></i>
                            <p id="label-bg">Arraste ou clique para enviar fundo</p>
                            <input type="file" id="file-bg" class="hidden" accept="image/*,video/*">
                        </div>
                        <input type="text" id="in_bg_url" placeholder="URL do Background">

                        <label>Música (Audio)</label>
                        <div class="upload-zone" id="zone-audio" onclick="triggerFile('file-audio')">
                            <i class="fa-solid fa-music"></i>
                            <p id="label-audio">Arraste ou clique para enviar MP3</p>
                            <input type="file" id="file-audio" class="hidden" accept="audio/*">
                        </div>
                        <input type="text" id="in_audio_url" placeholder="URL da Música">

                        <button class="btn btn-primary" onclick="saveData()" style="margin-top: 20px;">Publicar Perfil</button>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="card">
                        <h2>Ranking Global</h2>
                        <div id="side-ranking"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // --- Configuração de Upload ---
        
        // Atalho para abrir seletor de arquivo
        function triggerFile(id) { document.getElementById(id).click(); }

        // Lógica de Drag & Drop e Upload
        async function handleFileUpload(file, targetInputId, labelId, zoneId) {
            if (!file) return;
            
            const label = document.getElementById(labelId);
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(targetInputId);
            
            label.innerText = "Enviando...";
            
            const { data: { user } } = await _supabase.auth.getUser();
            const fileExt = file.name.split('.').pop();
            const fileName = `${user.id}/${Math.random()}.${fileExt}`;
            const filePath = `uploads/${fileName}`;

            const { data, error } = await _supabase.storage
                .from('assets') // Certifique-se que o bucket 'assets' existe e é público
                .upload(filePath, file);

            if (error) {
                alert("Erro no upload: " + error.message);
                label.innerText = "Erro ao enviar";
            } else {
                const { data: { publicUrl } } = _supabase.storage.from('assets').getPublicUrl(filePath);
                input.value = publicUrl;
                label.innerText = "Upload concluído!";
                zone.classList.add('done');
            }
        }

        // Configura os eventos para cada zona
        ['pfp', 'bg', 'audio'].forEach(type => {
            const zone = document.getElementById(`zone-${type}`);
            const fileInput = document.getElementById(`file-${type}`);

            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
            zone.ondragleave = () => zone.classList.remove('dragover');
            zone.ondrop = (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                handleFileUpload(e.dataTransfer.files[0], `in_${type}_url`, `label-${type}`, `zone-${type}`);
            };
            fileInput.onchange = (e) => {
                handleFileUpload(e.target.files[0], `in_${type}_url`, `label-${type}`, `zone-${type}`);
            };
        });

        // --- Lógica Geral do App ---

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) { /* Lógica de carregar perfil público */ } 
            else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) showAdmin(session.user);
                else document.getElementById('login-section').classList.remove('hidden');
            }
        }

        async function showAdmin(user) {
            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('my-avatar').src = user.user_metadata.avatar_url;
            document.getElementById('my-name').innerText = user.user_metadata.full_name;

            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('in_username').value = data.username || "";
                document.getElementById('in_display_name').value = data.display_name || "";
                document.getElementById('in_bio').value = data.bio_text || "";
                document.getElementById('in_pfp_url').value = data.pfp_url || "";
                document.getElementById('in_bg_url').value = data.bg_url || "";
                document.getElementById('in_audio_url').value = data.audio_url || "";
            }
        }

        async function saveData() {
            const { data: { user } } = await _supabase.auth.getUser();
            const payload = {
                user_id: user.id,
                username: document.getElementById('in_username').value.toLowerCase(),
                display_name: document.getElementById('in_display_name').value,
                bio_text: document.getElementById('in_bio').value,
                pfp_url: document.getElementById('in_pfp_url').value,
                bg_url: document.getElementById('in_bg_url').value,
                audio_url: document.getElementById('in_audio_url').value,
                discord_id: user.user_metadata.provider_id
            };
            const { error } = await _supabase.from('bios').upsert(payload);
            alert(error ? "Erro: " + error.message : "Perfil Publicado!");
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
