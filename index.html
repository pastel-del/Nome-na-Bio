<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Elite Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { --primary: #fff; --accent: #b026ff; --bg: #030303; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        /* VÍDEO E MÍDIA */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; filter: brightness(0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: -1; backdrop-filter: blur(8px); }

        /* TELA DE ENTRADA */
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.6s ease; }
        #enter-screen h1 { font-size: 1rem; letter-spacing: 7px; animation: pulse 2s infinite; font-weight: 800; color: #fff; }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 20px var(--accent); } 50% { opacity: 0.3; } }

        /* CARDS */
        .wrapper { width: 100%; max-width: 440px; padding: 20px; z-index: 10; }
        .card { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 35px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        
        /* ELEMENTOS DO PERFIL */
        .pfp-view { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); margin: 0 auto 20px; object-fit: cover; box-shadow: 0 0 40px rgba(176, 38, 255, 0.4); }
        .link-btn { display: block; padding: 16px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; color: #fff; text-decoration: none; font-weight: 600; margin-bottom: 12px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .link-btn:hover { background: var(--accent); transform: scale(1.03); border-color: transparent; }

        /* DISCORD CARD - OFFLINE STYLE */
        .discord-card { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 18px; margin-bottom: 25px; display: flex; align-items: center; text-align: left; gap: 15px; position: relative; overflow: hidden; }
        .dc-avatar { width: 55px; height: 55px; position: relative; }
        .dc-avatar img { width: 100%; height: 100%; border-radius: 15px; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid #0a0a0a; }
        
        .online { background: #23a559; box-shadow: 0 0 10px #23a559; } 
        .idle { background: #f0b232; } .dnd { background: #f23f43; } 
        
        /* Status Offline Bonito */
        .offline-status { filter: grayscale(1); opacity: 0.7; border-color: rgba(255,255,255,0.05); }
        .offline { background: #80848e; }
        .status-offline-text { color: #ff4d4d !important; font-weight: 800 !important; text-transform: uppercase; letter-spacing: 1px; font-size: 0.65rem !important; }

        /* UPLOAD BUTTONS MODERNOS */
        .upload-grid { display: grid; gap: 10px; margin-bottom: 20px; }
        .file-input-wrapper { position: relative; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.2); border-radius: 15px; padding: 15px; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .file-input-wrapper:hover { background: rgba(255,255,255,0.06); border-color: var(--accent); }
        .file-input-wrapper input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-info { display: flex; align-items: center; gap: 12px; }
        .upload-label-text { font-size: 0.8rem; font-weight: 600; color: #eee; }
        .action-tag { font-size: 0.6rem; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .tag-up { background: #23a559; color: #fff; }
        .tag-change { background: var(--accent); color: #fff; }

        /* ADMIN INPUTS */
        .field { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: #666; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid #222; color: #fff; border-radius: 14px; outline: none; transition: 0.3s; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #fff; color: #000; margin-top: 10px; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn-discord { background: #5865f2; color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="enterSite()">
        <h1>[ CLIQUE PARA ENTRAR ]</h1>
    </div>

    <div class="wrapper">
        
        <div id="login-ui" class="card">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Omni<span style="color:var(--accent)">Bio</span></h1>
            <p style="color:#666; margin-bottom: 30px; font-size: 0.85rem; letter-spacing: 1px;">ELITE IDENTITY MANAGEMENT</p>
            <button class="btn btn-discord" onclick="login()">ENTRAR COM DISCORD</button>
        </div>

        <div id="admin-ui" class="card hidden" style="max-height: 85vh; overflow-y: auto;">
            <h2 style="margin-bottom: 25px; font-size: 1.4rem;">Configurações</h2>
            
            <div class="field"><label>Nick da URL</label><input type="text" id="username" placeholder="ex: luan"></div>
            <div class="field"><label>Nome de Exibição</label><input type="text" id="display_name" placeholder="Como aparece no perfil"></div>
            
            <div class="toggle-container">
                <span>Mostrar Status do Discord</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-discord" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <label>Mídias do Perfil</label>
            <div class="upload-grid">
                <div class="file-input-wrapper">
                    <div class="upload-info">
                        <img id="curr-pfp" class="current-media" src="https://via.placeholder.com/30">
                        <span class="upload-label-text">Foto de Perfil</span>
                    </div>
                    <span id="label-pfp" class="action-tag tag-up">Upar</span>
                    <input type="file" id="pfp-input" accept="image/*" onchange="updateTag('pfp')">
                </div>

                <div class="file-input-wrapper">
                    <div class="upload-info">
                        <div id="curr-bg" class="current-media" style="display:flex;align-items:center;justify-content:center;font-size:0.5rem">--</div>
                        <span class="upload-label-text">Fundo (Vídeo/Foto)</span>
                    </div>
                    <span id="label-bg" class="action-tag tag-up">Upar</span>
                    <input type="file" id="bg-input" accept="image/*,video/mp4" onchange="updateTag('bg')">
                </div>

                <div class="file-input-wrapper">
                    <div class="upload-info">
                        <div id="curr-audio" class="current-media" style="display:flex;align-items:center;justify-content:center;font-size:0.5rem">--</div>
                        <span class="upload-label-text">Música (MP3)</span>
                    </div>
                    <span id="label-audio" class="action-tag tag-up">Upar</span>
                    <input type="file" id="audio-input" accept="audio/*" onchange="updateTag('audio')">
                </div>
            </div>

            <div class="field"><label>Links (Nome,URL|Nome,URL)</label><textarea id="links" rows="2" placeholder="Steam,https://..."></textarea></div>
            
            <button class="btn btn-primary" onclick="saveBio()" id="save-btn">SALVAR ALTERAÇÕES</button>
            <div id="status-box" style="margin-top: 15px; font-size: 0.8rem;"></div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name" style="font-weight: 800; font-size: 2rem; margin-bottom: 25px;"></h1>
            
            <div id="discord-presence" class="discord-card hidden">
                <div class="dc-avatar">
                    <img id="dc-pfp" src="">
                    <div id="dc-status" class="status-dot offline"></div>
                </div>
                <div class="dc-info">
                    <h3 id="dc-user">Carregando...</h3>
                    <p id="dc-activity">Sincronizando...</p>
                </div>
            </div>

            <div id="bio-links-container"></div>
        </div>

    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userDiscordId = null;

        // Função para mudar o texto das tags de upload
        function updateTag(type) {
            const el = document.getElementById(`label-${type}`);
            el.innerText = "Mudar";
            el.className = "action-tag tag-change";
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlNick = new URLSearchParams(window.location.search).get('u');
            if (urlNick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                prepareBio(urlNick);
            } else if (session) {
                const identity = session.user.identities.find(i => i.provider === 'discord');
                if(identity) userDiscordId = identity.id;
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');

            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                document.getElementById('toggle-discord').checked = data.show_discord !== false;
                
                if(data.pfp_url) { 
                    document.getElementById('curr-pfp').src = data.pfp_url;
                    updateTag('pfp');
                }
                if(data.bg_url) {
                    document.getElementById('curr-bg').innerText = "OK";
                    updateTag('bg');
                }
                if(data.audio_url) {
                    document.getElementById('curr-audio').innerText = "OK";
                    updateTag('audio');
                }
            }
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "⏳ SALVANDO...";

            try {
                const { data: currentData } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
                let pfpUrl = currentData?.pfp_url, bgUrl = currentData?.bg_url, audioUrl = currentData?.audio_url;

                const pfpF = document.getElementById('pfp-input').files[0];
                const bgF = document.getElementById('bg-input').files[0];
                const audF = document.getElementById('audio-input').files[0];

                if(pfpF) {
                    await _supabase.storage.from('assets').upload(`pfp/${user.id}`, pfpF, {upsert: true});
                    pfpUrl = _supabase.storage.from('assets').getPublicUrl(`pfp/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }
                if(bgF) {
                    await _supabase.storage.from('assets').upload(`bg/${user.id}`, bgF, {upsert: true});
                    bgUrl = _supabase.storage.from('assets').getPublicUrl(`bg/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }
                if(audF) {
                    await _supabase.storage.from('assets').upload(`audio/${user.id}`, audF, {upsert: true});
                    audioUrl = _supabase.storage.from('assets').getPublicUrl(`audio/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }

                await _supabase.from('bios').upsert({
                    user_id: user.id,
                    username: document.getElementById('username').value.trim().toLowerCase(),
                    display_name: document.getElementById('display_name').value,
                    discord_id: userDiscordId,
                    show_discord: document.getElementById('toggle-discord').checked,
                    links: document.getElementById('links').value,
                    pfp_url: pfpUrl, bg_url: bgUrl, audio_url: audioUrl
                }, { onConflict: 'user_id' });
                
                btn.innerText = "✅ SALVO!";
                setTimeout(() => location.reload(), 1000);
            } catch (e) { alert(e.message); btn.innerText = "ERRO"; }
        }

        let loadedBioData = null;
        async function prepareBio(nick) {
            const { data } = await _supabase.from('bios').select('*').eq('username', nick).maybeSingle();
            if(!data) return alert("Perfil não encontrado!");
            loadedBioData = data;
        }

        function enterSite() {
            const scr = document.getElementById('enter-screen');
            scr.style.opacity = '0';
            setTimeout(() => scr.classList.add('hidden'), 600);
            
            const data = loadedBioData;
            document.getElementById('bio-view').classList.remove('hidden');

            if(data.bg_url) {
                if(data.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video');
                    v.src = data.bg_url; v.style.display = 'block'; v.play();
                } else {
                    document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
                }
            }
            if(data.audio_url) {
                const aud = document.getElementById('bg-audio');
                aud.src = data.audio_url; aud.volume = 0.5; aud.play();
            }

            document.getElementById('bio-pfp').src = data.pfp_url || '';
            document.getElementById('bio-name').innerText = data.display_name;

            const container = document.getElementById('bio-links-container');
            data.links.split('|').forEach(l => {
                const [name, url] = l.split(',');
                if(name && url) {
                    const a = document.createElement('a');
                    a.className = 'link-btn'; a.href = url; a.target = "_blank"; a.innerText = name;
                    container.appendChild(a);
                }
            });

            if(data.show_discord && data.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                fetchDiscord(data.discord_id);
                setInterval(() => fetchDiscord(data.discord_id), 10000);
            }
        }

        async function fetchDiscord(id) {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
                const { data } = await res.json();
                const card = document.getElementById('discord-presence');
                const activityEl = document.getElementById('dc-activity');
                
                if(data) {
                    document.getElementById('dc-user').innerText = data.discord_user.display_name || data.discord_user.username;
                    document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                    document.getElementById('dc-status').className = `status-dot ${data.discord_status}`;

                    if(data.discord_status === 'offline') {
                        card.classList.add('offline-status');
                        activityEl.innerText = "STATUS: OFFLINE";
                        activityEl.className = "status-offline-text";
                    } else {
                        card.classList.remove('offline-status');
                        activityEl.className = "";
                        let activityText = "Online";
                        if (data.activities && data.activities.length > 0) {
                            const act = data.activities.find(a => a.type === 0);
                            if (act) activityText = `Jogando ${act.name}`;
                            else if (data.listening_to_spotify) activityText = `Ouvindo Spotify`;
                        }
                        activityEl.innerText = activityText;
                    }
                }
            } catch (e) { console.log("Erro Lanyard"); }
        }
    </script>
</body>
</html>
