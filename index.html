<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ff8c00; /* Cor laranja baseada na imagem */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* Background */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: -1; }

        .wrapper { width: 100%; max-width: 500px; padding: 20px; z-index: 10; }

        /* Card Estilo Glassmorphism (Igual da foto) */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 40px 20px; 
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Foto de Perfil Circular */
        .pfp-view { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            border: 2px solid var(--border); 
            margin-bottom: 15px; 
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .display-name { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,140,0,0.3); }
        .bio-text { font-size: 0.9rem; color: #ddd; margin-bottom: 25px; font-weight: 500; }

        /* Discord Presence Estilo Widget */
        .discord-card { 
            background: rgba(0, 0, 0, 0.3); 
            border-radius: 20px; 
            padding: 15px; 
            margin: 20px auto;
            max-width: 340px;
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .dc-img-container { position: relative; width: 50px; height: 50px; }
        #dc-pfp { width: 100%; height: 100%; border-radius: 12px; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid #1a1a1a; }

        /* ÍCONES SOCIAIS (A mágica do redirecionamento) */
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 25px; 
        }
        .social-icon { 
            color: #fff; 
            font-size: 1.5rem; 
            transition: 0.3s; 
            opacity: 0.7;
            text-decoration: none;
        }
        .social-icon:hover { opacity: 1; transform: translateY(-3px); color: var(--accent); }

        /* Admin UI */
        .admin-box { background: #111; padding: 25px; border-radius: 20px; width: 100%; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        
        .hidden { display: none !important; }
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="startBio()">
        <h1 style="font-size: 0.7rem; letter-spacing: 0.5em; color: #444;">CLICK TO CONNECT</h1>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card hidden">
            <h1 style="margin-bottom: 20px;">OmniBio</h1>
            <button class="btn" style="background: #5865f2; color: white;" onclick="login()">LOGIN COM DISCORD</button>
        </div>

        <div id="admin-ui" class="admin-box hidden">
            <h2 style="margin-bottom: 20px;">Painel de Controle</h2>
            <input type="text" id="username" placeholder="Seu Nick na URL">
            <input type="text" id="display_name" placeholder="Nome de Exibição">
            <textarea id="bio_small" placeholder="Frase da Bio (Ex: Eu e você contra todos)"></textarea>
            
            <p style="font-size: 0.7rem; color: #666; margin-bottom: 5px;">LINKS (Formato: ícone,link | Ex: instagram,https://ig.com)</p>
            <textarea id="links" placeholder="instagram,link | tiktok,link | spotify,link"></textarea>
            
            <label style="font-size: 0.7rem; color: #555;">ARQUIVOS (PFP, BACKGROUND, MÚSICA)</label>
            <input type="file" id="pfp-input">
            <input type="file" id="bg-input">
            <input type="file" id="audio-input">

            <button class="btn" style="background: #fff; color: #000;" onclick="saveBio()" id="save-btn">SALVAR BIO</button>
            <div id="link-pronto" style="margin-top: 15px; font-size: 0.8rem;"></div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" class="pfp-view" src="">
            <h1 id="bio-name" class="display-name"></h1>
            <p id="bio-text" class="bio-text"></p>

            <div id="discord-presence" class="discord-card hidden">
                <div class="dc-img-container">
                    <img id="dc-pfp" src="">
                    <div id="dc-status" class="status-dot"></div>
                </div>
                <div>
                    <h3 id="dc-user" style="font-size:0.9rem;"></h3>
                    <p id="dc-activity" style="font-size:0.75rem; color:#aaa;"></p>
                </div>
            </div>

            <div id="social-container" class="social-links"></div>
            
            <div style="margin-top: 30px; font-size: 0.6rem; color: rgba(255,255,255,0.2);">
                <i class="fa-regular fa-eye"></i> <span id="view-count">11</span>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let bioData = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const user = urlParams.get('u');

            if (user) {
                const { data } = await _supabase.from('bios').select('*').eq('username', user).maybeSingle();
                if (data) {
                    bioData = data;
                    document.getElementById('enter-screen').classList.remove('hidden');
                }
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) loadAdmin(session.user);
                else document.getElementById('login-ui').classList.remove('hidden');
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        function loadAdmin(user) {
            document.getElementById('admin-ui').classList.remove('hidden');
            _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle().then(({data}) => {
                if(data) {
                    document.getElementById('username').value = data.username;
                    document.getElementById('display_name').value = data.display_name;
                    document.getElementById('links').value = data.links;
                    document.getElementById('bio_small').value = data.bio_text || "";
                }
            });
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            btn.innerText = "SALVANDO...";

            const payload = {
                user_id: user.id,
                username: document.getElementById('username').value.toLowerCase(),
                display_name: document.getElementById('display_name').value,
                bio_text: document.getElementById('bio_small').value,
                links: document.getElementById('links').value,
                discord_id: user.identities[0].id
            };

            const fPfp = document.getElementById('pfp-input').files[0];
            if(fPfp) {
                await _supabase.storage.from('assets').upload(`pfp/${user.id}`, fPfp, {upsert:true});
                payload.pfp_url = _supabase.storage.from('assets').getPublicUrl(`pfp/${user.id}`).data.publicUrl;
            }

            await _supabase.from('bios').upsert(payload);
            location.reload();
        }

        function startBio() {
            document.getElementById('enter-screen').classList.add('hidden');
            document.getElementById('bio-view').classList.remove('hidden');
            
            const d = bioData;
            document.getElementById('bio-name').innerText = d.display_name;
            document.getElementById('bio-text').innerText = d.bio_text || "";
            document.getElementById('bio-pfp').src = d.pfp_url || "";

            // Gerar ícones sociais dinâmicos
            const socialContainer = document.getElementById('social-container');
            if(d.links) {
                d.links.split('|').forEach(part => {
                    const [icon, url] = part.split(',');
                    if(icon && url) {
                        const a = document.createElement('a');
                        a.href = url.trim();
                        a.target = "_blank";
                        a.className = "social-icon";
                        // Mapeia o nome para o ícone do FontAwesome
                        let iconClass = `fa-brands fa-${icon.trim().toLowerCase()}`;
                        if(icon.trim() === 'link') iconClass = 'fa-solid fa-link';
                        
                        a.innerHTML = `<i class="${iconClass}"></i>`;
                        socialContainer.appendChild(a);
                    }
                });
            }

            // Ativa Background e Áudio
            if(d.bg_url) {
                const bg = document.getElementById('bg-video');
                bg.src = d.bg_url; bg.style.display = 'block'; bg.play();
            }
            if(d.audio_url) {
                const aud = document.getElementById('bg-audio');
                aud.src = d.audio_url; aud.play();
            }

            if(d.discord_id) {
                document.getElementById('discord-presence').classList.remove('hidden');
                fetchDiscord(d.discord_id);
            }
        }

        async function fetchDiscord(id) {
            const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await res.json();
            if(data) {
                document.getElementById('dc-user').innerText = data.discord_user.global_name || data.discord_user.username;
                document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                const s = data.discord_status;
                document.getElementById('dc-status').style.background = s==='online'?'#23a559':s==='dnd'?'#f23f43':s==='idle'?'#f0b232':'#80848e';
                document.getElementById('dc-activity').innerText = data.activities[0]?.name || "Online";
            }
        }

        init();
    </script>
</body>
</html>
