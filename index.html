<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #fff; 
            --bg: #050505; 
            --card-bg: rgba(10, 10, 10, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            perspective: 1200px;
        }

        /* Fundos */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; display: none; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(15,15,15,0.2) 0%, #050505 100%); z-index: -1; backdrop-filter: blur(10px); }

        .wrapper { 
            width: 100%; 
            max-width: 440px; 
            padding: 20px; 
            z-index: 10; 
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 40px 30px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        /* TELA DE LOGIN ESPECÍFICA */
        .login-hero h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; }
        .login-hero p { color: rgba(255,255,255,0.5); margin-bottom: 30px; font-size: 0.9rem; }

        /* BOTÕES */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.95rem; }
        .btn-discord { background: #5865f2; color: #fff; }
        .btn-discord:hover { background: #4752c4; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2); }
        .btn-primary { background: #fff; color: #000; margin-top: 10px; }

        /* INPUTS E UPLOADS */
        .field { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.3); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; }
        
        .upload-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 12px 18px; border-radius: 14px; margin-bottom: 12px; cursor: pointer;
        }
        .status-tag { font-size: 0.65rem; font-weight: 800; padding: 5px 12px; border-radius: 8px; background: #fff; color: #000; text-transform: uppercase; }

        /* SWITCH */
        .switch-container { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 14px 18px; border-radius: 14px; margin-bottom: 20px; border: 1px solid var(--border); }
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #5865f2; }
        input:checked + .slider:before { transform: translateX(18px); }

        .hidden { display: none !important; }
        
        /* Loading animation */
        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body onmousemove="handleMove(event)">

    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="enterSite()" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <h1 style="font-size: 0.8rem; letter-spacing: 0.5em; color: rgba(255,255,255,0.5);">CLICK TO ENTER</h1>
    </div>

    <div class="wrapper" id="main-wrapper">
        
        <div id="login-ui" class="card login-hero">
            <h1>Omni<span style="opacity: 0.4;">Bio</span></h1>
            <p>Crie sua identidade digital de elite em segundos.</p>
            <button class="btn btn-discord" onclick="login()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42.01 1.333-.946 2.418-2.157 2.418z"/></svg>
                ENTRAR COM DISCORD
            </button>
        </div>

        <div id="admin-ui" class="card hidden" style="max-height: 85vh; overflow-y: auto;">
            <h2 style="margin-bottom: 25px; font-size: 1.2rem;">Configurações</h2>
            
            <div class="field"><label>Nick da URL</label><input type="text" id="username" placeholder="seu-nick"></div>
            <div class="field"><label>Nome de Exibição</label><input type="text" id="display_name" placeholder="Ex: Luckzz"></div>

            <div class="switch-container">
                <span style="font-size: 0.8rem; font-weight: 500;">Status do Discord</span>
                <label class="switch"><input type="checkbox" id="show_discord_toggle" checked><span class="slider"></span></label>
            </div>

            <label>Customização</label>
            <label class="upload-box"><span>Foto de Perfil</span><div class="status-tag" id="st-pfp">Adicionar</div><input type="file" id="pfp-input" accept="image/*" onchange="updateTag('pfp')"></label>
            <label class="upload-box"><span>Fundo</span><div class="status-tag" id="st-bg">Adicionar</div><input type="file" id="bg-input" accept="image/*,video/mp4" onchange="updateTag('bg')"></label>
            <label class="upload-box"><span>Música</span><div class="status-tag" id="st-audio">Adicionar</div><input type="file" id="audio-input" accept="audio/*" onchange="updateTag('audio')"></label>

            <div class="field"><label>Links (Nome,Link|Nome,Link)</label><textarea id="links" rows="2"></textarea></div>
            
            <button class="btn btn-primary" onclick="saveBio()" id="save-btn">SALVAR ALTERAÇÕES</button>
            <div id="success-link"></div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="bio-pfp" style="width:110px; height:110px; border-radius:50%; margin: 0 auto 20px; border:1px solid var(--border); object-fit:cover;">
            <h1 id="bio-name"></h1>
            <p id="bio-at" style="color:rgba(255,255,255,0.4); font-size:0.85rem; margin-bottom:25px;"></p>
            
            <div id="discord-presence" class="hidden" style="background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:18px; padding:14px; margin:20px 0; display:flex; align-items:center; text-align:left; gap:15px;">
                <div style="position:relative; width:48px; height:48px;">
                    <img id="dc-pfp" style="width:100%; height:100%; border-radius:50%;">
                    <div id="dc-status" style="position:absolute; bottom:2px; right:2px; width:13px; height:13px; border-radius:50%; border:2px solid #0a0a0a;"></div>
                </div>
                <div><h3 id="dc-user" style="font-size:0.9rem;"></h3><p id="dc-activity" style="font-size:0.75rem; color:rgba(255,255,255,0.5);"></p></div>
            </div>

            <div id="bio-links-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let userDiscordId = null;

        function handleMove(e) {
            const wrapper = document.getElementById('main-wrapper');
            const x = (window.innerWidth / 2 - e.clientX) / 25;
            const y = (window.innerHeight / 2 - e.clientY) / 25;
            wrapper.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        }

        function updateTag(type) { document.getElementById(`st-${type}`).innerText = "Mudar"; }

        async function login() { 
            const btn = document.querySelector('.btn-discord');
            btn.innerHTML = '<div class="loader"></div>';
            await _supabase.auth.signInWithOAuth({ provider: 'discord' }); 
        }

        _supabase.auth.onAuthStateChange(async (event, session) => {
            const urlNick = new URLSearchParams(window.location.search).get('u');
            
            // Se tiver ?u= nick na URL, mostra o perfil
            if (urlNick) {
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('enter-screen').classList.remove('hidden');
                const { data } = await _supabase.from('bios').select('*').eq('username', urlNick).maybeSingle();
                if(data) window.loadedBioData = data;
                else alert("Perfil não encontrado");
            } 
            // Se o usuário logou, mostra o painel de admin
            else if (session) {
                const identity = session.user.identities.find(i => i.provider === 'discord');
                if(identity) userDiscordId = identity.id;
                showAdmin(session.user);
            }
        });

        async function showAdmin(user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('links').value = data.links || "";
                document.getElementById('show_discord_toggle').checked = data.show_discord !== false;
                if(data.pfp_url) updateTag('pfp');
                if(data.bg_url) updateTag('bg');
                if(data.audio_url) updateTag('audio');
                if(data.username) displayLink(data.username);
            }
        }

        function displayLink(nick) {
            const link = `${window.location.origin}${window.location.pathname}?u=${nick}`;
            const box = document.getElementById('success-link');
            box.style.display = "block";
            box.innerHTML = `Link: <a href="${link}" target="_blank" style="color:#fff;">${link}</a>`;
        }

        async function saveBio() {
            const user = (await _supabase.auth.getUser()).data.user;
            const btn = document.getElementById('save-btn');
            const username = document.getElementById('username').value.trim().toLowerCase();
            if(!username) return alert("Nick obrigatório");
            
            btn.innerText = "SALVANDO..."; btn.disabled = true;

            try {
                const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
                let pfp = curr?.pfp_url, bg = curr?.bg_url, aud = curr?.audio_url;

                const fPfp = document.getElementById('pfp-input').files[0];
                const fBg = document.getElementById('bg-input').files[0];
                const fAud = document.getElementById('audio-input').files[0];

                if(fPfp) {
                    await _supabase.storage.from('assets').upload(`pfp/${user.id}`, fPfp, {upsert: true});
                    pfp = _supabase.storage.from('assets').getPublicUrl(`pfp/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }
                if(fBg) {
                    await _supabase.storage.from('assets').upload(`bg/${user.id}`, fBg, {upsert: true});
                    bg = _supabase.storage.from('assets').getPublicUrl(`bg/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }
                if(fAud) {
                    await _supabase.storage.from('assets').upload(`audio/${user.id}`, fAud, {upsert: true});
                    aud = _supabase.storage.from('assets').getPublicUrl(`audio/${user.id}`).data.publicUrl + "?t=" + Date.now();
                }

                await _supabase.from('bios').upsert({
                    user_id: user.id, username, display_name: document.getElementById('display_name').value,
                    discord_id: userDiscordId, links: document.getElementById('links').value,
                    pfp_url: pfp, bg_url: bg, audio_url: aud,
                    show_discord: document.getElementById('show_discord_toggle').checked
                }, { onConflict: 'user_id' });

                btn.innerText = "SALVO!"; displayLink(username);
                setTimeout(() => { btn.innerText = "SALVAR ALTERAÇÕES"; btn.disabled = false; }, 2000);
            } catch (e) { alert("Erro ao salvar"); btn.disabled = false; }
        }

        function enterSite() {
            const d = window.loadedBioData;
            document.getElementById('enter-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-screen').classList.add('hidden'), 600);
            
            document.getElementById('bio-view').classList.remove('hidden');
            document.getElementById('bio-pfp').src = d.pfp_url || '';
            document.getElementById('bio-name').innerText = d.display_name;
            document.getElementById('bio-at').innerText = `@${d.username}`;

            if(d.bg_url) {
                if(d.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) { const a = document.getElementById('bg-audio'); a.src = d.audio_url; a.play(); }

            const cont = document.getElementById('bio-links-container');
            if(d.links) d.links.split('|').forEach(l => {
                const [n, u] = l.split(',');
                if(n && u) {
                    const el = document.createElement('a');
                    el.className = 'link-btn'; el.href = u.trim(); el.target = "_blank"; el.innerText = n.trim();
                    cont.appendChild(el);
                }
            });

            if(d.discord_id && d.show_discord !== false) {
                document.getElementById('discord-presence').classList.remove('hidden');
                fetchDiscord(d.discord_id);
            }
        }

        async function fetchDiscord(id) {
            const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await res.json();
            if(data) {
                document.getElementById('dc-user').innerText = data.discord_user.global_name || data.discord_user.username;
                document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                const s = data.discord_status;
                const dot = document.getElementById('dc-status');
                dot.style.background = s==='online'?'#23a559':s==='dnd'?'#f23f43':s==='idle'?'#f0b232':'#80848e';
                document.getElementById('dc-activity').innerText = data.listening_to_spotify ? `Ouvindo ${data.spotify.track}` : (data.activities[0]?.name || 'Online');
            }
        }
    </script>
</body>
</html>
