<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>OmniBio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#050505;
color:white;
}

/* LANDING */

.landing{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
gap:30px;
}

.logo{
font-size:70px;
font-weight:700;
}

.logo span{
color:#0071e3;
}

.btn{
padding:14px 40px;
border-radius:14px;
border:none;
cursor:pointer;
background:#0071e3;
color:white;
font-weight:600;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

.sidebar{
background:#0c0c0c;
padding:40px;
}

.main{
padding:60px;
max-width:900px;
margin:auto;
}

.card{
background:#0c0c0c;
border:1px solid #1e1e1e;
padding:30px;
border-radius:20px;
margin-bottom:30px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #1e1e1e;
background:black;
color:white;
}

/* PERFIL */

.profile{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

.profile-card{
background:#0a0a0a;
padding:50px;
border-radius:30px;
max-width:420px;
width:100%;
text-align:center;
border:1px solid #222;
backdrop-filter:blur(20px);
}

.avatar{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid #0071e3;
margin-bottom:20px;
}

.username{
color:#0071e3;
margin-bottom:20px;
}

/* SOCIAL */

.socials{
display:flex;
justify-content:center;
gap:20px;
margin-top:25px;
}

.socials a{
font-size:22px;
color:white;
transition:0.2s;
}

.socials a:hover{
transform:scale(1.3);
color:#0071e3;
}

</style>
</head>

<body>

<div id="home" class="landing">

<div class="logo">OmniBio<span>.</span></div>

<p>Crie seu perfil digital</p>

<button class="btn" onclick="login()">Entrar com Discord</button>

</div>


<div id="admin" class="dashboard" style="display:none">

<div class="sidebar">

<h2>OmniBio</h2>

<br>

<button onclick="logout()" class="btn">Sair</button>

</div>

<div class="main">

<div class="card">

<h3>Perfil</h3>

<input id="username" placeholder="username">

<input id="display_name" placeholder="Nome">

<textarea id="bio_text" placeholder="Bio"></textarea>

</div>

<div class="card">

<h3>Redes sociais</h3>

<input id="instagram" placeholder="Instagram">

<input id="tiktok" placeholder="TikTok">

<input id="twitter" placeholder="Twitter">

<input id="facebook" placeholder="Facebook">

<input id="youtube" placeholder="Youtube">

</div>

<div class="card">

<h3>Efeito</h3>

<select id="effect">

<option value="none">Nenhum</option>
<option value="snow">Neve</option>
<option value="stars">Estrelas</option>
<option value="matrix">Matrix</option>

</select>

</div>

<div class="card">

<button class="btn" onclick="save()">Salvar perfil</button>

</div>

</div>

</div>


<div id="profile" class="profile" style="display:none">

<div class="profile-card">

<img id="avatar" class="avatar">

<h2 id="name"></h2>

<div class="username" id="user"></div>

<p id="bio"></p>

<div class="socials" id="socials"></div>

</div>

</div>


<script>

const SUPABASE_URL="https://zpzdasukgdmfygajnjhn.supabase.co"
const SUPABASE_KEY="sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf"

const supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let user=null

init()

async function init(){

const params=new URLSearchParams(location.search)

const u=params.get("u")

if(u){

loadProfile(u)

return

}

const {data:{session}}=await supabase.auth.getSession()

if(session){

user=session.user

loadAdmin()

}else{

document.getElementById("home").style.display="flex"

}

}

async function login(){

await supabase.auth.signInWithOAuth({

provider:"discord"

})

}

async function logout(){

await supabase.auth.signOut()

location.reload()

}

async function loadAdmin(){

document.getElementById("home").style.display="none"
document.getElementById("admin").style.display="grid"

const {data}=await supabase
.from("bios")
.select("*")
.eq("user_id",user.id)
.maybeSingle()

if(!data)return

username.value=data.username||""
display_name.value=data.display_name||""
bio_text.value=data.bio_text||""

instagram.value=data.instagram||""
tiktok.value=data.tiktok||""
twitter.value=data.twitter||""
facebook.value=data.facebook||""
youtube.value=data.youtube||""

effect.value=data.effect_type||"none"

}

async function save(){

const payload={

user_id:user.id,

username:username.value.toLowerCase(),

display_name:display_name.value,

bio_text:bio_text.value,

instagram:instagram.value,
tiktok:tiktok.value,
twitter:twitter.value,
facebook:facebook.value,
youtube:youtube.value,

effect_type:effect.value,

discord_id:user.user_metadata.provider_id

}

await supabase
.from("bios")
.upsert(payload,{onConflict:"user_id"})

alert("Perfil salvo!")

}

async function loadProfile(u){

document.getElementById("profile").style.display="flex"

const {data}=await supabase
.from("bios")
.select("*")
.eq("username",u)
.maybeSingle()

if(!data)return

name.innerText=data.display_name||u
user.innerText="@"+u
bio.innerText=data.bio_text||""

avatar.src=data.pfp_url || "https://ui-avatars.com/api/?name="+u

const socials=document.getElementById("socials")

if(data.instagram)
socials.innerHTML+=`<a href="${data.instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`

if(data.tiktok)
socials.innerHTML+=`<a href="${data.tiktok}" target="_blank"><i class="fab fa-tiktok"></i></a>`

if(data.twitter)
socials.innerHTML+=`<a href="${data.twitter}" target="_blank"><i class="fab fa-x-twitter"></i></a>`

if(data.youtube)
socials.innerHTML+=`<a href="${data.youtube}" target="_blank"><i class="fab fa-youtube"></i></a>`

if(data.facebook)
socials.innerHTML+=`<a href="${data.facebook}" target="_blank"><i class="fab fa-facebook"></i></a>`

supabase.rpc("increment_views",{target_username:u})

}

</script>

</body>
</html>
