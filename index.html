<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #050505;
            --surface: #111111;
            --border: #222222;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #0071e3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Layout --- */
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .hidden { display: none !important; }

        /* --- Perfil Público (Estático e Minimalista) --- */
        #profile-view-section { text-align: center; animation: fadeIn 0.8s ease; }
        .profile-header { margin-bottom: 30px; }
        .pfp-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); margin-bottom: 15px; }
        .bio-box { color: var(--text-dim); line-height: 1.6; max-width: 600px; margin: 0 auto 30px; word-wrap: break-word; }

        /* --- Dashboard Admin --- */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        h2 { font-size: 16px; margin-bottom: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* --- Inputs e Forms --- */
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { 
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); 
            color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; 
        }
        input:focus { border-color: var(--accent); }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--accent); color: white; width: 100%; text-align: center; }
        .btn-secondary { background: #222; color: #fff; margin-top: 10px; width: 100%; text-align: center; }

        /* --- Ranking --- */
        .rank-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; 
            text-decoration: none; color: inherit; transition: 0.2s; border-bottom: 1px solid var(--border);
        }
        .rank-item:hover { background: #1a1a1a; }
        .rank-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        /* --- Discord Card --- */
        .discord-status-card { background: #18191c; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 12px; margin-top: 20px; text-align: left; max-width: 350px; margin-inline: auto;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section" class="hidden">
            <div style="text-align: center; padding: 60px 0;">
                <h1 style="font-size: 32px; margin-bottom: 10px;">OmniBio</h1>
                <p style="color: var(--text-dim); margin-bottom: 30px;">Sua identidade digital profissional.</p>
                <button class="btn btn-primary" style="width: auto; padding: 14px 40px;" onclick="login()">
                    <i class="fa-brands fa-discord"></i> Entrar com Discord
                </button>
            </div>
            
            <div class="card">
                <h2><i class="fa-solid fa-trophy"></i> Perfis mais vistos</h2>
                <div id="ranking-list"></div>
            </div>
        </div>

        <div id="admin-section" class="hidden">
            <header>
                <div id="user-info" style="display: flex; align-items: center; gap: 10px;">
                    <img id="my-avatar" style="width: 35px; border-radius: 50%;">
                    <span id="my-name" style="font-weight: 600;"></span>
                </div>
                <button class="btn btn-secondary" onclick="logout()" style="width: auto; margin: 0;">Sair</button>
            </header>

            <div class="grid">
                <div class="editor">
                    <div class="card">
                        <h2>Personalização</h2>
                        <label>Username (URL)</label>
                        <input type="text" id="in_username" placeholder="seu_nome">
                        
                        <label>Nome de Exibição</label>
                        <input type="text" id="in_display_name">
                        
                        <label>Sua Bio</label>
                        <textarea id="in_bio" rows="3"></textarea>

                        <label>Social Links (icone,url | ...)</label>
                        <input type="text" id="in_links" placeholder="github,https://...">
                    </div>

                    <div class="card">
                        <h2>Mídias (URLs)</h2>
                        <label>URL da Foto de Perfil (PFP)</label>
                        <input type="text" id="in_pfp_url" placeholder="https://imagem.jpg">
                        
                        <label>URL do Fundo (BG Imagem ou Vídeo)</label>
                        <input type="text" id="in_bg_url" placeholder="https://fundo.mp4">
                        
                        <label>URL da Música (Audio)</label>
                        <input type="text" id="in_audio_url" placeholder="https://musica.mp3">
                        
                        <button class="btn btn-primary" onclick="saveData()">Salvar Perfil</button>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="card">
                        <h2>Ranking Global</h2>
                        <div id="side-ranking"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="profile-view-section" class="hidden">
            <div class="profile-header">
                <img id="v-pfp" class="pfp-large" src="">
                <h1 id="v-name" style="font-size: 28px; margin-bottom: 5px;"></h1>
                <p id="v-username" style="color: var(--accent); font-weight: 500; margin-bottom: 15px;"></p>
                <div id="v-bio" class="bio-box"></div>
            </div>

            <div id="v-discord" class="hidden">
                <div class="discord-status-card">
                    <div style="position:relative">
                        <img id="v-dc-img" style="width:45px; border-radius:50%;">
                        <div id="v-dc-status" style="position:absolute; bottom:0; right:0; width:14px; height:14px; border-radius:50%; border:3px solid #18191c;"></div>
                    </div>
                    <div>
                        <div id="v-dc-name" style="font-weight:700; font-size:14px;"></div>
                        <div id="v-dc-activity" style="font-size:11px; color: #b9bbbe;"></div>
                    </div>
                </div>
            </div>

            <div id="v-links" style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;"></div>
            
            <a href="index.html" class="btn btn-secondary" style="margin-top: 50px; width: auto;">Criar meu perfil</a>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const u = urlParams.get('u');

            if (u) {
                loadPublicProfile(u);
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) showAdmin(session.user);
                else {
                    document.getElementById('login-section').classList.remove('hidden');
                    renderRanking('ranking-list');
                }
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); location.href = 'index.html'; }

        async function showAdmin(user) {
            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('my-avatar').src = user.user_metadata.avatar_url;
            document.getElementById('my-name').innerText = user.user_metadata.full_name;

            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('in_username').value = data.username || "";
                document.getElementById('in_display_name').value = data.display_name || "";
                document.getElementById('in_bio').value = data.bio_text || "";
                document.getElementById('in_links').value = data.links || "";
                document.getElementById('in_pfp_url').value = data.pfp_url || "";
                document.getElementById('in_bg_url').value = data.bg_url || "";
                document.getElementById('in_audio_url').value = data.audio_url || "";
            }
            renderRanking('side-ranking');
        }

        async function renderRanking(containerId) {
            const { data } = await _supabase.from('bios').select('*').order('views', { ascending: false }).limit(5);
            const container = document.getElementById(containerId);
            if (!data) return;
            container.innerHTML = data.map(p => `
                <a href="?u=${p.username}" class="rank-item">
                    <img src="${p.pfp_url || 'https://ui-avatars.com/api/?name='+p.username}" class="rank-img">
                    <div>
                        <div style="font-size:13px; font-weight:600;">${p.display_name || p.username}</div>
                        <div style="font-size:10px; color:var(--text-dim);">${p.views} acessos</div>
                    </div>
                </a>
            `).join('');
        }

        async function loadPublicProfile(username) {
            const { data } = await _supabase.from('bios').select('*').eq('username', username).maybeSingle();
            if (!data) { alert("Perfil não encontrado"); return; }
            
            document.getElementById('profile-view-section').classList.remove('hidden');
            document.getElementById('v-name').innerText = data.display_name;
            document.getElementById('v-username').innerText = `@${data.username}`;
            document.getElementById('v-bio').innerText = data.bio_text;
            document.getElementById('v-pfp').src = data.pfp_url || `https://ui-avatars.com/api/?name=${data.username}`;

            // Background & Audio
            if(data.bg_url) document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
            if(data.audio_url) { const a = new Audio(data.audio_url); a.loop = true; document.body.onclick = () => a.play(); }

            // Incrementar view
            await _supabase.rpc('increment_views', { target_username: username });

            // Discord Status
            if(data.discord_id) {
                fetch(`https://api.lanyard.rest/v1/users/${data.discord_id}`).then(r => r.json()).then(({data: d}) => {
                    if(!d) return;
                    document.getElementById('v-discord').classList.remove('hidden');
                    document.getElementById('v-dc-name').innerText = d.discord_user.username;
                    document.getElementById('v-dc-img').src = `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png`;
                    const s = d.discord_status;
                    const colors = { online: '#3ba55c', dnd: '#ed4245', idle: '#faa61a', offline: '#747f8d' };
                    document.getElementById('v-dc-status').style.backgroundColor = colors[s];
                    
                    let act = "Online";
                    if(d.activities.length > 0) {
                        const m = d.activities.find(x => x.type === 0) || d.activities[0];
                        act = (m.emoji ? m.emoji.name + ' ' : '') + (m.state || m.name);
                    }
                    document.getElementById('v-dc-activity').innerText = act;
                });
            }
        }

        async function saveData() {
            const { data: { user } } = await _supabase.auth.getUser();
            const payload = {
                user_id: user.id,
                username: document.getElementById('in_username').value.toLowerCase(),
                display_name: document.getElementById('in_display_name').value,
                bio_text: document.getElementById('in_bio').value,
                links: document.getElementById('in_links').value,
                pfp_url: document.getElementById('in_pfp_url').value,
                bg_url: document.getElementById('in_bg_url').value,
                audio_url: document.getElementById('in_audio_url').value,
                discord_id: user.user_metadata.provider_id
            };
            const { error } = await _supabase.from('bios').upsert(payload);
            if(error) alert("Erro ao salvar: " + error.message);
            else alert("Perfil atualizado!");
        }

        init();
    </script>
</body>
</html>
