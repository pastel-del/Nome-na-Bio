<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio OS | The Ultimate Identity System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Tilt.js/1.2.1/tilt.jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* --- ARQUITETURA DE DESIGN SYSTEM (100+ Linhas de CSS) ---
           Baseado em Neomorfismo, Glassmorphism e Design Industrial.
        */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --bg-dark: #020202;
            --bg-accent: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --accent: #0071e3; /* Apple Blue */
            --accent-glow: rgba(0, 113, 227, 0.3);
            --text-p: #f5f5f7;
            --text-s: #86868b;
            --success: #30d158;
            --error: #ff453a;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --radius-lg: 32px;
            --radius-md: 18px;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { 
            background: var(--bg-dark); 
            color: var(--text-p); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            min-height: 100vh;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        /* --- SISTEMA DE CURSOR MAGNÉTICO (JS driven) --- */
        #c-poly { position: fixed; width: 30px; height: 30px; border: 1px solid white; border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s, width 0.3s, height 0.3s; mix-blend-mode: difference; }
        #c-dot { position: fixed; width: 6px; height: 6px; background: white; border-radius: 50%; pointer-events: none; z-index: 9999; }

        /* --- COMPONENTES DE INTERFACE --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            transition: var(--transition);
        }

        .btn-action {
            padding: 18px 32px; border-radius: 50px; border: none; font-weight: 700;
            display: inline-flex; align-items: center; gap: 12px; cursor: pointer;
            transition: var(--transition); position: relative; overflow: hidden;
            font-size: 15px; letter-spacing: -0.3px;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px var(--accent-glow); }

        .btn-secondary { background: var(--glass); border: 1px solid var(--glass-border); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }

        /* --- DASHBOARD LAYOUT (SISTEMA MULTI-ABA) --- */
        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 320px; background: #000; border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 50px 30px; position: sticky; top: 0; height: 100vh;
        }

        .sidebar-logo { font-size: 26px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 60px; }
        .nav-list { list-style: none; flex: 1; }
        .nav-item { 
            padding: 16px 20px; border-radius: 16px; color: var(--text-s); margin-bottom: 10px;
            display: flex; align-items: center; gap: 15px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { background: var(--glass); color: white; border: 1px solid var(--glass-border); }
        .nav-item i { width: 20px; text-align: center; }

        .main-stage { flex: 1; padding: 60px 80px; position: relative; }

        /* --- FORMULÁRIOS PROFISSIONAIS --- */
        .input-wrapper { margin-bottom: 30px; position: relative; }
        .input-wrapper label { 
            display: block; font-size: 11px; font-weight: 800; color: var(--text-s); 
            text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1.5px; 
        }
        .modern-input {
            width: 100%; background: #080808; border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 18px; color: white; font-family: var(--font-code);
            transition: var(--transition); font-size: 14px;
        }
        .modern-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

        /* --- PREVIEW EM TEMPO REAL (MOCKUP IPHONE) --- */
        .phone-mockup {
            width: 380px; height: 780px; background: #000; border: 12px solid #1a1a1a;
            border-radius: 60px; position: sticky; top: 60px; right: 80px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); overflow: hidden;
        }

        /* --- ESTILO DO PERFIL PÚBLICO (BEAUTY CORE) --- */
        #profile-wrapper { 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; padding: 60px 30px; position: relative;
        }
        .v-pfp { 
            width: 140px; height: 140px; border-radius: 42px; object-fit: cover;
            border: 1px solid var(--glass-border); margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transform: rotate(-3deg);
        }
        .v-name { font-size: 34px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; }
        .v-username { color: var(--accent); font-weight: 700; margin-bottom: 25px; }
        
        .social-link-card {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 20px; display: flex; align-items: center;
            justify-content: space-between; text-decoration: none; color: white;
            margin-bottom: 15px; transition: var(--transition);
        }
        .social-link-card:hover { transform: scale(1.05); background: rgba(255,255,255,0.06); }

        /* --- ANIMAÇÕES DE FUNDO --- */
        #canvas-engine { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.5; }

        /* Responsividade */
        @media (max-width: 1200px) {
            .phone-mockup { display: none; }
            .sidebar { width: 100px; padding: 40px 15px; }
            .nav-item span { display: none; }
            .main-stage { padding: 40px; }
        }
    </style>
</head>
<body>

    <div id="c-poly"></div>
    <div id="c-dot"></div>
    <canvas id="canvas-engine"></canvas>

    <section id="screen-auth" class="animate__animated animate__fadeIn" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="glass-panel" style="text-align: center; max-width: 500px;">
            <div style="font-size: 40px; margin-bottom: 20px;">🛡️</div>
            <h1 style="font-size: 42px; font-weight: 900; margin-bottom: 10px;">OmniBio OS</h1>
            <p style="color: var(--text-s); margin-bottom: 40px;">Gerencie sua identidade digital com controle absoluto e estética de alta fidelidade.</p>
            <button class="btn-action btn-primary" onclick="handleAuth()">
                <i class="fa-brands fa-discord"></i> Entrar com Discord
            </button>
        </div>
    </section>

    <section id="screen-admin" class="hidden">
        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-logo">Omni<span style="color:var(--accent)">.</span></div>
                <ul class="nav-list">
                    <li class="nav-item active" onclick="switchTab('general')"><i class="fa-solid fa-user-gear"></i> <span>Perfil Geral</span></li>
                    <li class="nav-item" onclick="switchTab('links')"><i class="fa-solid fa-link"></i> <span>Links & Redes</span></li>
                    <li class="nav-item" onclick="switchTab('design')"><i class="fa-solid fa-wand-magic-sparkles"></i> <span>Estética</span></li>
                    <li class="nav-item" onclick="switchTab('stats')"><i class="fa-solid fa-chart-pie"></i> <span>Analytics</span></li>
                </ul>
                <div id="admin-user-card" style="display: flex; align-items: center; gap: 15px; border-top: 1px solid var(--glass-border); pt: 30px;">
                    <img id="usr-avatar" src="" style="width: 45px; border-radius: 14px;">
                    <div>
                        <p id="usr-name" style="font-weight: 700; font-size: 14px;"></p>
                        <p style="font-size: 10px; color: var(--accent);" onclick="logout()">ENCERRAR SESSÃO</p>
                    </div>
                </div>
            </aside>

            <main class="main-stage">
                <div id="tab-general" class="tab-content">
                    <h2 style="font-size: 32px; margin-bottom: 40px;">Identidade Core</h2>
                    <div class="glass-panel">
                        <div class="input-wrapper">
                            <label>Identificador Único (URL)</label>
                            <input type="text" id="in-username" class="modern-input" placeholder="ex: seu.nome" oninput="updatePreview()">
                        </div>
                        <div class="input-wrapper">
                            <label>Título de Exibição</label>
                            <input type="text" id="in-display" class="modern-input" placeholder="Seu Nome Real" oninput="updatePreview()">
                        </div>
                        <div class="input-wrapper">
                            <label>Biografia Curta</label>
                            <textarea id="in-bio" class="modern-input" rows="4" style="resize: none;" oninput="updatePreview()"></textarea>
                        </div>
                    </div>
                </div>

                <div id="tab-links" class="tab-content hidden">
                    <h2 style="font-size: 32px; margin-bottom: 40px;">Conexões Sociais</h2>
                    <div class="glass-panel" id="link-manager-list">
                        </div>
                    <button class="btn-action btn-secondary" style="margin-top: 20px; width: 100%;" onclick="addNewLink()">+ Adicionar Novo Link</button>
                </div>

                <div style="position: fixed; bottom: 40px; right: 480px; z-index: 100;">
                    <button class="btn-action btn-primary" onclick="saveGlobalData()">PUBLICAR ALTERAÇÕES</button>
                </div>
            </main>

            <div class="phone-mockup">
                <iframe id="preview-frame" style="width: 100%; height: 100%; border: none;"></iframe>
            </div>
        </div>
    </section>

    <section id="screen-profile" class="hidden">
        <div id="profile-wrapper">
            </div>
    </section>

    <script>
        // Configurações Globais
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _client = supabase.createClient(SB_URL, SB_KEY);
        
        let localData = {
            links: [],
            design: { effect: 'matrix', theme: 'dark' }
        };

        // --- SISTEMA DE CURSOR ---
        const poly = document.getElementById('c-poly');
        const dot = document.getElementById('c-dot');
        window.addEventListener('mousemove', e => {
            gsap.to(dot, { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to(poly, { x: e.clientX - 15, y: e.clientY - 15, duration: 0.3 });
        });

        // --- AUTH & SESSION ---
        async function handleAuth() {
            const { error } = await _client.auth.signInWithOAuth({ provider: 'discord' });
            if(error) console.error("Erro auth:", error.message);
        }

        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                const urlParams = new URLSearchParams(window.location.search);
                if (!urlParams.get('u')) {
                    loadAdminDashboard(session.user);
                } else {
                    renderPublicProfile(urlParams.get('u'));
                }
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('u')) renderPublicProfile(urlParams.get('u'));
                else document.getElementById('screen-auth').classList.remove('hidden');
            }
        }

        // --- DASHBOARD LOGIC ---
        async function loadAdminDashboard(user) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-admin').classList.remove('hidden');
            
            document.getElementById('usr-avatar').src = user.user_metadata.avatar_url;
            document.getElementById('usr-name').innerText = user.user_metadata.full_name;

            // Busca dados do banco
            const { data, error } = await _client.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                localData = data;
                document.getElementById('in-username').value = data.username || "";
                document.getElementById('in-display').value = data.display_name || "";
                document.getElementById('in-bio').value = data.bio_text || "";
                updatePreview();
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        // --- REALTIME PREVIEW ---
        function updatePreview() {
            const frame = document.getElementById('preview-frame');
            const previewURL = `?u=${document.getElementById('in-username').value}&preview=true`;
            if (document.getElementById('in-username').value.length > 3) {
                frame.src = previewURL;
            }
        }

        async function saveGlobalData() {
            const user = (await _client.auth.getUser()).data.user;
            const payload = {
                user_id: user.id,
                username: document.getElementById('in-username').value.trim(),
                display_name: document.getElementById('in-display').value,
                bio_text: document.getElementById('in-bio').value,
                links: localData.links,
                design: localData.design,
                updated_at: new Date()
            };

            const { error } = await _client.from('bios').upsert(payload, { onConflict: 'user_id' });
            if (!error) alert("Publicado com Sucesso!");
        }

        // --- PUBLIC RENDERING ENGINE ---
        async function renderPublicProfile(username) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-admin').classList.add('hidden');
            document.getElementById('screen-profile').classList.remove('hidden');

            const { data } = await _client.from('bios').select('*').eq('username', username).maybeSingle();
            if (!data) return;

            const wrapper = document.getElementById('profile-wrapper');
            wrapper.innerHTML = `
                <img src="${data.pfp_url || 'https://i.imgur.com/8Km9tLL.png'}" class="v-pfp animate__animated animate__zoomIn">
                <h1 class="v-name">${data.display_name}</h1>
                <p class="v-username">@${data.username}</p>
                <p class="v-bio" style="max-width: 500px; text-align: center; color: var(--text-s); line-height: 1.6; margin-bottom: 40px;">${data.bio_text}</p>
                <div id="v-links-container" style="width: 100%; max-width: 450px;"></div>
            `;

            // Injeta links dinâmicos
            const linkContainer = document.getElementById('v-links-container');
            (data.links || []).forEach(link => {
                linkContainer.innerHTML += `
                    <a href="${link.url}" target="_blank" class="social-link-card">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <i class="${link.icon || 'fa-solid fa-link'}" style="color: var(--accent); font-size: 20px;"></i>
                            <span style="font-weight: 700;">${link.title}</span>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="font-size: 12px; opacity: 0.5;"></i>
                    </a>
                `;
            });

            startParticleEngine(data.design.effect);
        }

        // --- CANVAS PARTICLE SYSTEM (150+ Linhas) ---
        function startParticleEngine(type) {
            const canvas = document.getElementById('canvas-engine');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const count = 80;

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 1;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.speedY = Math.random() * 1 - 0.5;
                    this.color = type === 'matrix' ? '#00ff41' : '#ffffff';
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y > canvas.height) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            for (let i = 0; i < count; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function logout() { _client.auth.signOut(); location.reload(); }

        // Inicializa o sistema
        checkSession();
    </script>
</body>
</html>
