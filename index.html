<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --border: #262626;
            --text-main: #ededed;
            --text-dim: #a1a1a1;
            --accent: #0071e3;
            --danger: #ff453a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; line-height: 1.5; }

        /* Layout Estático Profissional */
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 30px; border-bottom: 1px solid var(--border); margin-bottom: 40px; 
        }

        .user-pill { display: flex; align-items: center; gap: 12px; background: var(--surface); padding: 8px 16px; border-radius: 50px; border: 1px solid var(--border); }
        .user-pill img { width: 32px; height: 32px; border-radius: 50%; }

        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }

        /* Cards Estáticos */
        .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        h2 { font-size: 18px; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

        /* Ranking List */
        .rank-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; 
            text-decoration: none; color: inherit; transition: 0.2s; border: 1px solid transparent;
        }
        .rank-item:hover { background: #1f1f1f; border-color: var(--border); }
        .rank-img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }

        /* Editor */
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { 
            width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid var(--border); 
            color: #fff; border-radius: 8px; margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        .btn { 
            padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; 
            transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-primary { background: var(--accent); color: white; width: 100%; justify-content: center; }
        .btn-outline { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-outline:hover { color: var(--danger); border-color: var(--danger); }

        /* Discord Preview */
        .discord-preview { 
            background: #232428; border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 15px;
            margin-top: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        .hidden { display: none !important; }
        .success-box { background: rgba(48, 209, 88, 0.1); border: 1px solid #30d158; color: #30d158; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <header id="main-header" class="hidden">
            <h1 style="font-size: 22px;">Omni<span style="color: var(--accent)">Bio</span></h1>
            <div class="user-pill">
                <img id="header-avatar" src="" alt="">
                <span id="header-name" style="font-size: 14px; font-weight: 500;"></span>
            </div>
        </header>

        <div id="login-section" class="hidden" style="text-align: center; padding: 100px 0;">
            <h1 style="font-size: 40px; margin-bottom: 10px;">Crie sua identidade.</h1>
            <p style="color: var(--text-dim); margin-bottom: 40px;">A bio mais profissional para desenvolvedores e criadores.</p>
            <button class="btn btn-primary" style="width: auto; padding: 16px 40px;" onclick="login()">
                <i class="fa-brands fa-discord"></i> Começar com Discord
            </button>
            
            <div style="margin-top: 60px; max-width: 500px; margin-inline: auto;">
                <h3 style="font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px;">Perfis Populares</h3>
                <div id="login-rank-list"></div>
            </div>
        </div>

        <div id="admin-section" class="grid hidden">
            <main>
                <div class="section-card">
                    <h2><i class="fa-solid fa-pen-to-square"></i> Editar Perfil</h2>
                    <label>Username (URL Personalizada)</label>
                    <input type="text" id="username" placeholder="ex: lucas_dev">

                    <label>Nome de Exibição</label>
                    <input type="text" id="display_name">

                    <label>Bio / Descrição</label>
                    <textarea id="bio_text" rows="4"></textarea>

                    <label>Links Sociais (formato: icon,link | icon,link)</label>
                    <input type="text" id="links_input" placeholder="github,https://github.com/vce">

                    <button class="btn btn-primary" onclick="saveBio()" id="save-btn">Publicar Alterações</button>
                    
                    <div id="success-link" class="success-box hidden">
                        Perfil online em: <a href="#" id="final-url" style="color: inherit; font-weight: 700;"></a>
                    </div>
                </div>

                <div class="section-card">
                    <h2><i class="fa-solid fa-gear"></i> Conta</h2>
                    <button class="btn btn-outline" onclick="logout()">Sair da Conta</button>
                </div>
            </main>

            <aside>
                <div class="section-card">
                    <h2><i class="fa-solid fa-eye"></i> Status Discord</h2>
                    <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 15px;">Como seu status aparece para os outros:</p>
                    <div id="discord-preview-box" class="discord-preview">
                        <div style="position:relative">
                            <img id="p-dc-pfp" style="width:40px; border-radius:50%; background: #333;">
                            <div id="p-dc-status" style="position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; border:2px solid #232428;"></div>
                        </div>
                        <div>
                            <div id="p-dc-name" style="font-weight:700; font-size:14px;">Conectando...</div>
                            <div id="p-dc-activity" style="font-size:11px; color: #b9bbbe;">Carregando atividade...</div>
                        </div>
                    </div>
                </div>

                <div class="section-card">
                    <h2><i class="fa-solid fa-chart-line"></i> Global Ranking</h2>
                    <div id="side-rank-list"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                // Se houver "?u=", você pode carregar uma página de perfil separada ou injetar aqui
                // Por brevidade, vamos focar no Dashboard e Login solicitados
                window.location.href = "perfil.html?u=" + u; // Sugestão: tenha um perfil.html limpo
                return;
            }

            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                showAdmin(session.user);
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                loadRanking('login-rank-list');
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        function showAdmin(user) {
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            
            // Avatar e Nome no Header
            document.getElementById('header-avatar').src = user.user_metadata.avatar_url;
            document.getElementById('header-name').innerText = user.user_metadata.full_name;

            loadAdminData(user);
            loadRanking('side-rank-list');
            loadDiscordStatus(user.user_metadata.provider_id);
        }

        async function loadAdminData(user) {
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('bio_text').value = data.bio_text || "";
                document.getElementById('links_input').value = data.links || "";
            }
        }

        async function loadRanking(containerId) {
            const { data } = await _supabase.from('bios').select('*').order('views', { ascending: false }).limit(5);
            const container = document.getElementById(containerId);
            if (!data) return;

            container.innerHTML = data.map(p => `
                <a href="?u=${p.username}" class="rank-item">
                    <img src="${p.pfp_url || 'https://ui-avatars.com/api/?name='+p.username}" class="rank-img">
                    <div>
                        <div style="font-size:14px; font-weight:600;">${p.display_name || p.username}</div>
                        <div style="font-size:11px; color:var(--text-dim);">${p.views} views</div>
                    </div>
                </a>
            `).join('');
        }

        function loadDiscordStatus(id) {
            if (!id) return;
            fetch(`https://api.lanyard.rest/v1/users/${id}`).then(r => r.json()).then(({data}) => {
                if(!data) return;
                document.getElementById('p-dc-name').innerText = data.discord_user.username;
                document.getElementById('p-dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                
                const s = data.discord_status;
                const colors = { online: '#3ba55c', dnd: '#ed4245', idle: '#faa61a', offline: '#747f8d' };
                document.getElementById('p-dc-status').style.backgroundColor = colors[s] || colors.offline;

                let act = "Nenhuma atividade no momento";
                if(data.activities.length > 0) {
                    const main = data.activities.find(x => x.type === 0) || data.activities[0];
                    act = (main.emoji ? main.emoji.name + ' ' : '') + (main.state || main.name);
                }
                document.getElementById('p-dc-activity').innerText = act;
            });
        }

        async function saveBio() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Salvando...";
            const { data: { user } } = await _supabase.auth.getUser();
            
            const payload = {
                user_id: user.id,
                username: document.getElementById('username').value.trim().toLowerCase(),
                display_name: document.getElementById('display_name').value,
                bio_text: document.getElementById('bio_text').value,
                links: document.getElementById('links_input').value,
                discord_id: user.user_metadata.provider_id,
                pfp_url: user.user_metadata.avatar_url // Usa o avatar do discord por padrão
            };

            const { error } = await _supabase.from('bios').upsert(payload);
            
            if (!error) {
                const url = window.location.origin + window.location.pathname + "?u=" + payload.username;
                document.getElementById('success-link').classList.remove('hidden');
                document.getElementById('final-url').innerText = url;
                document.getElementById('final-url').href = url;
            }
            btn.innerText = "Publicar Alterações";
        }

        init();
    </script>
</body>
</html>
