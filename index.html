<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity & Effects</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --surface-light: #121212;
            --border: #1f1f1f;
            --accent: #0071e3;
            --text: #ffffff;
            --text-dim: #86868b;
            --success: #28cd41;
            --error: #ff3b30;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }

        /* --- UI COMPONENTS --- */
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size: 14px; text-decoration: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }

        /* --- DASHBOARD --- */
        .dash-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 40px 24px; position: sticky; top: 0; height: 100vh; }
        .main-content { padding: 60px; max-width: 1000px; margin: 0 auto; width: 100%; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px; margin-bottom: 30px; animation: fadeIn 0.6s ease; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px 18px; border-radius: 12px; color: white; outline: none; margin-bottom: 20px; }

        /* --- UPLOAD BOX --- */
        .drop-zone { height: 150px; border: 2px dashed var(--border); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; background: rgba(255,255,255,0.01); }
        .progress-fill { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--accent); width: 0%; transition: 0.3s; }

        /* --- EFFECTS CANVAS --- */
        #effects-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .profile-content { position: relative; z-index: 2; }

        /* --- PROFILE --- */
        .p-card { background: rgba(10, 10, 10, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 450px; border-radius: 40px; padding: 60px 40px; text-align: center; }
        .p-avatar { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 20px; }

        #toast { position: fixed; top: 30px; right: 30px; z-index: 10000; background: var(--surface-light); padding: 18px 25px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="effects-canvas"></canvas>
    <div id="toast" class="hidden animate__animated"> <span id="toast-msg"></span> </div>

    <section id="view-home" class="hidden">
        <div class="container" style="padding-top: 150px; text-align: center;">
            <h1 style="font-size: 70px; font-weight: 800; margin-bottom: 20px;">OmniBio<span style="color:var(--accent)">.</span></h1>
            <button class="btn btn-primary" onclick="login()">Entrar com Discord</button>
            <div id="home-ranking" style="margin-top: 50px; max-width: 500px; margin-left: auto; margin-right: auto;"></div>
        </div>
    </section>

    <section id="view-admin" class="hidden">
        <div class="dash-layout">
            <aside class="sidebar">
                <h2 style="margin-bottom: 40px;">OmniBio</h2>
                <nav style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                        <img id="admin-pfp" style="width: 35px; border-radius: 50%;">
                        <span id="admin-name" style="font-size: 14px; font-weight: 600;"></span>
                    </div>
                </aside>

            <main class="main-content">
                <div class="card" style="background: var(--accent);">
                    <label style="color: white;">Seu Link Público</label>
                    <div style="display: flex; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px;">
                        <span id="share-url" style="font-family: monospace; flex: 1;">Aguardando username...</span>
                        <button onclick="copyLink()" style="background: none; border: none; color: white; cursor: pointer;"><i class="fa-solid fa-copy"></i></button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-wand-magic-sparkles"></i> <h2>Efeitos Visuais</h2></div>
                    <label>Escolha o efeito do seu perfil</label>
                    <select id="db_effect">
                        <option value="none">Nenhum</option>
                        <option value="snow">Neve (Inverno)</option>
                        <option value="stars">Estrelas Cadentes</option>
                        <option value="hearts">Corações (Love)</option>
                        <option value="matrix">Matrix (Hacker)</option>
                        <option value="rain">Chuva Leve</option>
                        <option value="fireflies">Vaga-lumes</option>
                    </select>
                </div>

                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-user"></i> <h2>Perfil</h2></div>
                    <label>Username</label>
                    <input type="text" id="db_username">
                    <label>Nome de Exibição</label>
                    <input type="text" id="db_display_name">
                    <label>Bio</label>
                    <textarea id="db_bio"></textarea>
                </div>

                <div class="card">
                    <div class="card-header"><i class="fa-solid fa-cloud-arrow-up"></i> <h2>Mídia</h2></div>
                    <label>Avatar (Clique p/ subir)</label>
                    <div class="drop-zone" onclick="document.getElementById('f_pfp').click()">
                        <p>Arraste sua foto aqui</p>
                        <input type="file" id="f_pfp" class="hidden" accept="image/*" onchange="uploadFile(this, 'pfp_url')">
                        <div class="progress-fill" id="fill_pfp_url"></div>
                    </div>
                    <input type="hidden" id="pfp_url">

                    <label style="margin-top: 20px;">Fundo (Banner ou Vídeo)</label>
                    <div class="drop-zone" onclick="document.getElementById('f_bg').click()">
                        <p>Banner JPG/PNG ou Vídeo MP4</p>
                        <input type="file" id="f_bg" class="hidden" accept="image/*,video/mp4" onchange="uploadFile(this, 'bg_url')">
                        <div class="progress-fill" id="fill_bg_url"></div>
                    </div>
                    <input type="hidden" id="bg_url">

                    <label style="margin-top: 20px;">Música (MP3)</label>
                    <div class="drop-zone" onclick="document.getElementById('f_audio').click()">
                        <p>Sua música favorita</p>
                        <input type="file" id="f_audio" class="hidden" accept="audio/mpeg" onchange="uploadFile(this, 'audio_url')">
                        <div class="progress-fill" id="fill_audio_url"></div>
                    </div>
                    <input type="hidden" id="audio_url">

                    <button class="btn btn-primary" style="width: 100%; margin-top: 30px; padding: 20px;" onclick="saveData()">SALVAR PERFIL</button>
                </div>
            </main>
        </div>
    </section>

    <section id="view-profile" class="hidden">
        <div id="profile-render" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
            <div class="p-card profile-content animate__animated animate__fadeIn">
                <img id="v-avatar" class="p-avatar">
                <h1 id="v-name" style="font-weight: 800;"></h1>
                <p id="v-user" style="color: var(--accent); margin-bottom: 20px;"></p>
                <p id="v-bio" style="opacity: 0.8; margin-bottom: 30px;"></p>
                
                <div id="v-discord" class="hidden" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; text-align: left;">
                    <img id="v-dc-img" style="width: 45px; border-radius: 10px;">
                    <div>
                        <div id="v-dc-name" style="font-weight: 700; font-size: 14px;"></div>
                        <div id="v-dc-status" style="font-size: 12px; color: var(--text-dim);"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        // --- INICIALIZAÇÃO ---
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const user = urlParams.get('u');

            if (user) {
                renderProfile(user);
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    loadAdmin();
                } else {
                    document.getElementById('view-home').classList.remove('hidden');
                    loadRanking();
                }
            }
        }

        // --- UPLOAD (CORREÇÃO 409) ---
        async function uploadFile(input, target) {
            const file = input.files[0];
            if (!file) return;
            const fill = document.getElementById(`fill_${target}`);
            fill.style.width = '20%';
            
            const name = `${currentUser.id}/${target}_${Date.now()}.${file.name.split('.').pop()}`;
            const { data, error } = await _supabase.storage.from('assets').upload(name, file, { upsert: true });

            if (!error) {
                const { data: { publicUrl } } = _supabase.storage.from('assets').getPublicUrl(name);
                document.getElementById(target).value = publicUrl;
                fill.style.width = '100%';
                showToast("Arquivo pronto!", "success");
            }
        }

        // --- SALVAR DADOS (COM EFEITO) ---
        async function saveData() {
            const user = document.getElementById('db_username').value.trim().toLowerCase();
            const payload = {
                user_id: currentUser.id,
                username: user,
                display_name: document.getElementById('db_display_name').value,
                bio_text: document.getElementById('db_bio').value,
                pfp_url: document.getElementById('pfp_url').value,
                bg_url: document.getElementById('bg_url').value,
                audio_url: document.getElementById('audio_url').value,
                effect_type: document.getElementById('db_effect').value, // SALVANDO EFEITO
                discord_id: currentUser.user_metadata.provider_id
            };

            const { error } = await _supabase.from('bios').upsert(payload, { onConflict: 'user_id' });
            if (!error) {
                showToast("Perfil salvo!", "success");
                setTimeout(() => location.reload(), 1000);
            } else {
                showToast("Erro ao salvar username.", "error");
            }
        }

        // --- ENGINE DE EFEITOS ---
        function startEffect(type) {
            if (type === 'none') return;
            const canvas = document.getElementById('effects-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const config = {
                snow: { char: '❄', count: 50, size: 15, speed: 1 },
                hearts: { char: '❤', count: 30, size: 20, speed: 1.5 },
                stars: { char: '⭐', count: 40, size: 10, speed: 0.5 },
                matrix: { char: '01', count: 60, size: 14, speed: 5 },
                rain: { char: '|', count: 100, size: 10, speed: 10 },
                fireflies: { char: '●', count: 40, size: 4, speed: 0.8 }
            };

            const set = config[type];
            for(let i=0; i<set.count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * set.size + 5,
                    v: Math.random() * set.speed + 1
                });
            }

            function draw() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = type === 'matrix' ? '#00ff00' : (type === 'fireflies' ? '#ffffaa' : 'white');
                ctx.font = `${set.size}px Arial`;
                
                particles.forEach(p => {
                    ctx.fillText(type === 'matrix' ? Math.round(Math.random()) : set.char, p.x, p.y);
                    p.y += p.v;
                    if(p.y > canvas.height) p.y = -20;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        // --- CARREGAR PERFIL ---
        async function renderProfile(u) {
            const { data } = await _supabase.from('bios').select('*').eq('username', u).maybeSingle();
            if(!data) return location.href = 'index.html';

            document.getElementById('view-profile').classList.remove('hidden');
            document.getElementById('v-name').innerText = data.display_name || u;
            document.getElementById('v-user').innerText = `@${u}`;
            document.getElementById('v-bio').innerText = data.bio_text;
            document.getElementById('v-avatar').src = data.pfp_url || `https://ui-avatars.com/api/?name=${u}`;

            if(data.bg_url) {
                if(data.bg_url.endsWith('.mp4')) {
                    const v = document.createElement('video');
                    v.src = data.bg_url; v.autoplay = v.loop = v.muted = true;
                    v.style = "position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;";
                    document.body.appendChild(v);
                } else {
                    document.body.style.background = `url(${data.bg_url}) center/cover no-repeat fixed`;
                }
            }

            if(data.audio_url) {
                const a = new Audio(data.audio_url); a.loop = true;
                document.body.onclick = () => a.play();
            }

            // ATIVA O EFEITO SALVO
            startEffect(data.effect_type || 'none');
            
            if(data.discord_id) fetchDiscord(data.discord_id);
            _supabase.rpc('increment_views', { target_username: u });
        }

        // --- UTILITÁRIOS ---
        async function loadAdmin() {
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('admin-pfp').src = currentUser.user_metadata.avatar_url;
            document.getElementById('admin-name').innerText = currentUser.user_metadata.full_name;

            const { data } = await _supabase.from('bios').select('*').eq('user_id', currentUser.id).maybeSingle();
            if (data) {
                document.getElementById('db_username').value = data.username || "";
                document.getElementById('db_display_name').value = data.display_name || "";
                document.getElementById('db_bio').value = data.bio_text || "";
                document.getElementById('pfp_url').value = data.pfp_url || "";
                document.getElementById('bg_url').value = data.bg_url || "";
                document.getElementById('audio_url').value = data.audio_url || "";
                document.getElementById('db_effect').value = data.effect_type || "none";
                
                if(data.username) document.getElementById('share-url').innerText = `${window.location.origin}${window.location.pathname}?u=${data.username}`;
            }
        }

        async function fetchDiscord(id) {
            const r = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
            const { data } = await r.json();
            if(data) {
                document.getElementById('v-discord').classList.remove('hidden');
                document.getElementById('v-dc-name').innerText = data.discord_user.username;
                document.getElementById('v-dc-img').src = `https://cdn.discordapp.com/avatars/${id}/${data.discord_user.avatar}.png`;
                document.getElementById('v-dc-status').innerText = data.activities.length ? data.activities[0].name : 'Online';
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('share-url').innerText);
            showToast("Link copiado!", "success");
        }

        function showToast(m, type) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = m;
            t.classList.remove('hidden');
            t.className = `animate__animated animate__fadeInDown ${type}`;
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        init();
    </script>
</body>
</html>
