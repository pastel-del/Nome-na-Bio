<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --text-sec: #a1a1a6;
            --blue: #0071e3;
            --red: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.4); display: none; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.6)); z-index: -1; }

        .wrapper { width: 100%; max-width: 440px; padding: 20px; z-index: 10; }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border); 
            border-radius: 32px; 
            padding: 35px 24px; 
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Ranking UI */
        .ranking-container { margin-top: 30px; text-align: left; background: rgba(255,255,255,0.03); border-radius: 24px; padding: 20px; border: 1px solid var(--border); }
        .rank-header { font-size: 11px; font-weight: 700; color: var(--text-sec); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 14px; text-decoration: none; color: inherit; transition: 0.2s; margin-bottom: 5px; }
        .rank-item:hover { background: rgba(255,255,255,0.08); }
        .rank-pfp { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #222; }

        /* Form / Editor */
        .admin-scroll { max-height: 70vh; overflow-y: auto; padding-right: 8px; text-align: left; }
        label { font-size: 10px; font-weight: 700; color: var(--text-sec); margin: 15px 0 5px 5px; display: block; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; margin-bottom: 10px; }
        
        .drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .preview-img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; margin-top: 10px; display: block; margin-inline: auto; }

        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-save { background: #fff; color: #000; }
        .btn-logout { background: transparent; color: var(--red); border: 1px solid rgba(255, 59, 48, 0.2); margin-top: 20px; }

        #link-box { margin-top: 20px; padding: 15px; background: rgba(0, 113, 227, 0.1); border: 1px solid var(--blue); border-radius: 16px; text-align: left; }

        /* Discord Activity Card */
        .discord-card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px;
            padding: 15px; display: flex; align-items: center; gap: 12px; text-align: left;
            text-decoration: none; color: inherit; margin: 20px 0; transition: 0.3s;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div class="wrapper">
        <div id="login-ui" class="card hidden">
            <h1 style="margin-bottom: 25px;">OmniBio</h1>
            <button class="btn" style="background: #5865f2; color: white;" onclick="login()">Entrar com Discord</button>
            
            <div class="ranking-container">
                <div class="rank-header"><i class="fa-solid fa-fire"></i> Em Alta</div>
                <div id="rank-list">
                    <p style="font-size: 11px; color: var(--text-sec); text-align:center;">Buscando perfis...</p>
                </div>
            </div>
        </div>

        <div id="admin-ui" class="card hidden">
            <div class="admin-scroll">
                <h2 style="margin-bottom: 20px;">Configurações</h2>
                
                <label>Seu @ (URL)</label>
                <input type="text" id="username" placeholder="ex: lucas">

                <label>Nome no Perfil</label>
                <input type="text" id="display_name">

                <label>Bio</label>
                <textarea id="bio_text" rows="3"></textarea>

                <label>Redes (icone,link | ...)</label>
                <input type="text" id="links_input" placeholder="instagram,link | github,link">

                <label>PFP / BG / Música</label>
                <div class="drop-zone" onclick="document.getElementById('pfp-f').click()">PFP <input type="file" id="pfp-f" hidden><img id="pfp-prev" class="preview-img hidden"></div>
                <div class="drop-zone" onclick="document.getElementById('bg-f').click()">BG <input type="file" id="bg-f" hidden></div>
                <div class="drop-zone" onclick="document.getElementById('audio-f').click()">Música <input type="file" id="audio-f" hidden></div>

                <button class="btn btn-save" onclick="saveBio()" id="save-btn">SALVAR</button>

                <div id="link-box" class="hidden">
                    <span id="generated-url" style="font-size: 11px; word-break: break-all; color: #fff; display: block; margin-bottom: 10px;"></span>
                    <button class="btn" style="background: var(--blue); color: #fff; padding: 10px; font-size: 12px;" onclick="copyLink()">COPIAR LINK</button>
                </div>

                <button class="btn btn-logout" onclick="logout()">SAIR</button>
            </div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="view-pfp" class="pfp-view" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 1px solid var(--border);">
            <h1 id="view-name"></h1>
            <p id="view-frase" style="color: var(--text-sec); margin-bottom: 20px; font-size: 14px;"></p>
            
            <a id="dc-link" class="discord-card hidden" target="_blank">
                <div style="position:relative; width:44px; height:44px;">
                    <img id="dc-pfp" style="width:100%; border-radius:10px;">
                    <div id="dc-status" style="position:absolute; bottom:-2px; right:-2px; width:12px; height:12px; border-radius:50%; border:2px solid #1a1a1a;"></div>
                </div>
                <div>
                    <h3 id="dc-user" style="font-size:13px; font-weight:600;"></h3>
                    <p id="dc-activity" style="font-size:11px; color: var(--text-sec);">Online</p>
                </div>
            </a>

            <div id="social-icons" style="display:flex; justify-content:center; gap:20px;"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                const { data, error } = await _supabase.from('bios').select('*').eq('username', u).maybeSingle();
                if (data) { renderProfile(data); _supabase.rpc('increment_views', { target_username: u }); }
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) loadAdmin(session.user);
                else {
                    document.getElementById('login-ui').classList.remove('hidden');
                    loadRanking();
                }
            }
        }

        async function loadRanking() {
            try {
                const { data, error } = await _supabase.from('bios').select('*').order('views', { ascending: false }).limit(5);
                const list = document.getElementById('rank-list');
                if (error || !data || data.length === 0) {
                    list.innerHTML = '<p style="font-size: 11px; color: var(--text-sec); text-align:center;">Nenhum perfil ainda.</p>';
                    return;
                }
                list.innerHTML = data.map(p => `
                    <a href="?u=${p.username}" class="rank-item">
                        <img src="${p.pfp_url || 'https://ui-avatars.com/api/?name='+p.username}" class="rank-pfp">
                        <div class="rank-info">
                            <h4>${p.display_name || p.username}</h4>
                            <p>@${p.username} • ${p.views || 0} views</p>
                        </div>
                    </a>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }
        async function logout() { await _supabase.auth.signOut(); window.location.href = window.location.origin + window.location.pathname; }

        async function saveBio() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Salvando..."; btn.disabled = true;
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();

                const upload = async (elId, folder) => {
                    const f = document.getElementById(elId).files[0];
                    if(!f) return null;
                    const path = `${folder}/${user.id}_${Date.now()}`;
                    await _supabase.storage.from('assets').upload(path, f);
                    return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl;
                };

                const pfp = await upload('pfp-f', 'pfp');
                const bg = await upload('bg-f', 'bg');
                const aud = await upload('audio-f', 'audio');

                const username = document.getElementById('username').value.trim().toLowerCase();
                const payload = {
                    user_id: user.id, username,
                    display_name: document.getElementById('display_name').value,
                    bio_text: document.getElementById('bio_text').value,
                    links: document.getElementById('links_input').value,
                    pfp_url: pfp || curr?.pfp_url,
                    bg_url: bg || curr?.bg_url,
                    audio_url: aud || curr?.audio_url,
                    discord_id: user.user_metadata.provider_id
                };

                await _supabase.from('bios').upsert(payload);
                document.getElementById('link-box').classList.remove('hidden');
                document.getElementById('generated-url').innerText = window.location.origin + window.location.pathname + "?u=" + username;
                btn.innerText = "SALVAR"; btn.disabled = false;
            } catch (e) { alert("Erro ao salvar"); btn.disabled = false; }
        }

        function renderProfile(d) {
            document.getElementById('bio-view').classList.remove('hidden');
            document.getElementById('view-name').innerText = d.display_name;
            document.getElementById('view-frase').innerText = d.bio_text;
            document.getElementById('view-pfp').src = d.pfp_url || `https://ui-avatars.com/api/?name=${d.username}`;
            
            if(d.bg_url) {
                if(d.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) { const a = document.getElementById('bg-audio'); a.src = d.audio_url; a.play(); }

            if(d.discord_id) {
                fetch(`https://api.lanyard.rest/v1/users/${d.discord_id}`).then(r => r.json()).then(({data}) => {
                    if(!data) return;
                    const dc = document.getElementById('dc-link');
                    dc.classList.remove('hidden');
                    document.getElementById('dc-user').innerText = data.discord_user.username;
                    document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                    const s = data.discord_status;
                    document.getElementById('dc-status').style.background = s==='online'?'#23a559':s==='dnd'?'#f23f43':s==='idle'?'#f0b232':'#80848e';
                    let act = "Online";
                    if(data.activities.length > 0) {
                        const main = data.activities.find(x => x.type === 0) || data.activities[0];
                        act = (main.emoji ? main.emoji.name + ' ' : '') + (main.state || main.name);
                    }
                    document.getElementById('dc-activity').innerText = act;
                }).catch(() => console.log("Lanyard error"));
            }

            if(d.links) {
                const s = document.getElementById('social-icons');
                d.links.split('|').forEach(l => {
                    const [icon, url] = l.split(',');
                    if(icon && url) {
                        const a = document.createElement('a'); a.href = url.trim(); a.target = "_blank";
                        a.style = "color:#fff; font-size:1.5rem; opacity:0.6;";
                        let type = ['link', 'envelope'].includes(icon.trim()) ? 'fa-solid' : 'fa-brands';
                        a.innerHTML = `<i class="${type} fa-${icon.trim()}"></i>`;
                        s.appendChild(a);
                    }
                });
            }
        }

        async function loadAdmin(user) {
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if(data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('bio_text').value = data.bio_text || "";
                document.getElementById('links_input').value = data.links || "";
                if(data.pfp_url) { document.getElementById('pfp-prev').src = data.pfp_url; document.getElementById('pfp-prev').classList.remove('hidden'); }
            }
        }

        init();
    </script>
</body>
</html>
