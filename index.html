<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBio | Identity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { 
            --bg: #030303; 
            --glass: rgba(255, 255, 255, 0.02); 
            --border: rgba(255, 255, 255, 0.06); 
            --accent: #ff8c00; 
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Background Visuals */
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.3); display: none; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%); backdrop-filter: blur(12px); z-index: -1; }

        .wrapper { width: 100%; max-width: 420px; padding: 25px; z-index: 10; }

        /* Card Minimalista */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 50px 35px; 
            text-align: center; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
            position: relative;
        }

        /* Profile Elements */
        .pfp-view { width: 105px; height: 105px; border-radius: 50%; border: 1px solid var(--border); margin-bottom: 20px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .display-name { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .bio-text-view { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 30px; }

        /* Discord Card Refinado */
        .discord-card { 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 22px; 
            padding: 16px; 
            margin: 25px 0; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-align: left; 
            border: 1px solid var(--border); 
            text-decoration: none; 
            color: inherit;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .discord-card:hover { background: rgba(255, 255, 255, 0.05); transform: translateY(-3px); }
        .dc-img { position: relative; width: 44px; height: 44px; }
        .dc-img img { width: 100%; height: 100%; border-radius: 12px; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 13px; height: 13px; border-radius: 50%; border: 2.5px solid #0a0a0a; }

        /* Links & Badge */
        .social-links { display: flex; justify-content: center; gap: 22px; margin-top: 10px; }
        .social-icon { color: #fff; font-size: 1.4rem; opacity: 0.4; transition: 0.3s; }
        .social-icon:hover { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .views-badge { position: absolute; bottom: 20px; left: 0; right: 0; font-size: 0.6rem; color: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; gap: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Admin / Forms */
        .admin-scroll { max-height: 75vh; overflow-y: auto; text-align: left; padding-right: 5px; }
        .admin-scroll::-webkit-scrollbar { width: 4px; }
        .admin-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        label { font-size: 0.6rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; border-radius: 14px; outline: none; transition: 0.3s; font-size: 0.85rem; }
        input:focus, textarea:focus { border-color: var(--accent); background: rgba(0,0,0,0.5); }
        
        .toggle-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 14px; border-radius: 14px; margin-top: 20px; border: 1px solid var(--border); }
        .toggle-row span { font-size: 0.8rem; font-weight: 600; color: #eee; }

        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.85rem; letter-spacing: 0.5px; }
        .btn-save { background: #fff; color: #000; margin-top: 25px; }
        .btn-save:hover { background: var(--accent); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,140,0,0.2); }

        .hidden { display: none !important; }
        
        #enter-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .enter-text { font-size: 0.6rem; letter-spacing: 0.8em; color: #444; text-transform: uppercase; transition: 0.5s; }
        #enter-screen:hover .enter-text { color: #fff; letter-spacing: 1em; }
    </style>
</head>
<body>
    <video id="bg-video" loop playsinline muted></video>
    <audio id="bg-audio" loop></audio>
    <div class="overlay"></div>

    <div id="enter-screen" class="hidden" onclick="revealBio()">
        <span class="enter-text">Click to Reveal</span>
    </div>

    <div class="wrapper">
        <div id="login-ui" class="card hidden">
            <h1 style="margin-bottom: 25px; font-weight: 800; letter-spacing: -1px;">OmniBio</h1>
            <button class="btn" style="background: #5865f2; color: white;" onclick="login()">
                <i class="fa-brands fa-discord" style="margin-right: 8px;"></i> Entrar com Discord
            </button>
        </div>

        <div id="admin-ui" class="card hidden">
            <div class="admin-scroll">
                <h2 style="margin-bottom: 5px; font-weight: 800;">Identity</h2>
                <p style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 20px;">Personalize sua presença digital.</p>
                
                <label>Username (URL)</label><input type="text" id="username" placeholder="seu-nome">
                <label>Nome de Exibição</label><input type="text" id="display_name" placeholder="Como te chamam?">
                <label>Biografia</label><textarea id="bio_text" rows="3" placeholder="Uma frase curta..."></textarea>
                <label>Social Links (icone,url | ...)</label><input type="text" id="links_input" placeholder="instagram,https://...">
                
                <div class="toggle-row">
                    <span>Atividade Discord</span>
                    <input type="checkbox" id="show_discord" style="width:18px; height:18px; accent-color: var(--accent);">
                </div>
                
                <label>Arquivos de Mídia</label>
                <div style="display: grid; gap: 10px;">
                    <input type="file" id="pfp-f" style="font-size: 0.7rem;">
                    <input type="file" id="bg-f" style="font-size: 0.7rem;">
                    <input type="file" id="audio-f" style="font-size: 0.7rem;">
                </div>

                <button class="btn btn-save" onclick="saveBio()" id="save-btn">SALVAR ALTERAÇÕES</button>
                <div id="status-msg" style="text-align:center; font-size:0.65rem; margin-top:15px; font-weight: 600;"></div>
            </div>
        </div>

        <div id="bio-view" class="card hidden">
            <img id="view-pfp" class="pfp-view">
            <h1 id="view-name" class="display-name"></h1>
            <p id="view-frase" class="bio-text-view"></p>
            
            <a id="dc-link" class="discord-card hidden" target="_blank">
                <div class="dc-img"><img id="dc-pfp"><div id="dc-status" class="status-dot"></div></div>
                <div>
                    <h3 id="dc-user" style="font-size:0.85rem; font-weight: 700;"></h3>
                    <p id="dc-activity" style="font-size:0.7rem; color:rgba(255,255,255,0.4);"></p>
                </div>
            </a>
            
            <div id="social-icons" class="social-links"></div>
            <div class="views-badge"><i class="fa-regular fa-eye"></i> <span id="view-count">0</span></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zpzdasukgdmfygajnjhn.supabase.co';
        const SB_KEY = 'sb_publishable_zFt8CfCxjSbZkZ6QLwKG8A_Vk-Skprf';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let bioData = null;

        async function init() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                const { data } = await _supabase.from('bios').select('*').eq('username', u).maybeSingle();
                if (data) { bioData = data; document.getElementById('enter-screen').classList.remove('hidden'); await _supabase.rpc('increment_views', { target_username: u }); }
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) loadAdmin(session.user);
                else document.getElementById('login-ui').classList.remove('hidden');
            }
        }

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        async function loadAdmin(user) {
            document.getElementById('admin-ui').classList.remove('hidden');
            const { data } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('username').value = data.username || "";
                document.getElementById('display_name').value = data.display_name || "";
                document.getElementById('bio_text').value = data.bio_text || "";
                document.getElementById('links_input').value = data.links || "";
                document.getElementById('show_discord').checked = data.show_discord !== false;
            }
        }

        async function saveBio() {
            const btn = document.getElementById('save-btn');
            const msg = document.getElementById('status-msg');
            btn.innerText = "PROCESSANDO..."; btn.disabled = true;
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                const { data: curr } = await _supabase.from('bios').select('*').eq('user_id', user.id).maybeSingle();
                const uploadAsset = async (elId, folder) => {
                    const file = document.getElementById(elId).files[0];
                    if(!file) return null;
                    const path = `${folder}/${user.id}`;
                    await _supabase.storage.from('assets').upload(path, file, {upsert:true});
                    return _supabase.storage.from('assets').getPublicUrl(path).data.publicUrl + "?t=" + Date.now();
                };
                const pfp = await uploadAsset('pfp-f', 'pfp');
                const bg = await uploadAsset('bg-f', 'bg');
                const aud = await uploadAsset('audio-f', 'audio');
                const payload = {
                    user_id: user.id,
                    username: document.getElementById('username').value.trim().toLowerCase(),
                    display_name: document.getElementById('display_name').value,
                    bio_text: document.getElementById('bio_text').value,
                    links: document.getElementById('links_input').value,
                    show_discord: document.getElementById('show_discord').checked,
                    discord_id: user.identities[0].id,
                    pfp_url: pfp || curr?.pfp_url,
                    bg_url: bg || curr?.bg_url,
                    audio_url: aud || curr?.audio_url
                };
                const { error } = await _supabase.from('bios').upsert(payload);
                if(error) throw error;
                msg.style.color = "lightgreen"; msg.innerText = "SALVO COM SUCESSO";
                setTimeout(() => location.reload(), 1500);
            } catch (err) {
                msg.style.color = "#ff4d4d"; msg.innerText = "ERRO AO SALVAR";
                btn.innerText = "TENTAR NOVAMENTE"; btn.disabled = false;
            }
        }

        function revealBio() {
            document.getElementById('enter-screen').classList.add('hidden');
            document.getElementById('bio-view').classList.remove('hidden');
            const d = bioData;
            document.getElementById('view-name').innerText = d.display_name;
            document.getElementById('view-frase').innerText = d.bio_text || "";
            document.getElementById('view-pfp').src = d.pfp_url || "";
            document.getElementById('view-count').innerText = d.views || 0;
            if(d.bg_url) {
                if(d.bg_url.includes('.mp4')) {
                    const v = document.getElementById('bg-video'); v.src = d.bg_url; v.style.display = 'block'; v.play();
                } else document.body.style.background = `url(${d.bg_url}) center/cover no-repeat fixed`;
            }
            if(d.audio_url) { const a = document.getElementById('bg-audio'); a.src = d.audio_url; a.play(); }
            if(d.links) {
                const s = document.getElementById('social-icons');
                d.links.split('|').forEach(l => {
                    const [icon, url] = l.split(',');
                    if(icon && url) {
                        const a = document.createElement('a'); a.href = url.trim(); a.target = "_blank"; a.className = "social-icon";
                        let ic = `fa-brands fa-${icon.trim().toLowerCase()}`;
                        if(icon.trim().toLowerCase() === 'link') ic = 'fa-solid fa-link';
                        a.innerHTML = `<i class="${ic}"></i>`; s.appendChild(a);
                    }
                });
            }
            if(d.discord_id && d.show_discord !== false) {
                document.getElementById('dc-link').classList.remove('hidden');
                document.getElementById('dc-link').href = `https://discord.com/users/${d.discord_id}`;
                fetch(`https://api.lanyard.rest/v1/users/${d.discord_id}`).then(r => r.json()).then(({data}) => {
                    if(data) {
                        document.getElementById('dc-user').innerText = data.discord_user.global_name || data.discord_user.username;
                        document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
                        const s = data.discord_status;
                        document.getElementById('dc-status').style.background = s==='online'?'#23a559':s==='dnd'?'#f23f43':s==='idle'?'#f0b232':'#80848e';
                        document.getElementById('dc-activity').innerText = data.activities[0]?.name || "Online";
                    }
                });
            }
        }
        init();
    </script>
</body>
</html>
