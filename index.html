<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Dynamic Bio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');

        :root {
            --glow: #b026ff;
            --accent: #00ffcc;
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: none; /* Vamos usar o cursor customizado */
        }

        /* Cursor Customizado */
        #cursor {
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px #fff, 0 0 30px var(--glow);
            transition: transform 0.1s;
        }

        /* Background Dinâmico */
        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.3) contrast(1.2);
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg, rgba(0,0,0,0.7), transparent);
            z-index: -1;
        }

        /* Visualizador de Áudio */
        #visualizer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Card com Efeito Tilt 3D */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            width: 400px;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* Avatar e Status */
        .avatar-area {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
            transform: translateZ(50px);
        }

        .pfp {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--glow);
            padding: 5px;
        }

        .status-dot {
            position: absolute;
            bottom: 10px; right: 10px;
            width: 25px; height: 25px;
            border-radius: 50%;
            border: 4px solid #111;
            background: #444;
        }

        /* Badges Customizadas (Diferencial) */
        .badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            transform: translateZ(30px);
        }

        .badge {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Player de Música Info */
        .music-info {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Links */
        .btn {
            display: block;
            background: rgba(255,255,255,0.05);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            font-weight: 600;
            border: 1px solid transparent;
            transition: 0.3s;
            transform: translateZ(20px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        /* Click to Enter Overlay */
        #entry {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .online { background: #43b581 !important; box-shadow: 0 0 15px #43b581; }
        .dnd { background: #f04747 !important; }
        .idle { background: #faa61a !important; }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <div id="entry" onclick="init()">
        <span style="letter-spacing: 10px; color: #555;">[ UNLOCK EXPERIENCE ]</span>
    </div>

    <video autoplay muted loop id="bg-video">
        <source id="vid-src" src="" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <canvas id="visualizer"></canvas>

    <div class="container">
        <div class="card" id="tilt-card">
            <div class="avatar-area">
                <img id="user-pfp" src="https://via.placeholder.com/150" class="pfp">
                <div id="status" class="status-dot"></div>
            </div>

            <div class="badges" id="badges-container">
                </div>

            <h1 id="user-name" style="margin:0; font-family: 'Syncopate'; font-size: 1.5rem;">USER</h1>
            <p id="user-bio" style="color: #888; margin-bottom: 20px;"></p>

            <div class="music-info">
                <span id="track-name">Playlist Active</span>
            </div>

            <div id="links-area"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const discordID = params.get('id');
        
        // Playlist Infinita (Coloque links de MP3 diretos separados por vírgula)
        const playlist = params.get('songs') ? params.get('songs').split(',') : [
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
        ];
        let currentTrack = 0;
        const audio = new Audio();

        // Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Efeito Tilt 3D
        const card = document.getElementById('tilt-card');
        document.addEventListener('mousemove', e => {
            let xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            let yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        function init() {
            document.getElementById('entry').style.display = 'none';
            playNext();
            setupVisualizer();
            updateDiscord();
            setInterval(updateDiscord, 10000);
        }

        function playNext() {
            audio.src = playlist[currentTrack];
            audio.play();
            document.getElementById('track-name').innerText = `Playing Track #${currentTrack + 1}`;
            audio.onended = () => {
                currentTrack = (currentTrack + 1) % playlist.length;
                playNext();
            };
        }

        // Visualizador de Áudio (API de Áudio do Web Browser)
        function setupVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                canvas.width = window.innerWidth;
                canvas.height = 150;
                analyser.getByteFrequencyData(dataArray);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;
                for(let i = 0; i < bufferLength; i++) {
                    let barHeight = dataArray[i] / 2;
                    ctx.fillStyle = `rgba(176, 38, 255, ${barHeight/100})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }

        // Lanyard API
        async function updateDiscord() {
            if(!discordID) return;
            const res = await fetch(`https://api.lanyard.rest/v1/users/${discordID}`);
            const { data } = await res.json();
            
            document.getElementById('status').className = `status-dot ${data.discord_status}`;
            document.getElementById('user-name').innerText = data.discord_user.username.toUpperCase();
            document.getElementById('user-pfp').src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png`;
        }

        // Configuração via URL
        if(params.get('nome')) document.getElementById('user-name').innerText = params.get('nome').toUpperCase();
        if(params.get('bio')) document.getElementById('user-bio').innerText = params.get('bio');
        if(params.get('vid')) document.getElementById('vid-src').src = params.get('vid');
        
        // Badges
        if(params.get('badges')) {
            params.get('badges').split(',').forEach(b => {
                const span = document.createElement('span');
                span.className = 'badge';
                span.innerText = b;
                document.getElementById('badges-container').appendChild(span);
            });
        }
        
        // Links
        if(params.get('links')) {
            params.get('links').split('|').forEach(l => {
                const [n, u] = l.split(',');
                const a = document.createElement('a');
                a.className = 'btn'; a.href = u; a.innerText = n; a.target = "_blank";
                document.getElementById('links-area').appendChild(a);
            });
        }
    </script>
</body>
</html>
